// Build a mini calendar for one month, colours from holiday list
// ── Notice mini calendar — copy of Calendar month render, notice colours ──
function _buildNoticeMiniCal(yr, mo, allHol, noticeDept){
  const MNAMES=['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  const MNAMES_CN=['\u4e00\u6708','\u4e8c\u6708','\u4e09\u6708','\u56db\u6708','\u4e94\u6708','\u516d\u6708',
                   '\u4e03\u6708','\u516b\u6708','\u4e5d\u6708','\u5341\u6708','\u5341\u4e00\u6708','\u5341\u4e8c\u6708'];

  const days = new Date(yr, mo, 0).getDate();
  const ms   = `${yr}-${String(mo).padStart(2,'0')}`;
  const af   = (new Date(yr, mo-1, 1).getDay() + 6) % 7; // first day offset Mon=0
  const d    = _hd(yr);

  // ── Dept helpers (same as Calendar, dept = noticeDept) ───────────
  const dept = noticeDept || 'SRK';
  const satIsWork = false; // SRK/GAK/ATC/SRT: Sat is off

  const subDates = new Set(_getSubHols(yr).map(s=>s.date));

  function deptMatch(depts){ return !depts||depts.includes(dept)||depts.includes('MASTER'); }

  function isSHForDept(ds2){
    const sh2 = S.schoolHolDates[yr]||{};
    return Object.values(sh2).some(r=>r.start&&r.end&&ds2>=r.start&&ds2<=r.end&&deptMatch(r.depts));
  }

  function getFestCatLocal(ds2){
    const tplDates = new Set(HOLIDAY_TEMPLATE.map(t=>t.dt==='fixed'?`${yr}-${t.md}`:(d[t.id]||'')).filter(Boolean));
    if(tplDates.has(ds2)) return null;
    for(const fc of FESTIVAL_CONFIG){
      const f=(S.festivalDates[yr]||{})[fc.id]||{};
      if(f.start&&f.end&&ds2>=f.start&&ds2<=f.end) return (f.days||{})[ds2]||null;
    }
    return null;
  }

  // ── getDayStyle equivalent (SAME logic as Calendar) ─────────────
  // Maps Calendar colours to notice palette:
  //   black (#000)    → #5C1010  (dark maroon)
  //   grey  (#AAAAAA) → #F2DADA  (light pink)
  //   white (#fff)    → #fff
  function noticeStyle(ds2, dow){
    const isSun=dow===6, isSat=dow===5;
    if(isSun||(isSat&&!satIsWork)) return {bg:'#5C1010',txt:'#fff',bold:false};
    const festCat=getFestCatLocal(ds2);
    const shDay=isSHForDept(ds2);
    const isSpec=(S.specialHolidays[yr]||[]).some(h=>h.date===ds2);
    const isSub=subDates.has(ds2);
    const nonFestPH=(isPH(ds2)&&!festCat)||isSpec||isSub;
    const nonFestOFF=isCentreOff(ds2)&&!festCat;
    if(nonFestPH||nonFestOFF) return {bg:'#5C1010',txt:'#fff',bold:true};
    if(festCat==='PH2') return {bg:'#5C1010',txt:'#fff',bold:true};
    if(festCat==='OFF') return {bg:'#F2DADA',txt:'#7A1E1E',bold:true};
    if(shDay)           return {bg:'#F2DADA',txt:'#7A1E1E',bold:true};
    return {bg:'#fff',txt:'#555',bold:false};
  }

  // isECDay — exact copy of Calendar's isExtraClass(ds, dept) logic
  function isECDay(ds2){
    return ((S.extraClasses||{})[yr]||[]).some(e=>{
      if(!e.start||!e.end||ds2<e.start||ds2>e.end) return false;
      return !dept||!e.depts||!e.depts.length||e.depts.includes(dept);
    });
  }

  // ── Build HTML ────────────────────────────────────────────────────
  let html = `<div style="border:2px solid #5C1010;border-radius:6px;overflow:hidden;font-family:Arial,sans-serif;background:#fff;">`;

  // Month header
  html += `<div style="background:#5C1010;color:#fff;padding:7px 12px;display:flex;justify-content:space-between;align-items:center;">
    <span style="font-weight:700;font-size:12px;">${MNAMES[mo-1]} ${yr}</span>
    <span style="font-size:10px;opacity:.7;">${MNAMES_CN[mo-1]}</span>
  </div>`;

  // Day headers — M-F medium red, S/S dark
  html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);">
    ${['M','T','W','T','F','S','S'].map((x,i)=>`<div style="text-align:center;font-size:9px;font-weight:700;padding:4px 0;background:${i>=5?'#3d1a1a':'#8B3030'};color:#fff;">${x}</div>`).join('')}
  </div>`;

  // Day grid
  html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #5C1010;">`;
  for(let i=0;i<af;i++) html+=`<div style="min-height:26px;background:#faf9f7;"></div>`;
  for(let day=1;day<=days;day++){
    const ds2=`${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow=(af+day-1)%7;
    const {bg,txt,bold}=noticeStyle(ds2,dow);
    const ec=isECDay(ds2);
    html+=`<div style="min-height:26px;padding:2px;background:${bg};border:1px solid ${bg==='#fff'?'#ede9e3':'transparent'};display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <span style="font-size:11px;font-weight:700;color:${txt};line-height:1;">${day}</span>
      ${ec?`<span style="font-size:7px;line-height:1;color:${bg==='#5C1010'?'#fff':bg==='#F2DADA'?'#7A1E1E':'#5C1010'}">★</span>`:''}
    </div>`;
  }
  const rem=(af+days)%7;
  if(rem>0) for(let i=0;i<7-rem;i++) html+=`<div style="min-height:26px;background:#faf9f7;"></div>`;
  html+=`</div>`;

  // ── Sections (SAME logic as Calendar) ─────────────────────────────

  // isFestOnlyOFF: same as Calendar
  const isFestOnlyOFF=(ds2)=>{
    const isFestOFF=FESTIVAL_CONFIG.some(fc=>{
      const f=(S.festivalDates[yr]||{})[fc.id]||{};
      return f.start&&f.end&&ds2>=f.start&&ds2<=f.end&&(f.days||{})[ds2]==='OFF';
    });
    if(!isFestOFF) return false;
    const tpl=new Set(HOLIDAY_TEMPLATE.map(t=>t.dt==='fixed'?`${yr}-${t.md}`:(d[t.id]||'')).filter(Boolean));
    return !tpl.has(ds2);
  };

  // Holiday list
  const subs2=_getSubHols(yr);
  const monthPHList=[];
  for(let dd=1;dd<=days;dd++){
    const ds2=`${yr}-${String(mo).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const subEntry=subs2.find(s=>s.date===ds2);
    if(!subEntry&&isFestOnlyOFF(ds2)) continue;
    const phName=getPHNameFull(ds2)||getOffName(ds2);
    if(subEntry) monthPHList.push(`<div style="font-size:9px;line-height:1.6;font-weight:700"><b>${dd}</b> ${escapeHTML(subEntry.name.replace(/\s*\([^)]*\)/g,'').trim())}</div>`);
    else if(phName) monthPHList.push(`<div style="font-size:9px;line-height:1.6;font-weight:700"><b>${dd}</b> ${escapeHTML(phName)}</div>`);
  }

  // Festival ranges
  const festInMonth=[];
  FESTIVAL_CONFIG.forEach(fc=>{
    const fest=(S.festivalDates[yr]||{})[fc.id]||{};
    if(!fest.start||!fest.end) return;
    if(fest.end<ms+'-01'||fest.start>ms+'-31') return;
    festInMonth.push({name:fc.name,start:_ddmmS(fest.start),end:_ddmmS(fest.end)});
  });

  // School holiday ranges
  const sh=S.schoolHolDates[yr]||{};
  const shRanges=Object.values(sh).filter(r=>{
    if(!r.start||!r.end) return false;
    if(!deptMatch(r.depts)) return false;
    return r.start.startsWith(ms)||r.end.startsWith(ms)||(r.start<=ms+'-01'&&r.end>=ms+'-28');
  });

  // Extra class
  // ecInMonth — exact copy of Calendar's ecInMonth filter logic
  const ecInMonth = ((S.extraClasses||{})[yr]||[]).filter(e=>{
    if(!e.start||!e.end) return false;
    if(!(!dept||!e.depts||!e.depts.length||e.depts.includes(dept))) return false;
    return e.start.startsWith(ms)||e.end.startsWith(ms)||(e.start<=ms+'-01'&&e.end>=ms+'-28');
  });

  // Government type: solid outer → dashed between PH and SH
  // Centre type:     solid separator → dashed between Festive and EC
  if(monthPHList.length) html+=`<div style="padding:6px 10px;border-top:1px solid #5C1010;background:#faf8f5;">
    <div style="font-size:8px;font-weight:700;color:#5C1010;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Public Holiday</div>
    ${monthPHList.join('')}</div>`;
  if(shRanges.length) html+=`<div style="padding:6px 10px;border-top:${monthPHList.length?'1.5px dashed #C0A0A0':'1px solid #5C1010'};background:#edecea;">
    <div style="font-size:8px;font-weight:700;color:#5C1010;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">KPM School Holiday</div>
    ${shRanges.map(r=>`<div style="font-size:9px;line-height:1.6">${_ddmmS(r.start)} – ${_ddmmS(r.end)} (${escapeHTML(r.name||'School Holiday')})</div>`).join('')}</div>`;
  if(festInMonth.length) html+=`<div style="padding:6px 10px;border-top:1px solid #5C1010;background:#f5f2ec;">
    <div style="font-size:8px;font-weight:700;color:#5C1010;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Our Festive Holidays</div>
    ${festInMonth.map(f=>`<div style="font-size:9px;line-height:1.6">${f.start} – ${f.end} (${escapeHTML(f.name)})</div>`).join('')}</div>`;
  if(ecInMonth.length){
    // Deduplicate by date range (e.start / e.end)
    const ecGroups={};
    ecInMonth.forEach(e=>{
      const key=`${e.start}|${e.end||e.start}`;
      if(!ecGroups[key]) ecGroups[key]={start:e.start,end:e.end||e.start,entries:[]};
      const lbl=[e.name&&e.name!=='Extra Class'?e.name:'',e.time||'',e.msg||''].filter(Boolean).join(' · ');
      if(lbl&&!ecGroups[key].entries.includes(lbl)) ecGroups[key].entries.push(lbl);
    });
    const ecRows=Object.values(ecGroups).map(g=>`<div style="font-size:9px;line-height:1.7"><b>${_ddmmS(g.start)}${g.end&&g.end!==g.start?' – '+_ddmmS(g.end):''}</b>${g.entries.length?' <span style="font-weight:400">'+escapeHTML(g.entries.join(' / '))+'</span>':''}</div>`);
    html+=`<div style="padding:6px 10px;border-top:${festInMonth.length?'1.5px dashed #C0A0A0':'1px solid #5C1010'};background:#f5f0fa;">
    <div style="font-size:8px;font-weight:700;color:#5C1010;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">★ Our Extra Learning Day</div>
    ${ecRows.join('')}</div>`;
  }
  if(!monthPHList.length&&!festInMonth.length&&!shRanges.length&&!ecInMonth.length)
    html+=`<div style="border-top:1px solid #5C1010;min-height:4px;"></div>`;

  html+=`</div>`;
  return html;
}

}

// Build the full notice card HTML (shared by preview, print, image)
// Dept-aware holiday collector for parent notice
function _filterPeriodHolidaysForDept(yr, months, dept){
  const list = [];
  const d = _hd(yr);
  // Template holidays (same for all depts)
  HOLIDAY_TEMPLATE.forEach(t=>{
    const dt = t.dt==='fixed' ? `${yr}-${t.md}` : d[t.id];
    if(!dt) return;
    list.push({ date:dt, name:t.name, cat:t.cat });
  });
  // Festival holidays (same for all depts)
  FESTIVAL_CONFIG.forEach(fc=>{
    const fest = (S.festivalDates[yr]||{})[fc.id]||{};
    Object.entries(fest.days||{}).forEach(([ds,cat])=>{
      if(!fest.start||!fest.end||ds<fest.start||ds>fest.end) return;
      if(cat==='PH2'||cat==='OFF'){
        if(new Date(ds+'T12:00:00').getDay()===0 && cat!=='PH2') return;
        list.push({ date:ds, name:fc.name, cat });
      }
    });
  });
  // Special holidays
  (S.specialHolidays[yr]||[]).forEach(s=>{
    if(s.date) list.push({ date:s.date, name:s.name, cat:s.category||'PH2' });
  });
  // Substitute holidays
  _getSubHols(yr).forEach(s=>{
    list.push({ date:s.date, name:s.name.replace(/\s*\(.*?\)/g,'').trim(), cat:'SUB', isReplace:true });
  });
  // School holidays — filtered by dept
  const sh = S.schoolHolDates[yr]||{};
  Object.entries(sh).forEach(([id, r])=>{
    if(!r.start||!r.end) return;
    const depts = r.depts||['MASTER','TEACHER','SRK','GAK','ATC'];
    if(dept && !depts.includes(dept) && !depts.includes('MASTER')) return;
    list.push({
      date:r.start, endDate:r.end,
      name:r.name||'School Holiday', cat:'SH', isRange:true,
      depts: depts
    });
  });
  // Extra classes — filter by dept (same logic as Calendar deptMatch)
  ((S.extraClasses||{})[yr]||[]).forEach(ec=>{
    if(!ec.start) return;
    const ecDepts = ec.depts||[];
    // Empty depts = applies to all; otherwise must include this dept or MASTER
    if(ecDepts.length>0 && !ecDepts.includes(dept) && !ecDepts.includes('MASTER')) return;
    list.push({ date:ec.start, endDate:ec.end||ec.start, name:ec.name||'Extra Class', cat:'EC', isRange:!!(ec.end&&ec.end!==ec.start), isEC:true, depts:ecDepts });
  });

  list.sort((a,b)=>a.date.localeCompare(b.date));
  return list.filter(h=>{
    const m = parseInt(h.date.slice(5,7));
    if(months.includes(m)) return true;
    if(h.isRange){
      const em = parseInt((h.endDate||h.date).slice(5,7));
      if(months.includes(em)) return true;
    }
    return false;
  });
}

function _noticeCopy(periodId, yr){
  const period = NOTICE_PERIODS.find(p=>p.id===periodId);
  const holidays = _filterPeriodHolidays(yr, period.months);
  const center = (S.meta && S.meta.centerName) || 'Academee';
  let txt = `*${center.toUpperCase()} - HOLIDAY NOTICE*\n*${period.label} ${yr} · ${period.labelCN} ${yr}*\n\n`;
  txt += `Dear Parents, please be informed of our holiday schedule for ${period.label} ${yr}:\n`;
  txt += `亲爱的家长，谨此通知本中心 ${period.labelCN} 的休假日如下：\n\n`;
  if(!holidays.length){
    txt += `(No holidays in this period / 此期间无假期)\n`;
  } else {
    holidays.forEach(h=>{
      const cn = NOTICE_NAME_CN[h.name] || h.name;
      const dateStr = h.isRange ? `${_fmtNoticeDate(h.date)} – ${_fmtNoticeDate(h.endDate)}` : _fmtNoticeDate(h.date);
      txt += `📅 ${dateStr}\n   ${h.name}\n   ${cn}\n\n`;
    });
  }
  const pf = S.noticeFooters[periodId]||S.noticeFooters.p1;
  txt += `${pf.en}\n${pf.cn}\n\n— ${center} Management`;
  navigator.clipboard.writeText(txt).then(()=>alert('✓ Copied to clipboard!\n\nReady to paste into WhatsApp / WeChat.'))
  .catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    alert('✓ Copied to clipboard!');
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// IMPORT / EXPORT
// ═══════════════════════════════════════════════════════════════════════════
function exportAll(){
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `NoticeGo-Holiday_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importAll(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const p = JSON.parse(e.target.result);
      if(!confirm('This will OVERWRITE all current holiday data with the imported file. Continue?')) return;
      if(p.holidayDates    && typeof p.holidayDates==='object')    S.holidayDates    = p.holidayDates;
      if(p.schoolHolDates  && typeof p.schoolHolDates==='object')  S.schoolHolDates  = p.schoolHolDates;
      if(p.specialHolidays && typeof p.specialHolidays==='object') S.specialHolidays = p.specialHolidays;
    if(p.srtDates && typeof p.srtDates==='object') S.srtDates = p.srtDates;
    if(p.noticeFooters && typeof p.noticeFooters==='object') S.noticeFooters = Object.assign({}, S.noticeFooters, p.noticeFooters);
      if(p.festivalDates   && typeof p.festivalDates==='object')   S.festivalDates   = p.festivalDates;
      if(p.extraClasses    && typeof p.extraClasses==='object')    S.extraClasses    = p.extraClasses;
      if(p.meta && typeof p.meta==='object') S.meta = Object.assign({}, S.meta, p.meta);
      saveAll();
      alert('Import successful!');
      location.reload();
    }catch(err){ alert('Import failed: '+err.message); }
  };
  reader.readAsText(file);
}
function clearAll(){
  if(!confirm('⚠️ This will DELETE all holiday data. This cannot be undone. Continue?')) return;
  if(!confirm('Really sure? Click OK to confirm deletion.')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ═══════════════════════════════════════════════════════════════════════════
// LIVE READ from MasterHub Calendar (Supabase SSOT) — all date data, read-only
// ═══════════════════════════════════════════════════════════════════════════
async function _pullFromCalendar(){
  try{
    const { data, error } = await _sb.from('calendar_events').select('*');
    if(error) throw error;
    const TPL_IDS = (typeof SCHOOL_HOL_TEMPLATE!=='undefined') ? SCHOOL_HOL_TEMPLATE.map(t=>t.id) : [];
    const H={}, SHd={}, SP={}, FD={}, EC={};
    for(const r of (data||[])){
      const yr=String(r.year);
      const depts=Array.isArray(r.depts)?r.depts:[];
      const det=r.details||{};
      if(r.type==='public_holiday'){
        (H[yr]=H[yr]||{})[r.name]=r.start_date;
      } else if(r.type==='school_holiday'){
        const key=TPL_IDS.includes(r.name)?r.name:r.id;
        (SHd[yr]=SHd[yr]||{})[key]={ start:r.start_date, end:r.end_date, depts:depts, name:r.name };
      } else if(r.type==='festival'){
        (FD[yr]=FD[yr]||{})[r.name]={ start:r.start_date, end:r.end_date, days:(det.days||{}) };
      } else if(r.type==='extra_class'){
        (EC[yr]=EC[yr]||[]).push({ id:r.id, name:r.name, start:r.start_date, end:r.end_date, time:(det.time||''), msg:(det.msg||''), depts:depts });
      } else if(r.type==='special_holiday'){
        (SP[yr]=SP[yr]||[]).push(Object.assign({ date:r.start_date, name:r.name }, det));
      }
    }
    S.holidayDates=H; S.schoolHolDates=SHd; S.specialHolidays=SP; S.festivalDates=FD; S.extraClasses=EC;
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); }catch(e){}
    if(typeof render_home==='function') render_home();
    if(document.getElementById('page-holidays') && document.getElementById('page-holidays').classList.contains('on') && typeof render_holidays==='function') render_holidays();
  }catch(e){ console.error('Calendar live-read failed → using local cache', e); }
}
