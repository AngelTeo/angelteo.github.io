<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>NoticeGo-Holiday</title>
<style>
:root{
  --acc:#5C1010; --grn:#0F6E56; --org:#854F0B; --red:#A32D2D; --pur:#534AB7;
  --sur:#ffffff; --sur2:#f7f6f2; --bdr:#e0ddd6;
  --txt:#1a1a1a; --mut:#888888; --hint:#bbbbbb;
  --srk:#185FA5; --gak:#0F6E56; --atc:#854F0B; --srt:#7030A0;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:var(--sur2);color:var(--txt);font-size:13px;line-height:1.4}

/* NAV */
.nav{background:#5C1010;border-bottom:.5px solid #3d0a0a;
  display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:50;
  overflow-x:auto;gap:0}
.nav-logo{font-size:13px;font-weight:600;padding:12px 14px 12px 0;
  border-right:.5px solid rgba(255,255,255,.2);margin-right:4px;white-space:nowrap;
  flex-shrink:0;color:#fff}
.ntab{padding:11px 14px;font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;
  border:none;background:transparent;border-bottom:2.5px solid transparent;
  transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.ntab:hover{color:#fff}
.ntab.on{color:#fff;border-bottom-color:#fff;font-weight:600}
.nav-r{margin-left:auto;display:flex;gap:5px;align-items:center;padding-left:10px;flex-shrink:0}

/* BUTTONS */
.btn{padding:5px 12px;border-radius:6px;border:.5px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.12);color:#fff;font-size:11px;cursor:pointer;
  font-family:inherit;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-pri{background:#fff;color:#5C1010;border-color:#fff;font-weight:600}
.btn-plain{background:var(--sur);border:.5px solid var(--bdr);color:var(--txt);font-size:11px;
  padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-plain:hover{background:var(--sur2)}
.btn-grn{background:var(--grn);color:#fff;border:none;font-weight:500;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit}
.btn-red{background:var(--red);color:#fff;border:none;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit}

.saved{font-size:10px;color:var(--grn);margin-right:8px;display:none}

/* PAGES */
.page{display:none;padding:16px;max-width:1400px;margin:0 auto}
.page.on{display:block}

/* CARDS */
.card{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;
  padding:16px;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;gap:8px}
.card-title{font-size:11px;font-weight:500;color:var(--mut);
  letter-spacing:.05em;text-transform:uppercase}

/* TABLES */
table.data{width:100%;border-collapse:collapse;font-size:12px}
table.data thead th{background:#2d2d2d;color:#fff;padding:9px 12px;text-align:left;
  font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  white-space:nowrap;position:sticky;top:0}
table.data tbody td{padding:8px 12px;border-bottom:.5px solid var(--bdr);vertical-align:middle}
table.data tbody tr:nth-child(even){background:var(--sur2)}
table.data tbody tr:hover{background:#FFF9E6}

/* INPUTS */
input[type=text],input[type=number],input[type=date],input[type=email],
input[type=tel],select,textarea{
  border:.5px solid var(--bdr);border-radius:6px;padding:6px 10px;
  font-size:12px;font-family:inherit;background:var(--sur);color:var(--txt);
  min-width:120px;box-sizing:border-box}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;
  font-weight:600;white-space:nowrap}
.b-srk{background:#185FA520;color:#185FA5}
.b-gak{background:#0F6E5620;color:#0F6E56}
.b-atc{background:#854F0B20;color:#854F0B}
.b-srt{background:#7030A020;color:#7030A0}
.b-active{background:#E1F5EE;color:#0F6E56}
.b-inactive{background:#FCEBEB;color:#A32D2D}
.b-sensitive{background:#FFF3CD;color:#854F0B;border:.5px solid #ffc107}

/* SUB NAV */
.sub-nav{background:var(--sur);border-bottom:.5px solid var(--bdr);
  padding:0 16px;gap:2px;position:sticky;top:44px;z-index:49;
  display:flex;overflow-x:auto;align-items:center;min-height:38px}
.sub-ntab{padding:9px 14px;font-size:11px;color:var(--mut);cursor:pointer;
  border:none;background:transparent;border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.sub-ntab:hover{color:var(--txt)}
.sub-ntab.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}

/* MISC */
.tip{font-size:11px;color:var(--mut);margin:8px 0}
.empty{text-align:center;padding:40px 20px;color:var(--hint);font-size:12px}

/* STATS CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;padding:14px 16px}
.stat-n{font-size:26px;font-weight:700;color:var(--acc)}
.stat-l{font-size:10px;color:var(--mut);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

  /* ── Print styles ── */
  @media print {
    /* Hide everything except the calendar content */
    body { background: #fff !important; margin: 0 !important; }
    .nav { display: none !important; }
    .sub-nav { display: none !important; }
    .no-print { display: none !important; }
    .print-only { display: block !important; }
    /* Hide all pages except holidays */
    .page { display: none !important; }
    #page-holidays { display: block !important; }
    /* Hide the holidays sub-nav and controls */
    #page-holidays .sub-nav { display: none !important; }
    /* Show only the calendar tab content */
    #hol-tab-content { padding: 0 !important; }
    /* 4-column calendar grid */
    #cal-grid { grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; }
    /* Force colors to print */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    /* Remove scrollbar space */
    ::-webkit-scrollbar { display: none !important; }
    /* Remove any horizontal scroll containers */
    .page { overflow: visible !important; }
  }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">🌴 NoticeGo-Holiday <span id="build-badge" style="background:#F9CB42;color:#5C1010;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;vertical-align:middle">v1</span></div>
  <button class="ntab on" onclick="goPage('home')">🏠 Home</button>
  <button class="ntab" onclick="goPage('holidays')">📅 Holidays</button>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'academee_holidaygo_v1';
// ═══ SUPABASE (read-only consumer of MasterHub Calendar SSOT) ═══
const SUPABASE_URL = 'https://qnpvqsvvsgsantekgfbz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFucHZxc3Z2c2dzYW50ZWtnZmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzg4MzIsImV4cCI6MjA5MTc1NDgzMn0.8rfv0BQpWNNSD8yrhHNwCOkcG9q5_uMD7B7z_Y324a0';

const S = {

// ═══════════════════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════════════════
function saveAll(){
  S.meta.lastUpdated = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(S));
}
function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return;
  try{
    const p = JSON.parse(raw);
    if(p.holidayDates    && typeof p.holidayDates==='object')    S.holidayDates    = p.holidayDates;
    if(p.schoolHolDates  && typeof p.schoolHolDates==='object')  S.schoolHolDates  = p.schoolHolDates;
    if(p.specialHolidays && typeof p.specialHolidays==='object') S.specialHolidays = p.specialHolidays;
    if(p.srtDates && typeof p.srtDates==='object') S.srtDates = p.srtDates;
    if(p.noticeFooters && typeof p.noticeFooters==='object') S.noticeFooters = Object.assign({}, S.noticeFooters, p.noticeFooters);
    if(p.festivalDates   && typeof p.festivalDates==='object')   S.festivalDates   = p.festivalDates;
    if(p.extraClasses    && typeof p.extraClasses==='object')    S.extraClasses    = p.extraClasses;
    if(p.meta && typeof p.meta==='object') S.meta = Object.assign({}, S.meta, p.meta);
  }catch(e){ console.error('loadData failed', e); }
}
const HOLIDAYGO_BUILD = 36;
function flashSaved(){
  const el = document.getElementById('saved');
  el.style.display='inline';
  setTimeout(()=>el.style.display='none', 1500);
}

// ═══════════════════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════════════════
function goPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(el=>el.classList.remove('on'));
  const pageEl = document.getElementById('page-'+p);
  if(pageEl) pageEl.classList.add('on');
  const map = {home:0,holidays:1,book:2,parent:3,settings:4};
  document.querySelectorAll('.ntab')[map[p]]?.classList.add('on');
  // Call renderer
  const fn = window['render_' + p];
  if(typeof fn==='function') fn();
}

// ═══════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════
function genId(prefix){
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}
function yearToAge(yr){
  if(!yr) return '';
  const thisYear = new Date().getFullYear();
  return thisYear - parseInt(yr);
}
function deptBadge(d){
  const cls = 'b-'+String(d||'').toLowerCase();
  return `<span class="badge ${cls}">${d}</span>`;
}
function statusBadge(s){
  return `<span class="badge ${s==='active'?'b-active':'b-inactive'}">${s}</span>`;
}
function escapeHTML(s){
  return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ═══════════════════════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════
// HOME — Holiday Go landing
// ═══════════════════════════════════════════════════════════════════════════
function render_home(){
  const el = document.getElementById('home-content');
  const yr = window._holYear || new Date().getFullYear();
  const d = _hd(yr);
  const sh = S.schoolHolDates[yr] || {};
  const fd = S.festivalDates[yr] || {};
  const sp = S.specialHolidays[yr] || [];
  const subs = _getSubHols(yr);

  const totalTpl = HOLIDAY_TEMPLATE.length;
  const setTpl = Object.values(d).filter(Boolean).length;
  const shCount = Object.values(sh).filter(r=>r.start&&r.end).length;
  const festCount = Object.values(fd).filter(f=>f.start&&f.end).length;

  el.innerHTML = `
    <div class="card" style="background:linear-gradient(135deg,#FFF8F0 0%,#FFFDF5 100%);border:.5px solid #F9CB42">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div style="font-size:42px">🌴</div>
        <div style="flex:1">
          <div style="font-size:22px;font-weight:700;color:#854F0B">NoticeGo-Holiday</div>
          <div style="font-size:13px;color:var(--mut);margin-top:2px">Academee 假期 + 通知系统 / Holiday & Notice System</div>
        </div>
        <select onchange="window._holYear=parseInt(this.value);render_home()" style="padding:7px 12px;font-size:13px;font-weight:600;border:.5px solid #F9CB42;border-radius:6px;background:#FFFFFF">
          ${[2025,2026,2027,2028].map(y=>`<option value="${y}"${y===yr?' selected':''}>${y}</option>`).join('')}
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:14px">
      ${_homeStat('📋','Template Holidays',`${setTpl}/${totalTpl}`,'#185FA5','#EEF4FB')}
      ${_homeStat('⚖️','Substitute Days',subs.length,'#9C1B4B','#FFF0F6')}
      ${_homeStat('🎉','Festival Periods',festCount,'#D4380D','#FFF0E6')}
      ${_homeStat('🏫','School Holidays',shCount,'#0F6E56','#EDFAF4')}
      ${_homeStat('⚡','Special / Ad-hoc',sp.length,'#7030A0','#F5F0FF')}
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-hdr"><div class="card-title">📤 Quick Actions</div></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:6px">
        <button onclick="goPage('holidays')" class="quick-card" style="background:#FFF8F0;border-color:#F9CB42">
          <div style="font-size:24px">📅</div>
          <div style="font-weight:600;margin-top:6px">Manage Holidays</div>
          <div style="font-size:11px;color:var(--mut);margin-top:3px">Set dates · Festivals · School holidays</div>
        </button>
        <button onclick="goPage('parent')" class="quick-card" style="background:#EDFAF4;border-color:#9FE1CB">
          <div style="font-size:24px">👨‍👩‍👧</div>
          <div style="font-weight:600;margin-top:6px">Parent Notices</div>
          <div style="font-size:11px;color:var(--mut);margin-top:3px">6 bi-monthly notices · 中英双语</div>
        </button>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-hdr"><div class="card-title">🌟 Upcoming Holidays in ${yr}</div></div>
      ${_homeUpcoming(yr)}
    </div>

    <style>
      .quick-card{display:block;text-align:left;padding:14px;border:.5px solid var(--bdr);border-radius:8px;cursor:pointer;font-family:inherit;transition:.15s;color:var(--txt)}
      .quick-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    </style>
  `;
}

function _homeStat(icon, label, val, color, bg){
  return `<div style="background:${bg};border:.5px solid ${color}33;border-radius:8px;padding:11px 14px">
    <div style="font-size:18px">${icon}</div>
    <div style="font-size:22px;font-weight:700;color:${color};margin-top:3px">${val}</div>
    <div style="font-size:10px;color:var(--mut);margin-top:1px">${label}</div>
  </div>`;
}

function _homeUpcoming(yr){
  const today = new Date().toISOString().slice(0,10);
  const list = [];
  const d = _hd(yr);
  HOLIDAY_TEMPLATE.forEach(t=>{
    const dt = t.dt==='fixed' ? `${yr}-${t.md}` : d[t.id];
    if(dt && dt >= today) list.push({date:dt, name:t.name, cat:t.cat});
  });
  FESTIVAL_CONFIG.forEach(fc=>{
    const fest = (S.festivalDates[yr]||{})[fc.id]||{};
    Object.entries(fest.days||{}).forEach(([ds,cat])=>{
      if(ds >= today && (cat==='PH2'||cat==='OFF')){
        list.push({date:ds, name:fc.name+(cat==='OFF'?' (OFF)':' (PH)'), cat:cat});
      }
    });
  });
  (S.specialHolidays[yr]||[]).forEach(s=>{
    if(s.date && s.date >= today) list.push({date:s.date, name:s.name, cat:s.category||'PH2'});
  });
  _getSubHols(yr).forEach(s=>{
    if(s.date >= today) list.push({date:s.date, name:s.name, cat:'SUB'});
  });
  list.sort((a,b)=>a.date.localeCompare(b.date));
  const next = list.slice(0,6);
  if(!next.length) return `<div style="padding:20px;text-align:center;color:var(--hint);font-size:12px">No upcoming holidays. Set them in 📅 Holidays tab.</div>`;
  return `<table class="data" style="margin-top:6px">
    <thead><tr><th>Date</th><th>Day</th><th>Holiday</th><th style="text-align:center">Type</th></tr></thead>
    <tbody>${next.map(r=>{
      const dow = new Date(r.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short'});
      return `<tr>
        <td style="font-weight:600">${_ddmmL(r.date)}</td>
        <td style="color:var(--mut)">${dow}</td>
        <td>${escapeHTML(r.name)}</td>
        <td style="text-align:center">${_catBadge(r.cat)}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

// ═══════════════════════════════════════════════════════════════════════════

const HOLIDAY_TEMPLATE = [

// Festival holidays — flexible day-by-day PH2/OFF marking
const FESTIVAL_CONFIG = [
  { id:'cny',       name:'Tahun Baru Cina',  color:'#D4380D' },
  { id:'raya',      name:'Hari Raya Puasa',  color:'#389E0D' },
  { id:'deepavali', name:'Hari Deepavali',   color:'#7030A0' },
];
const SCHOOL_HOL_TEMPLATE = [
  { id:'sh_midterm1', name:'School Holiday (Mid-term 1)' },
  { id:'sh_midterm2', name:'School Holiday (Mid-term 2)' },
  { id:'sh_yearend',  name:'School Holiday (Year-end)' },
];

// ── HOLIDAY HELPERS ──────────────────────────────────────────────────────
function _hd(yr){ return S.holidayDates[yr] || {}; }
function _getDate(yr, id){ return _hd(yr)[id] || ''; }

// Returns true if date is PH1 or PH2 (not AL deductible)
function isPH(ds){
  const yr = parseInt(ds.slice(0,4));
  const d = _hd(yr);
  if(HOLIDAY_TEMPLATE.filter(t=>t.cat==='PH1'||t.cat==='PH2').some(t=>d[t.id]===ds)) return true;
  if((S.specialHolidays[yr]||[]).some(h=>h.date===ds)) return true;
  // Festival days marked PH2 — must be within declared range
  const fd = S.festivalDates[yr]||{};
  return Object.values(fd).some(f=>f.start&&f.end&&ds>=f.start&&ds<=f.end&&f.days&&f.days[ds]==='PH2');
}
// Returns true if date is OFF (deducts AL, not a gazetted PH)
function isCentreOff(ds){
  const yr = parseInt(ds.slice(0,4));
  const d = _hd(yr);
  if(HOLIDAY_TEMPLATE.filter(t=>t.cat==='OFF').some(t=>d[t.id]===ds)) return true;
  // Festival days marked OFF — must be within declared range
  const fd = S.festivalDates[yr]||{};
  return Object.values(fd).some(f=>f.start&&f.end&&ds>=f.start&&ds<=f.end&&f.days&&f.days[ds]==='OFF');
}
// Returns true if date is inside a school holiday range (deducts AL)
function isSchoolHol(ds){
  const yr = parseInt(ds.slice(0,4));
  const sh = S.schoolHolDates[yr] || {};
  return Object.values(sh).some(r=>r.start && r.end && ds>=r.start && ds<=r.end);
}
function getPHName(ds){
  const yr = parseInt(ds.slice(0,4));
  const d = _hd(yr);
  const t = HOLIDAY_TEMPLATE.find(t=>(t.cat==='PH1'||t.cat==='PH2') && d[t.id]===ds);
  if(t) return t.name;
  const sp = (S.specialHolidays[yr]||[]).find(h=>h.date===ds);
  if(sp) return sp.name;
  const fd = S.festivalDates[yr]||{};
  for(const [fid,f] of Object.entries(fd)){
    if(f.start&&f.end&&ds>=f.start&&ds<=f.end&&f.days&&f.days[ds]==='PH2'){
      const fc=FESTIVAL_CONFIG.find(x=>x.id===fid);
      return fc?fc.name:null;
    }
  }
  return null;
}
function getOffName(ds){
  const yr = parseInt(ds.slice(0,4));
  const d = _hd(yr);
  const t = HOLIDAY_TEMPLATE.find(t=>t.cat==='OFF' && d[t.id]===ds);
  if(t) return t.name;
  const fd = S.festivalDates[yr]||{};
  for(const [fid,f] of Object.entries(fd)){
    if(f.start&&f.end&&ds>=f.start&&ds<=f.end&&f.days&&f.days[ds]==='OFF'){
      const fc=FESTIVAL_CONFIG.find(x=>x.id===fid);
      return fc?fc.name:null;
    }
  }
  return null;
}
function getSchoolHolName(ds){
  const yr = parseInt(ds.slice(0,4));
  const sh = S.schoolHolDates[yr] || {};
  for(const [id,r] of Object.entries(sh)){
    if(r.start && r.end && ds>=r.start && ds<=r.end){
      const tpl = SCHOOL_HOL_TEMPLATE.find(t=>t.id===id);
      return tpl ? tpl.name : 'School Holiday';
    }
  }
  return null;
}
function _holidayDow(ds){ return new Date(ds+'T12:00:00').getDay(); }
function _daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function _isoDate(y,m,d){ return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function _fmtHolDate(ds){
  return new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

function _getSRTDates(yr){
  if(!S.srtDates[yr]) S.srtDates[yr]={fridays:['','','',''],saturdays:['','','','']};
  const s=S.srtDates[yr];
  if(!s.fridays||s.fridays.length<4) s.fridays=['','','',''];
  if(!s.saturdays||s.saturdays.length<4) s.saturdays=['','','',''];
  return s;
}

function _renderHolSRT(){
  const yr=window._holYear;

  // Sub-tabs

      <button onclick="_srtSubTab='${t}';_renderHolSRT()"

function _srtMakeupSat(fridayDs, yr){
  // If Friday is a PH, return the Saturday of that same week
  if(!fridayDs||!isPH(fridayDs)) return null;
  const d=new Date(fridayDs+'T12:00:00');
  d.setDate(d.getDate()+1); // Friday+1 = Saturday
  return d.toISOString().slice(0,10);
}

function _srtMasterHTML(yr){
  const srt=_getSRTDates(yr);
  const rows=[];

  // 4 Fridays
  srt.fridays.filter(Boolean).forEach(ds=>{
    const dow=new Date(ds+'T12:00:00').getDay();
    const isPHDay=isPH(ds);
    const makeup=_srtMakeupSat(ds,yr);
    rows.push({date:ds,type:'Friday OFF',isPH:isPHDay,makeup});
  });
  // 4 Saturdays (designated off)
  srt.saturdays.filter(Boolean).forEach(ds=>{
    rows.push({date:ds,type:'Saturday OFF',isPH:false,makeup:null});
  });
  // Auto makeup Saturdays
  const makeupDates=srt.fridays.filter(Boolean).map(f=>_srtMakeupSat(f,yr)).filter(Boolean);
  makeupDates.forEach(ds=>{
    if(!srt.saturdays.includes(ds))
      rows.push({date:ds,type:'★ Makeup Class',isPH:false,makeup:null,isEC:true});
  });
  rows.sort((a,b)=>a.date.localeCompare(b.date));

  if(!rows.length) return `<div style="padding:30px;text-align:center;color:var(--mut);font-size:13px">
    No SRT dates set yet. Use the Friday and Saturday tabs to configure.
  </div>`;

  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const tableRows=rows.map(r=>{
    const dow=new Date(r.date+'T12:00:00').getDay();
    const dayStr=DAYS[dow];
    const badge=r.isEC
      ? `<span style="background:#FFF0F6;color:#9C1B4B;border-radius:4px;padding:2px 9px;font-size:10px;font-weight:700">EC</span>`
      : r.type==='Friday OFF'
        ? `<span style="background:#FFF9E6;color:#854F0B;border-radius:4px;padding:2px 9px;font-size:10px;font-weight:700">OFF</span>`
        : `<span style="background:#FFF9E6;color:#854F0B;border-radius:4px;padding:2px 9px;font-size:10px;font-weight:700">OFF</span>`;
    const warning=r.isPH?`<span style="font-size:10px;color:#E53935;margin-left:8px">⚠️ PH day → makeup on ${r.makeup}</span>`:'';
    return `<tr style="border-bottom:.5px solid var(--bdr)">
      <td style="padding:10px 8px;font-weight:600">${r.date}</td>
      <td style="padding:10px 8px;color:${dow===6||dow===0?'#E53935':'var(--mut)'}">${dayStr}</td>
      <td style="padding:10px 8px">${r.isEC?'★ Makeup Class (Extra Learning Day)':r.type}${warning}</td>
      <td style="padding:10px 8px">${badge}</td>
    </tr>`;
  }).join('');

  return `<div style="font-size:12px;color:var(--mut);margin-bottom:12px">
    SRT 2026 — ${rows.filter(r=>!r.isEC).length} off days, ${rows.filter(r=>r.isEC).length} makeup class(es)
  </div>
  <table style="width:100%;border-collapse:collapse">
    <thead><tr style="background:var(--nav);color:#fff">
      <th style="padding:8px;text-align:left;font-size:11px">DATE</th>
      <th style="padding:8px;text-align:left;font-size:11px">DAY</th>
      <th style="padding:8px;text-align:left;font-size:11px">TYPE</th>
      <th style="padding:8px;text-align:left;font-size:11px">STATUS</th>
    </tr></thead>
    <tbody>${tableRows}</tbody>
  </table>`;
}

  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // Auto-makeup Saturdays from PH Fridays
  const makeupDates=srt.fridays.filter(Boolean).map(f=>_srtMakeupSat(f,yr)).filter(Boolean);

    const dow=ds?new Date(ds+'T12:00:00').getDay():-1;

    return `<tr style="border-bottom:.5px solid var(--bdr)">
      <td style="padding:10px 8px;font-weight:600;color:var(--mut)">Saturday ${i+1}</td>
      <td style="padding:10px 8px">

          style="padding:5px 8px;font-size:12px;border:.5px solid var(--bdr);border-radius:5px;font-family:inherit;${notSat||isConflict?'border-color:#E53935':''}"

      </td>
      <td style="padding:10px 8px;font-size:11px">
        ${ds&&dow===6&&!isConflict?`<span style="color:#0F6E56">✓ ${DAYS[dow]} — OFF</span>`:''}
        ${notSat?`<span style="color:#E53935">⚠️ Not a Saturday! (${DAYS[dow]})</span>`:''}

      </td>

  const makeupSection=makeupDates.length?`
    <div style="margin-top:16px;padding:10px 14px;background:#FFF9E6;border-radius:6px;border:.5px solid #F9CB42;font-size:11px">
      <b>Auto-generated Makeup Classes:</b><br>

// ═══════════════════════════════════════════════════════════════════════════
// SUBSTITUTE HOLIDAY ENGINE  (Act 369, Section 3)
// Rule: PH1/PH2 falls on Sunday → next Monday becomes substitute PH
//       If that Monday is also PH → keep moving forward
// Company: Working Day = Mon–Sat,  Rest Day = Sunday
// ═══════════════════════════════════════════════════════════════════════════
function _getSubHols(yr){
  const subs = [];
  const d = _hd(yr);

  // ── Collect ALL gazetted PH entries (PH1/PH2/Festival PH2/Special) ──
  // Each entry: { date, name, cat }
  const allPH = [];

  HOLIDAY_TEMPLATE.filter(t=>t.cat==='PH1'||t.cat==='PH2').forEach(t=>{
    const dt = t.dt==='fixed' ? `${yr}-${t.md}` : d[t.id];
    if(dt) allPH.push({ date:dt, name:t.name, cat:t.cat });
  });

  FESTIVAL_CONFIG.forEach(fc=>{
    const fest=(S.festivalDates[yr]||{})[fc.id]||{};
    Object.entries(fest.days||{}).forEach(([date,cat])=>{
      if(cat==='PH2' && new Date(date+'T12:00:00').getDay()!==0)
        allPH.push({ date, name:fc.name, cat:'PH2' });
    });
  });

  (S.specialHolidays[yr]||[]).forEach(h=>{
    allPH.push({ date:h.date, name:h.name, cat:h.category||'PH2' });
  });

  // ── Also collect OFF for company Replace policy ──
  const allOFF = [];
  HOLIDAY_TEMPLATE.filter(t=>t.cat==='OFF').forEach(t=>{
    if(d[t.id]) allOFF.push({ date:d[t.id], name:t.name, cat:'OFF' });
  });

  const allDates = [...allPH, ...allOFF];

  // ── Build date-count map to detect COINCIDING holidays ──
  // dateMap: { 'YYYY-MM-DD': [{ name, cat }, ...] }
  const dateMap = {};
  allDates.forEach(h=>{
    if(!dateMap[h.date]) dateMap[h.date]=[];
    dateMap[h.date].push(h);
  });

  // Set of all taken dates (to avoid double-Replace collisions)
  const taken = new Set(Object.keys(dateMap));

  // Helper: find next available working day
  function nextWorkDay(fromDs){
    let s = new Date(fromDs+'T12:00:00');
    s.setDate(s.getDate()+1);
    while(s.getDay()===0 || taken.has(s.toISOString().slice(0,10))){
      s.setDate(s.getDate()+1);
    }
    return s.toISOString().slice(0,10);
  }

  // ── RULE 1: PH falls on Sunday → Replace ──────────────────────────
  // (Act 369 Section 3, first part)
  Object.entries(dateMap).forEach(([ds, holidays])=>{
    const dow = new Date(ds+'T12:00:00').getDay();
    if(dow !== 0) return; // Only Sunday triggers this rule
    // Use the first PH on that Sunday
    const ph = holidays[0];
    const subDs = nextWorkDay(ds);
    taken.add(subDs);
    subs.push({
      date: subDs, name:'Replace: '+ph.name,
      cat:'SUB', srcDate:ds, srcCat:ph.cat,
      id:'sub_sun_'+ds, isSub:true, fixed:true,
      rule:'Sunday PH → Act 369 S.3'
    });
  });

  // ── RULE 2: Two or more PH coincide on the SAME working day → Replace ─
  // (Act 369 Section 3: "if such day is already a public holiday, then
  //  the day following shall be a public holiday")
  // When 2 gazetted PHs fall on the same weekday, the extra PH generates
  // a substitute — employee is entitled to both days.
  Object.entries(dateMap).forEach(([ds, holidays])=>{
    const dow = new Date(ds+'T12:00:00').getDay();
    if(dow === 0) return; // Sunday already handled above
    // Only triggered when 2+ GAZETTED PHs (PH1/PH2/SP) coincide
    const gazetted = holidays.filter(h=>h.cat==='PH1'||h.cat==='PH2'||h.cat==='SP');
    if(gazetted.length < 2) return;
    // Extra PHs (beyond the first) each generate a Replace
    for(let i=1; i<gazetted.length; i++){
      const ph = gazetted[i];
      const subDs = nextWorkDay(ds);
      taken.add(subDs);
      subs.push({
        date: subDs, name:'Replace: '+ph.name+' (coincides with '+gazetted[0].name+')',
        cat:'SUB', srcDate:ds, srcCat:ph.cat,
        id:'sub_coinc_'+ds+'_'+i, isSub:true, fixed:true,
        rule:'Coinciding PH → Act 369 S.3'
      });
    }
  });

  return subs.sort((a,b)=>a.date.localeCompare(b.date));
}

// Update isPH to recognise substitute holidays
const _isPH_base = isPH;
isPH = function(ds){
  if(_isPH_base(ds)) return true;
  // Check substitute holidays
  const yr = parseInt(ds.slice(0,4));
  return _getSubHols(yr).some(s=>s.date===ds);
};

function getPHNameFull(ds){
  const n = getPHName(ds); if(n) return n;
  const yr = parseInt(ds.slice(0,4));
  const sub = _getSubHols(yr).find(s=>s.date===ds);
  return sub ? sub.name : null;
}

function _renderHolMain(){
  const yr   = window._holYear;
  const d    = _hd(yr);
  const sh   = S.schoolHolDates[yr]||{};
  const spec = S.specialHolidays[yr]||[];
  const fd   = S.festivalDates[yr]||{};
  const subs = _getSubHols(yr);

  // ── Build holiday rows (public + festival PH2 + substitutes + specials) ──
  const rows = [];
  HOLIDAY_TEMPLATE.forEach(t=>{ rows.push({ date:d[t.id]||'', name:t.name, cat:t.cat, id:t.id, fixed:t.dt==='fixed', isTpl:true }); });
  FESTIVAL_CONFIG.forEach(fc=>{
    const fest=fd[fc.id]||{};
    if(!fest.start||!fest.end) return;
    let cur=new Date(fest.start+'T12:00:00'),end=new Date(fest.end+'T12:00:00');
    while(cur<=end){
      if(cur.getDay()!==0){
        const ds=cur.toISOString().slice(0,10);
        const cat=(fest.days||{})[ds]||'OFF';
        if(cat==='PH2') rows.push({ date:ds, name:fc.name, cat, id:'fest_'+fc.id+'_'+ds, fixed:true, isFest:true, festId:fc.id });
      }
      cur.setDate(cur.getDate()+1);
    }
  });
  subs.forEach(s=> rows.push({...s, fixed:true}));
  spec.forEach(hh=>{ rows.push({ date:hh.date, name:hh.name, cat:'SP', id:hh.id, fixed:false, isSpec:true }); });
  rows.sort((a,b)=>{ if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1; return a.date.localeCompare(b.date); });
  const setSub = subs.length;

  // ── READ-ONLY BANNER ──
  let h=`<div class="card" style="background:#FFF8E8;border-color:#F9CB42;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">

    </div>
    <a href="MasterHub_Calendar.html" target="_blank" style="text-decoration:none">
      <button class="btn-plain" style="font-size:11px;padding:5px 12px;background:#5C1010;color:#fff;border:none">Open Calendar ↗</button>

  // ── HOLIDAY TABLE (read-only) ──
  h+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">
    <div style="padding:9px 16px;background:var(--sur2);border-bottom:.5px solid var(--bdr);display:flex;align-items:center;gap:14px;font-size:11px;flex-wrap:wrap">
      <span>${yr} Holidays</span>
      ${setSub>0?`<span style="color:#9C1B4B;font-weight:600">↔ ${setSub} substitute day${setSub>1?'s':''} auto-generated</span>`:''}
    </div>
    <div style="overflow-x:auto"><table class="data">
      <thead><tr><th style="width:100px">Date</th><th style="width:48px">Day</th><th>Holiday Name</th><th style="width:68px;text-align:center">Type</th></tr></thead>
      <tbody>`;
  rows.forEach(r=>{
    const hasDt=!!r.date, d2=hasDt?new Date(r.date+'T12:00:00'):null;
    const dow=d2?d2.toLocaleDateString('en-GB',{weekday:'short'}):'';
    const isSat=d2&&d2.getDay()===6, isSun=d2&&d2.getDay()===0;
    const dayCol=isSun?'color:var(--red)':isSat?'color:var(--acc)':'color:var(--mut)';
    const rowBg=r.isSub?'background:#FFF0F6':(!hasDt?'background:#fafafa':'');
    const ruleLabel=r.rule?(r.rule.includes('Coinciding')
      ?`<span style="font-size:9px;background:#EDE9FE;color:#7030A0;border-radius:3px;padding:1px 5px;margin-left:6px">Coinciding PH</span>`
      :`<span style="font-size:9px;background:#FFF0F6;color:#9C1B4B;border-radius:3px;padding:1px 5px;margin-left:6px">Sunday PH</span>`):'';
    const nameCell=r.isSub
      ?`<span style="color:#9C1B4B;font-weight:600">${escapeHTML(r.name)}</span>${ruleLabel}<span style="font-size:10px;color:var(--mut);margin-left:6px">← ${r.srcDate?_ddmmL(r.srcDate):''}</span>`
      :escapeHTML(r.name);
    h+=`<tr style="${rowBg}">
      <td style="font-weight:${hasDt?'600':'400'};color:${hasDt?'var(--txt)':'var(--hint)'}">${r.date||'—'}</td>
      <td style="${dayCol}">${dow}</td>
      <td style="color:${hasDt?'var(--txt)':'var(--hint)'}">${nameCell}</td>
      <td style="text-align:center">${_catBadge(r.cat)}</td>
    </tr>`;
  });
  if(!rows.length) h+=`<tr><td colspan="4" style="padding:28px;text-align:center;color:var(--hint)">No holidays. Manage them in MasterHub Calendar.</td></tr>`;
  h+=`</tbody></table></div></div>`;

  // ── SPECIAL / AD-HOC (read-only) ──
  h+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">
    <div style="padding:9px 16px;background:#F5F0FF;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="background:#EDE9FE;color:#7030A0;border-radius:4px;padding:2px 9px;font-size:10px;font-weight:700">⚡ SPECIAL / AD-HOC GAZETTED</span>
      <span style="font-size:10px;color:var(--mut);flex:1">Government ad-hoc holidays (PH1/PH2)</span>
    </div>
    ${!spec.length
      ? `<div style="padding:12px 16px;font-size:12px;color:var(--hint)">None.</div>`
      : spec.map(s=>`<div style="display:flex;align-items:center;padding:8px 16px;border-bottom:.5px solid var(--bdr);gap:12px;flex-wrap:wrap">
          <span style="font-size:12px;font-weight:600;flex:1;min-width:160px">${escapeHTML(s.name||'')}</span>
          <span style="font-size:11px">📅 ${s.date?_ddmmL(s.date):'—'}</span>
          ${_catBadge(s.category||'PH1')}

  </div>`;

  // ── FESTIVAL (read-only) ──
  h+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">
    <div style="padding:9px 16px;background:#FFF8F0;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="background:#FFF0E6;color:#D4380D;border-radius:4px;padding:2px 9px;font-size:10px;font-weight:700">FESTIVAL</span>
      <span style="font-size:11px;font-weight:600;color:#D4380D">Festival Holidays</span>
    </div>`;
  FESTIVAL_CONFIG.forEach(fc=>{
    const fest=fd[fc.id]||{}; const s=fest.start||'', e=fest.end||''; const days=fest.days||{};
    let badges='';
    if(s&&e){
      let cur=new Date(s+'T12:00:00'), end2=new Date(e+'T12:00:00');
      while(cur<=end2){
        const ds=cur.toISOString().slice(0,10); const dow2=cur.getDay();
        const dayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dow2]; const ddmm=_ddmmS(ds);
        if(dow2===0){
          const isSunPH2=(days[ds]==='PH2');
          badges+=`<span style="display:inline-flex;flex-direction:column;align-items:center;background:${isSunPH2?'#f5f0ff':'#f8f8f8'};color:${isSunPH2?'#9C1B4B':'#bbb'};border:.5px solid ${isSunPH2?'#C4B5FD':'#e0e0e0'};border-radius:5px;padding:5px 8px;font-size:10px;margin:2px;min-width:64px"><span>${ddmm} Sun</span><b style="font-size:9px;margin-top:2px">${isSunPH2?'PH2':'Rest'}</b></span>`;
        } else {
          const cat=days[ds]||'OFF'; const isPH2=cat==='PH2';
          const bgC=isPH2?'#EDFAF4':'#FFF9E6',colC=isPH2?'#0F6E56':'#854F0B',bdrC=isPH2?'#9FE1CB':'#F9CB42';
          badges+=`<span style="display:inline-flex;flex-direction:column;align-items:center;background:${bgC};color:${colC};border:.5px solid ${bdrC};border-radius:5px;padding:5px 8px;font-size:10px;margin:2px;min-width:64px"><span>${ddmm} ${dayName}</span><b style="font-size:10px;margin-top:2px">${cat}</b></span>`;
        }
        cur.setDate(cur.getDate()+1);
      }
    }
    const rangeStr=(s&&e)?(_ddmmL(s)+' – '+_ddmmL(e)):'Not set';
    h+=`<div style="padding:12px 16px;border-bottom:.5px solid var(--bdr)">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:${badges?'8px':'0'}">
        <div style="font-size:12px;font-weight:700;color:${fc.color};min-width:150px">${fc.name}</div>
        <span style="font-size:11px;color:var(--mut)">📅 ${rangeStr}</span>
      </div>
      ${badges?`<div style="display:flex;flex-wrap:wrap;gap:2px">${badges}</div>`:''}
    </div>`;
  });
  h+=`</div>`;

  // ── SCHOOL HOLIDAYS (read-only) ──
  const allSHRows=[
    ...SCHOOL_HOL_TEMPLATE.map(t=>({ id:t.id, name:(sh[t.id]&&sh[t.id].name)||'School Holiday', start:(sh[t.id]&&sh[t.id].start)||'', end:(sh[t.id]&&sh[t.id].end)||'', depts:(sh[t.id]&&sh[t.id].depts)||[] })),
    ...Object.entries(sh).filter(([k])=>k.startsWith('sh_custom_')).map(([k,v])=>({ id:k, name:v.name||'School Holiday', start:v.start||'', end:v.end||'', depts:v.depts||[] })),
  ];
  h+=`<div class="card" style="padding:0;overflow:hidden">
    <div style="padding:9px 16px;background:#EDFAF4;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      ${_catBadge('SH')}
      <span style="font-size:11px;font-weight:600;color:#0F6E56">School Holiday</span>
      <span style="font-size:10px;color:var(--mut);flex:1">Deducted from AL · Follow KPM calendar</span>
    </div>`;
  allSHRows.forEach(row=>{
    const sv=row.start, ev=row.end, set=sv&&ev;
    const cnt=set?_scDayCount(sv,ev):{al:0,total:0,ph:0};
    const realDepts=(row.depts||[]).filter(x=>x!=='MASTER'&&x!=='TEACHER');
    const deptBadges=realDepts.length
      ? realDepts.map(dep=>`<span style="font-size:9px;background:var(--sur2);border:.5px solid var(--bdr);border-radius:4px;padding:1px 6px;color:var(--txt)">${dep}</span>`).join(' ')
      : `<span style="font-size:10px;color:var(--hint)">All</span>`;
    h+=`<div style="display:flex;align-items:center;padding:9px 16px;border-bottom:.5px solid var(--bdr);gap:12px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:600;min-width:120px">${escapeHTML(row.name)}</span>
      <span style="display:flex;gap:4px;flex-wrap:wrap">${deptBadges}</span>
      <span style="font-size:11px;color:var(--txt)">📅 ${set?(_ddmmL(sv)+' – '+_ddmmL(ev)):'—'}</span>
      ${set&&cnt.al>0?`<span style="font-size:11px;color:#0F6E56;font-weight:600">✓ ${cnt.al}d AL</span>`:''}
      ${set&&cnt.ph>0?`<span style="font-size:10px;color:var(--mut)">(${cnt.ph}PH)</span>`:''}
    </div>`;
  });
  h+=`</div>`;

  // ── ★ EXTRA CLASS (read-only — managed in MasterHub Calendar) ──────────────
  const ec = ((S.extraClasses||{})[yr]||[]);
  h+=`<div class="card" style="padding:0;overflow:hidden;margin-top:14px">
    <div style="padding:9px 16px;background:#FFF8E8;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="background:#FFF3C4;color:#7D5A00;border-radius:4px;padding:2px 9px;font-size:10px;font-weight:700">★ EXTRA CLASS</span>
      <span style="font-size:11px;font-weight:600;color:#7D5A00">Extra Class During School Holiday</span>
      <span style="font-size:10px;color:var(--mut);flex:1">Read-only · Managed in MasterHub Calendar</span>
      <span style="font-size:9px;color:#7D5A00;background:#FFF3C4;border-radius:4px;padding:2px 8px">🔒 via Calendar</span>
    </div>`;

  if(!ec.length){
    h+=`<div style="padding:12px 16px;font-size:12px;color:var(--hint)">No extra class periods. Add them in MasterHub Calendar.</div>`;
  } else {
    ec.forEach((e)=>{
      const depts=(e.depts||[]);
      const deptBadges = depts.length
        ? depts.map(d=>`<span style="font-size:9px;background:var(--sur2);border:.5px solid var(--bdr);border-radius:4px;padding:1px 6px;color:var(--txt)">${d}</span>`).join(' ')
        : `<span style="font-size:10px;color:var(--hint)">All</span>`;
      const dateStr = e.start ? (_ddmmL(e.start)+(e.end&&e.end!==e.start?' – '+_ddmmL(e.end):'')) : '—';
      h+=`<div style="display:flex;align-items:center;padding:9px 16px;border-bottom:.5px solid var(--bdr);gap:12px;flex-wrap:wrap;background:#FFFDF5">
        <span style="font-size:12px;font-weight:600;color:var(--txt);min-width:120px">${escapeHTML(e.name||'Extra Class')}</span>
        <span style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">${deptBadges}</span>
        <span style="font-size:11px;color:var(--txt)">📅 ${dateStr}</span>
        ${e.time?`<span style="font-size:11px;color:var(--mut)">🕐 ${escapeHTML(e.time)}</span>`:''}
        ${e.msg?`<span style="font-size:11px;color:var(--mut)">💬 ${escapeHTML(e.msg)}</span>`:''}
      </div>`;
    });
  }
  h+=`</div>`;

  document.getElementById('hol-tab-content').innerHTML=h;
}

// ── Festival helpers ───────────────────────────────────────────────────
// Date format helpers
function _ddmmS(ds){ return ds.slice(8)+'/'+ds.slice(5,7); }        // DD/MM
function _ddmmL(ds){ return ds.slice(8)+'/'+ds.slice(5,7)+'/'+ds.slice(0,4); } // DD/MM/YYYY

// Sunday toggle: clicking marks/unmarks Sunday as PH2 + manages substitute
function _holFestToggleSun(fid, sunDs, subDs, yr){
  if(!S.festivalDates[yr]||!S.festivalDates[yr][fid]) return;
  const days=S.festivalDates[yr][fid].days||{};
  if(days[sunDs]==='PH2'){
    // Un-mark: remove PH2 from Sunday and its substitute
    days[sunDs]='REST';
    if(days[subDs]==='PH2') delete days[subDs];
  } else {
    // Mark Sunday as PH2 → auto-set substitute as PH2
    days[sunDs]='PH2';
    days[subDs]='PH2';
  }
  S.festivalDates[yr][fid].days=days;
  saveAll(); _renderHolMain();
}

function _holFestRange(fid, field, val, yr){
  if(!S.festivalDates[yr]) S.festivalDates[yr]={};
  if(!S.festivalDates[yr][fid]) S.festivalDates[yr][fid]={start:'',end:'',days:{}};
  S.festivalDates[yr][fid][field]=val;
  // When range changes, default all weekdays to OFF
  const fest=S.festivalDates[yr][fid];
  if(fest.start&&fest.end){
    let cur=new Date(fest.start+'T12:00:00'),end=new Date(fest.end+'T12:00:00');
    while(cur<=end){
      const ds=cur.toISOString().slice(0,10);
      // Weekdays default OFF; Sundays left undefined (clickable Rest Day)
      if(cur.getDay()!==0 && !fest.days[ds]) fest.days[ds]='OFF';
      cur.setDate(cur.getDate()+1);
    }
  }
  saveAll(); _renderHolMain();
}
function _holFestToggle(fid, ds, yr){
  if(!S.festivalDates[yr]) return;
  const fest=S.festivalDates[yr][fid];
  if(!fest||!fest.days) return;
  fest.days[ds] = (fest.days[ds]==='PH2') ? 'OFF' : 'PH2';
  saveAll(); _renderHolMain();
}
function _holFestSetAllPH2(fid, yr){
  const fest=(S.festivalDates[yr]||{})[fid];
  if(!fest||!fest.days) return;
  Object.keys(fest.days).forEach(ds=>{ fest.days[ds]='PH2'; });
  saveAll(); _renderHolMain();
}
function _holFestSetAllOFF(fid, yr){
  const fest=(S.festivalDates[yr]||{})[fid];
  if(!fest||!fest.days) return;
  Object.keys(fest.days).forEach(ds=>{ fest.days[ds]='OFF'; });
  saveAll(); _renderHolMain();
}

// ── Helpers ────────────────────────────────────────────────────────────
function _holDateChanged(id,val,yr){
  if(!S.holidayDates[yr]) S.holidayDates[yr]={};
  S.holidayDates[yr][id]=val;
  saveAll(); _renderHolMain();
}
function _holClearDate(id,yr){
  if(!confirm('Clear this date?')) return;
  if(S.holidayDates[yr]) S.holidayDates[yr][id]='';
  saveAll(); _renderHolMain();
}
function _holAutoFestival(fkey,day1date,yr){
  if(!day1date){alert('Set Day 1 in the table first.');return;}
  if(!S.holidayDates[yr]) S.holidayDates[yr]={};
  const keys=fkey==='cny'
    ?['ph2_cny2','off_cny3','off_cny4','off_cny5','off_cny6','off_cny7']
    :['ph2_raya2','off_raya3','off_raya4','off_raya5','off_raya6','off_raya7'];
  const base=new Date(day1date+'T12:00:00');
  keys.forEach((k,i)=>{const nd=new Date(base);nd.setDate(nd.getDate()+(i+1));S.holidayDates[yr][k]=nd.toISOString().slice(0,10);});
  saveAll(); _renderHolMain();
}
function _holAutoFill(yr){
  if(!S.holidayDates[yr]) S.holidayDates[yr]={};
  HOLIDAY_TEMPLATE.filter(t=>t.dt==='fixed').forEach(t=>{S.holidayDates[yr][t.id]=`${yr}-${t.md}`;});
  saveAll(); _renderHolMain();
}
function _holSHChanged(shId,field,val,yr){
  if(!S.schoolHolDates[yr]) S.schoolHolDates[yr]={};
  if(!S.schoolHolDates[yr][shId]) S.schoolHolDates[yr][shId]={depts:['MASTER','TEACHER','SRK','GAK','ATC']};
  if(!S.schoolHolDates[yr][shId].depts) S.schoolHolDates[yr][shId].depts=['TEACHER','SRK','GAK','ATC'];
  S.schoolHolDates[yr][shId][field]=val;
  saveAll(); _renderHolMain();
}
function _holAddSpecial(yr){
  if(!S.specialHolidays[yr]) S.specialHolidays[yr]=[];
  S.specialHolidays[yr].push({ id:genId('sp'), name:'Special Holiday', date:'', category:'PH1' });
  saveAll(); _renderHolMain();
}
function _holSpecialUpdate(yr, id, field, val){
  const spec = S.specialHolidays[yr];
  if(!spec) return;
  const item = spec.find(s=>s.id===id);
  if(!item) return;
  item[field] = val;
  saveAll();
  // Re-render only when date changes (to re-sort the table)
  if(field==='date') _renderHolMain();
}
function _holDeleteSpecial(yr,id){
  if(S.specialHolidays[yr]) S.specialHolidays[yr]=S.specialHolidays[yr].filter(h=>h.id!==id);
  saveAll(); _renderHolMain();
}
function _holSHAllDepts(id, checked, yr){
  if(!S.schoolHolDates[yr]||!S.schoolHolDates[yr][id]) return;
  S.schoolHolDates[yr][id].depts = checked ? ['MASTER','TEACHER','SRK','GAK','ATC'] : [];
  saveAll(); _renderHolMain();
}
function _holSHToggleDept(id, dept, checked, yr){
  if(!S.schoolHolDates[yr]||!S.schoolHolDates[yr][id]) return;
  const rec = S.schoolHolDates[yr][id];
  if(!rec.depts) rec.depts=['TEACHER','SRK','GAK','ATC'];
  if(checked){ if(!rec.depts.includes(dept)) rec.depts.push(dept); }
  else { rec.depts = rec.depts.filter(d=>d!==dept); }

}
function _holAddCustomSH(yr){
  if(!S.schoolHolDates[yr]) S.schoolHolDates[yr]={};
  const id='sh_custom_'+Date.now();
  S.schoolHolDates[yr][id]={start:'',end:'',name:'School Holiday',depts:['MASTER','TEACHER','SRK','GAK','ATC']};
  saveAll(); _renderHolMain();
}
function _holDeleteCustomSH(id,yr){ _holDeleteSHRow(id,yr); } // backward compat
function _holDeleteSHRow(id, yr){
  if(!confirm('Delete this school holiday period?')) return;
  if(!S.schoolHolDates[yr]) S.schoolHolDates[yr]={};
  // For preset slots: clear data but keep key (so it shows as blank)
  // For custom slots: remove entirely
  if(id.startsWith('sh_custom_')){
    delete S.schoolHolDates[yr][id];
  } else {
    // Clear preset slot data
    S.schoolHolDates[yr][id] = { start:'', end:'', depts:['MASTER','TEACHER','SRK','GAK','ATC'], name:'School Holiday' };
  }
  saveAll(); _renderHolMain();
}
function _holRenameSH(id, name, yr){
  if(!S.schoolHolDates[yr]) S.schoolHolDates[yr]={};
  if(!S.schoolHolDates[yr][id]) S.schoolHolDates[yr][id]={depts:['MASTER','TEACHER','SRK','GAK','ATC']};
  S.schoolHolDates[yr][id].name = name;
  saveAll();
}

// ── Extra Class helpers ─────────────────────────────────────────────────
function _ecAdd(yr){

  S.extraClasses[yr].push({id:genId('ec'),name:'Extra Class',start:'',end:'',time:'',depts:[]});

function _ecUpdate(yr,idx,field,val){
  if(!S.extraClasses[yr]||!S.extraClasses[yr][idx]) return;
  S.extraClasses[yr][idx][field]=val;
  saveAll(); if(field==='start'||field==='end') _renderHolMain();

function _ecDelete(yr,idx){
  if(!S.extraClasses||!S.extraClasses[yr]) return;
  S.extraClasses[yr].splice(idx,1);
  saveAll(); _renderHolMain();
}
function _ecAllDepts(yr,idx,checked){
  if(!S.extraClasses[yr]||!S.extraClasses[yr][idx]) return;
  S.extraClasses[yr][idx].depts=checked?['MASTER','TEACHER','SRK','GAK','ATC']:[];
  saveAll(); _renderHolMain();
}
function _ecToggleDept(yr,idx,dept,checked){
  if(!S.extraClasses[yr]||!S.extraClasses[yr][idx]) return;
  const ec=S.extraClasses[yr][idx];
  if(!ec.depts) ec.depts=[];
  if(checked){if(!ec.depts.includes(dept)) ec.depts.push(dept);}
  else{ec.depts=ec.depts.filter(d=>d!==dept);}
  saveAll(); _renderHolMain();
}
function isExtraClass(ds,dept){
  const yr=parseInt(ds.slice(0,4));
  return ((S.extraClasses||{})[yr]||[]).some(e=>{
    if(!e.start||!e.end||ds<e.start||ds>e.end) return false;
    return !dept||!e.depts||!e.depts.length||e.depts.includes(dept);
  });
}
function getECInfo(ds,dept){
  const yr=parseInt(ds.slice(0,4));
  return ((S.extraClasses||{})[yr]||[]).find(e=>{
    if(!e.start||!e.end||ds<e.start||ds>e.end) return false;
    return !dept||!e.depts||!e.depts.length||e.depts.includes(dept);
  });
}

function _scDayCount(s,e){
  let al=0, total=0, phDays=0;
  let d=new Date(s+'T12:00:00'), end=new Date(e+'T12:00:00');
  while(d<=end){
    const dow=d.getDay();
    const ds=d.toISOString().slice(0,10);
    if(dow!==0){ // Mon–Sat (working days)
      total++;
      if(isPH(ds)||_getSubHols(parseInt(ds.slice(0,4))).some(sub=>sub.date===ds)){
        phDays++; // PH day — no AL deducted
      } else {
        al++; // AL will be deducted
      }
    }
    d.setDate(d.getDate()+1);
  }
  return { al, total, ph:phDays };
}
// Simple count for backward-compat (just AL days)
function _scDayCountNum(s,e){ return _scDayCount(s,e).al; }

// ═══════════════════════════════════════════════════════════════════════════
// CALENDAR VIEW
// ═══════════════════════════════════════════════════════════════════════════
function _renderHolCalendar(){
  const yr      = window._holYear;
  const mode = window._calMode || 'master';
  // Derive dept and view from mode
  const dept = (mode==='master') ? 'MASTER'
             : (mode==='hr')     ? (window._calDept==='TEACHER'?'TEACHER':'MASTER')
             :                     (['SRK','GAK','ATC'].includes(window._calDept)?window._calDept:'MASTER');
  const view = (mode==='parent') ? 'parent' : 'hr';
  const todayDs = new Date().toISOString().slice(0,10);
  const MONTHS  = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];
  const d = _hd(yr), sh = S.schoolHolDates[yr]||{};

  // Dept filter helper
  const deptMatch = (depts) => !depts || !depts.length || (depts||[]).includes(dept);

  // Saturday is working day for MASTER/TEACHER in HR view
  const satIsWork = (view==='hr') && DEPT_HR_VIEW.includes(dept);
  // In parent view, Saturday is always non-class for all
  const satIsClass = false; // Saturday never shown as class day

  // School holiday checker (dept-aware)
  function isSHForDept(ds){
    return Object.values(sh).some(r=>{
      if(!r.start||!r.end) return false;
      if(ds<r.start||ds>r.end) return false;
      return deptMatch(r.depts);
    });
  }
  function getSHName(ds){
    for(const r of Object.values(sh)){
      if(!r.start||!r.end) continue;
      if(ds<r.start||ds>r.end) continue;
      if(deptMatch(r.depts)) return r.name||'School Holiday';
    }
    return null;
  }

  // Act 369 S.3: Replace ONLY triggered by Sunday PH
  const subs = _getSubHols(yr);
  const subDates = new Set(subs.map(s=>s.date));

  // ── COLOR LOGIC ──────────────────────────────────────────────────────
  // Template PH1/PH2/OFF/SUB/Special → black white (gazetted / centre closed)
  // Festival PH2/OFF                 → grey bold black
  // School Hol                       → grey bold black
  // Sunday / non-working Sat         → black white
  // Working day                      → white black

  // Get festival category — template holidays always override festival range
  const _tplDates = new Set(
    HOLIDAY_TEMPLATE.map(t => t.dt==='fixed' ? `${yr}-${t.md}` : (d[t.id]||'')).filter(Boolean)
  );
  const getFestCat = (ds) => {
    const dow2 = new Date(ds+'T12:00:00').getDay();
    if(dow2===0) return null;
    if(_tplDates.has(ds)) return null; // Template wins
    for(const fc of FESTIVAL_CONFIG){
      const fest=(S.festivalDates[yr]||{})[fc.id]||{};
      if(!fest.start||!fest.end) continue;
      if(ds>=fest.start && ds<=fest.end){
        return (fest.days||{})[ds] || 'OFF';
      }
    }
    return null;
  };

  function getDayStyle(ds, dow){
    const isSun    = dow===0, isSat = dow===6;
    const blackSat = isSat && !satIsWork; // SRK/GAK/ATC Saturday = black

    // Sunday / SRK-Sat → always black
    if(isSun || blackSat){
      return { bg:'#000', numCol:'#fff', bold:false };
    }

    const festCat = getFestCat(ds);
    const shDay   = isSHForDept(ds);
    const isSpec  = (S.specialHolidays[yr]||[]).some(h=>h.date===ds);
    const isSub   = subDates.has(ds);

    // Template PH1/PH2 (non-festival) → black white
    const nonFestPH = (isPH(ds) && !festCat) || isSpec || isSub;
    // Template OFF (non-festival) → black white
    const nonFestOFF = isCentreOff(ds) && !festCat;

    if(nonFestPH || nonFestOFF){
      return { bg:'#000', numCol:'#fff', bold:true };
    }

    // Festival PH2 → black white (is a public holiday)
    if(festCat==='PH2'){
      return { bg:'#000', numCol:'#fff', bold:true };
    }

    // Festival OFF → grey black (closed but not gazetted PH)
    if(festCat==='OFF'){
      return { bg:'#AAAAAA', numCol:'#000', bold:true };
    }

    // School Holiday → grey black
    if(shDay){
      return { bg:'#AAAAAA', numCol:'#000', bold:true };
    }

    // Normal working / class day
    return { bg:'#fff', numCol:'#000', bold:false };
  }

  // ── BUILD HTML ────────────────────────────────────────────────────────
  // ── Button logic: MASTER / HR View / Parent View are mutually exclusive ──
  function _calBtn(label, active, onclick, color){
    const c = color||'#3d1a1a';
    return `<button onclick="${onclick};_renderHolCalendar()"
      style="padding:4px 10px;font-size:11px;border-radius:5px;cursor:pointer;font-family:inherit;
             background:${active?c:'var(--sur)'};color:${active?'#fff':'var(--txt)'};
             border:.5px solid ${active?c:'var(--bdr)'}">
      ${label}
    </button>`;
  }
  // Three mutually exclusive top buttons
  const masterBtn = _calBtn('MASTER',           mode==='master', "window._calMode='master'");
  const hrBtn     = _calBtn('👔 HR View',       mode==='hr',     "window._calMode='hr'",     '#185FA5');
  const parBtn    = _calBtn('👨‍👩‍👧 Parent View', mode==='parent', "window._calMode='parent'", '#185FA5');
  // Sub-dept buttons (only shown when mode = hr or parent)
  const subDeptBtns = (mode==='master') ? ''
    : (mode==='hr')
      ? _calBtn('TEACHER', dept==='TEACHER', "window._calDept='TEACHER'")
      : ['SRK','GAK','ATC','SRT'].map(d2=>_calBtn(d2, dept===d2, `window._calDept='${d2}'`)).join('');

  // Legend
  const hrLegend = `
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:#000;border-radius:2px"></div> <b>PH / OFF / Replace</b> (black)</div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:#AAAAAA;border-radius:2px"></div> Festival / School Hol / Weekend</div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:#fff;border:.5px solid #ccc;border-radius:2px"></div> Working Day</div>`;
  const parentLegend = `
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:#000;border-radius:2px"></div> <b>Holiday</b> (black)</div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:#AAAAAA;border-radius:2px"></div> Festival / School Hol / Weekend</div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;background:#fff;border:.5px solid #ccc;border-radius:2px"></div> Class Day</div>`;

  let html = `
  <!-- Controls (hidden on print) -->
  <div class="no-print" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${masterBtn}
    <div style="width:.5px;height:24px;background:var(--bdr);margin:0 2px"></div>
    ${hrBtn}${parBtn}
    <div style="width:.5px;height:24px;background:var(--bdr);margin:0 2px"></div>
    <div style="display:flex;gap:5px">${subDeptBtns}</div>
    <button onclick="_calPrint()" class="no-print"
      style="margin-left:auto;padding:5px 14px;font-size:11px;background:#3d1a1a;color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:inherit">
      🖨️ Print
    </button>
  </div>

  <!-- Print header (visible only on print) -->
  <div class="print-only" style="text-align:center;margin-bottom:16px;display:none">
    <div style="font-size:20px;font-weight:700">${yr}</div>
    <div style="font-size:14px">${dept} · ${view==='hr'?'HR View':'Parent View'}</div>
  </div>

  <!-- Legend -->
  <div class="no-print" style="display:flex;gap:14px;flex-wrap:wrap;font-size:10px;margin-bottom:12px;padding:8px 12px;background:var(--sur);border:.5px solid var(--bdr);border-radius:8px">
    ${view==='hr'?hrLegend:parentLegend}
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px" id="cal-grid">`;

  for(let mo=1; mo<=12; mo++){
    const firstDow = _holidayDow(_isoDate(yr,mo,1));
    const days     = _daysInMonth(yr,mo);
    const af       = (firstDow+6)%7;
    const ms       = `${yr}-${String(mo).padStart(2,'0')}`;

    // Count indicators for month header — only shown for TEACHER + HR View
    // PH  = strictly gazetted: Template PH1/PH2 + Festival PH2 + Special
    //       (NOT SUB/Replace — those are Act 369 extra entitlement, on top of 11 base PHs)
    // OFF = Template OFF + Festival OFF (AL deducted)
    // SUB = not counted in either badge (separate Act 369 entitlement)
    const showBadges = (dept==='TEACHER' && view==='hr');
    let mPH=0, mOFF=0, mSH=false;
    if(showBadges){
      for(let dd=1; dd<=days; dd++){
        const ds2=_isoDate(yr,mo,dd), dow2=_holidayDow(ds2);
        if(dow2===0) continue; // Skip Sundays
        // PH: Template PH1/PH2
        const isTplPH = HOLIDAY_TEMPLATE.filter(t=>t.cat==='PH1'||t.cat==='PH2')
          .some(t=>{ const dt=t.dt==='fixed'?`${yr}-${t.md}`:d[t.id]; return dt===ds2; });
        // PH: Festival PH2
        const isFestPH2 = (()=>{
          for(const fc of FESTIVAL_CONFIG){
            const fest=(S.festivalDates[yr]||{})[fc.id]||{};
            if(ds2>=(fest.start||'zz')&&ds2<=(fest.end||'')&&(fest.days||{})[ds2]==='PH2') return true;
          }
          return false;
        })();
        // PH: Special/Ad-hoc
        const isSpecial = (S.specialHolidays[yr]||[]).some(h=>h.date===ds2);
        // OFF: Template OFF (not PH, not SUB)
        const isTplOFF = HOLIDAY_TEMPLATE.filter(t=>t.cat==='OFF')
          .some(t=>d[t.id]===ds2);
        // OFF: Festival OFF
        const isFestOFF = (()=>{
          for(const fc of FESTIVAL_CONFIG){
            const fest=(S.festivalDates[yr]||{})[fc.id]||{};
            if(ds2>=(fest.start||'zz')&&ds2<=(fest.end||'')&&(fest.days||{})[ds2]==='OFF') return true;
          }
          return false;
        })();

        // SUB (Replace): count as PH only if source was PH1/PH2/Special
        const subEntry = subDates.has(ds2) ? _getSubHols(yr).find(s=>s.date===ds2) : null;
        const isSubFromPH = subEntry && (subEntry.srcCat==='PH1'||subEntry.srcCat==='PH2'||subEntry.srcCat==='SP');

        if(isTplPH||isFestPH2||isSpecial||isSubFromPH) mPH++;
        else if(isTplOFF||isFestOFF) mOFF++;
        if(isSHForDept(ds2)) mSH=true;
      }
    }

    html += `<div style="background:#fff;border:3px solid #000;border-radius:0;overflow:hidden;font-family:Arial,sans-serif">
      <div style="padding:5px 10px;background:#222;color:#fff;display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700;font-size:12px">${MONTHS[mo-1]} ${yr}</div>
        <div style="display:flex;gap:3px;font-size:9px">
          ${mPH?`<span style="background:#fff;color:#222;border-radius:2px;padding:1px 5px;font-weight:700">${mPH}PH</span>`:''}
          ${mOFF?`<span style="background:#999;color:#fff;border-radius:2px;padding:1px 5px;font-weight:700">${mOFF}OFF</span>`:''}
          ${mSH?`<span style="background:#D8D8D8;color:#333;border-radius:2px;padding:1px 5px;font-weight:700">SH</span>`:''}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);background:#555">
        ${['M','T','W','T','F','S','S'].map((x,i)=>`<div style="text-align:center;font-size:9px;font-weight:700;color:#fff;padding:3px 0;background:${i===6?'#000':i===5?(satIsWork?'#444':'#000'):'#555'}">${x}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #000">`;

    for(let i=0; i<af; i++) html+=`<div style="min-height:26px;background:#f8f8f8"></div>`;

    for(let day=1; day<=days; day++){
      const ds  = _isoDate(yr,mo,day);
      const dow = _holidayDow(ds);
      const {bg, numCol, bold} = getDayStyle(ds, dow);
      const isToday = ds===todayDs;

      // Tooltip
      const phN  = getPHNameFull(ds)||getOffName(ds)||getSHName(ds)||'';
      const subN = subs.find(s=>s.date===ds);
      const tipText = subN ? subN.name : phN;

      const border = '1px solid #e8e8e8';
      const numStyle = `color:${numCol};font-weight:${bold?'700':'400'};font-size:11px;line-height:1`;

      const ecDay  = isExtraClass(ds, dept);
      const ecInfo = ecDay ? getECInfo(ds, dept) : null;
      const ecTip  = ecInfo ? (ecInfo.name||'Extra Class')+(ecInfo.time?' · '+ecInfo.time:'')+(ecInfo.msg?' · '+ecInfo.msg:'') : '';
      html+=`<div title="${escapeHTML(ecTip||tipText)}" style="min-height:26px;padding:2px;background:${bg||'#fff'};border:${border};display:flex;flex-direction:column;align-items:center">
        <span style="${numStyle}">${day}</span>
        ${ecDay?`<span style="font-size:8px;line-height:1;color:${bg==='#000'?'#fff':'#000'};margin-top:1px">★</span>`:''}
      </div>`;
    }

    const rem=(af+days)%7;
    if(rem>0) for(let i=0; i<7-rem; i++) html+=`<div style="min-height:26px;background:#f8f8f8"></div>`;

    // Helper: is date a festival-only OFF (not also a template holiday)?
    // These are excluded from Holiday list (shown in Festival section instead)
    const isFestOnlyOFF = (ds2) => {
      const isFestOFF = FESTIVAL_CONFIG.some(fc=>{
        const f=(S.festivalDates[yr]||{})[fc.id]||{};
        return f.start&&f.end&&ds2>=f.start&&ds2<=f.end&&(f.days||{})[ds2]==='OFF';
      });
      if(!isFestOFF) return false;
      // If it's also a template holiday, keep it in Holiday list
      const tplDates2 = new Set(HOLIDAY_TEMPLATE.map(t=>t.dt==='fixed'?`${yr}-${t.md}`:(d[t.id]||'')).filter(Boolean));
      return !tplDates2.has(ds2);
    };

    // Month PH list — only festival-pure OFF excluded; festival PH2 & template holidays remain
    const monthPHList = [];
    for(let dd=1; dd<=days; dd++){
      const ds2=_isoDate(yr,mo,dd);
      const subEntry=subs.find(s=>s.date===ds2);
      if(!subEntry && isFestOnlyOFF(ds2)) continue;
      const phName=getPHNameFull(ds2)||getOffName(ds2);
      if(subEntry) monthPHList.push(`<div style="font-size:9px;line-height:1.6"><b>${dd}</b> ${escapeHTML(subEntry.name.replace(/\s*\(.*\)/,''))}</div>`);
      else if(phName) monthPHList.push(`<div style="font-size:9px;line-height:1.6;font-weight:700"><b>${dd}</b> ${escapeHTML(phName)}</div>`);
    }

    // Festival section: show full range for each festival that overlaps this month
    const festInMonth = [];
    FESTIVAL_CONFIG.forEach(fc=>{
      const fest=(S.festivalDates[yr]||{})[fc.id]||{};
      if(!fest.start||!fest.end) return;
      // Check if this festival overlaps current month
      if(fest.end < ms+'-01' || fest.start > ms+'-31') return;
      festInMonth.push({name:fc.name, start:_ddmmS(fest.start), end:_ddmmS(fest.end)});
    });

    // School holiday ranges for this month
    const shRanges = Object.values(sh).filter(r=>{
      if(!r.start||!r.end) return false;
      if(!deptMatch(r.depts)) return false;
      return r.start.startsWith(ms)||r.end.startsWith(ms)||(r.start<=ms+'-01'&&r.end>=ms+'-28');
    });

    html+=`</div>`;
    // ── Two types: Government | Centre ──────────────────────────────
    // Government: Public Holiday + KPM School Holiday (dashed between)
    // Centre:     Our Festive Holidays + Our Extra Learning Day (dashed between)
    // Solid line separates the two types
    const ecInMonth = ((S.extraClasses||{})[yr]||[]).filter(e=>{
      if(!e.start||!e.end) return false;
      if(!deptMatch(e.depts)) return false;
      return e.start.startsWith(ms)||e.end.startsWith(ms)||(e.start<=ms+'-01'&&e.end>=ms+'-28');
    });
    const hasGov = monthPHList.length || shRanges.length;
    const hasCentre = festInMonth.length || ecInMonth.length;
    if(monthPHList.length){
      html+=`<div style="padding:4px 8px;border-top:1px solid #000;background:#f8f8f8">
        <div style="font-size:9px;font-weight:700;color:#333;margin-bottom:2px">Public Holiday</div>
        ${monthPHList.join('')}
      </div>`;
    }
    if(shRanges.length){
      html+=`<div style="padding:4px 8px;border-top:${monthPHList.length?'1.5px dashed #aaa':'1px solid #000'};background:#f0f0f0">
        <div style="font-size:9px;font-weight:700;color:#333;margin-bottom:2px">KPM School Holiday</div>
        ${shRanges.map(r=>`<div style="font-size:9px;line-height:1.6">${_ddmmS(r.start)} – ${_ddmmS(r.end)} (${escapeHTML(r.name||'School Holiday')})</div>`).join('')}
      </div>`;
    }
    if(festInMonth.length){
      html+=`<div style="padding:4px 8px;border-top:1px solid #000;background:#f4f0eb">
        <div style="font-size:9px;font-weight:700;color:#333;margin-bottom:2px">Our Festive Holidays</div>
        ${festInMonth.map(f=>`<div style="font-size:9px;line-height:1.6">${f.start} – ${f.end} (${escapeHTML(f.name)})</div>`).join('')}
      </div>`;
    }
    if(ecInMonth.length){
      const ecGrp={};
      ecInMonth.forEach(e=>{
        const k=`${e.start}|${e.end||e.start}`;
        if(!ecGrp[k]) ecGrp[k]={start:e.start,end:e.end||e.start,labels:[]};
        const lbl=[e.name&&e.name!=='Extra Class'?e.name:'',e.time||'',e.msg||''].filter(Boolean).join(' · ');
        if(lbl&&!ecGrp[k].labels.includes(lbl)) ecGrp[k].labels.push(lbl);
      });
      html+=`<div style="padding:4px 8px;border-top:${festInMonth.length?'1.5px dashed #aaa':'1px solid #000'};background:#fff">
        <div style="font-size:9px;font-weight:700;color:#333;margin-bottom:2px">★ Our Extra Learning Day</div>
        ${Object.values(ecGrp).map(g=>`<div style="font-size:9px;line-height:1.7"><b>${_ddmmS(g.start)}${g.end&&g.end!==g.start?' – '+_ddmmS(g.end):''}</b>${g.labels.length?' <span style="font-weight:400">'+escapeHTML(g.labels.join(' / '))+'</span>':''}</div>`).join('')}
      </div>`;
    }
    if(!hasGov && !hasCentre){
      html+=`<div style="border-top:1px solid #000"></div>`;
    }
    html+=`</div>`;
  }

  html+=`</div>`;
  document.getElementById('hol-tab-content').innerHTML=html;
}

      #cal-grid [style*="font-size:9px"] {font-size:11px!important;font-weight:700!important}
      /* ── PRINT: single A4 page ── */
      @page{margin:6mm;size:A4 portrait}
      @media print{
        *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
        html,body{margin:0;padding:0;max-width:none}
        .no-print{display:none!important}
        body{zoom:0.68}
        .print-title{font-size:22px;margin:0 0 4px}
        #cal-grid{grid-template-columns:repeat(3,1fr)!important;gap:5px!important}
      }
    </style>
  </head><body>
    <div class="no-print">
      <button onclick="window.print()" style="padding:5px 14px;background:#3d1a1a;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">🖨 Print / Save PDF</button>
      <button onclick="window.close()" style="padding:5px 12px;border:1px solid #ccc;background:#fff;border-radius:4px;cursor:pointer;font-size:12px">✕ Close</button>
      <span style="font-size:11px;color:#888">${dept} · ${view==='hr'?'HR View':'Parent View'}</span>
    </div>
    <div class="print-title">${yr} Holiday Notice</div>
    ${calHTML}
    <script>window.print();<\/script>
  </body></html>`);
  w.document.close();
}

function _holOpenSyncModal(){
  const yr=window._holYear;
  const ov=document.createElement('div');ov.id='sync-overlay';

async function _holFetchFromAPI(){
  const yr=parseInt(document.getElementById('sync-year').value)||2026;
  const cc=document.getElementById('sync-country').value;
  const res=document.getElementById('sync-result');
  res.innerHTML=`<div style="text-align:center;padding:12px;font-size:12px;color:var(--mut)">⏳ Connecting…</div>`;
  try{
    const resp=await fetch(`https://date.nager.at/api/v3/PublicHolidays/${yr}/${cc}`,{mode:'cors'});
    if(!resp.ok) throw new Error(`API returned ${resp.status}. Data may not be available for ${yr} yet.`);
    const data=await resp.json();
    if(!Array.isArray(data)||!data.length) throw new Error('No holidays returned.');
    if(!S.holidayDates[yr]) S.holidayDates[yr]={};
    const kwMap=[['Labour Day','ph1_labour'],['National Day','ph1_merdeka'],['Malaysia Day','ph1_malaysia'],
      ['Christmas','ph2_christmas'],['Chinese New Year',['ph2_cny1','ph2_cny2']],
      ['Aidilfitri',['ph2_raya1','ph2_raya2']],['Deepavali','ph2_deepavali'],
      ['Wesak','off_wesak'],['Hari Raya Haji','off_qurban'],['Thaipusam','off_thaipusam'],
      ['Muharram','off_hijrah'],['Prophet','off_nabi'],['Agong','ph1_agong_bday']];
    let matched=0;const unmatched=[];
    data.forEach(h=>{
      let found=false;
      for(const [kw,ids] of kwMap){
        if(h.name.toLowerCase().includes(kw.toLowerCase())){
          const arr=Array.isArray(ids)?ids:[ids];
          for(const id of arr){if(!S.holidayDates[yr][id]){S.holidayDates[yr][id]=h.date;matched++;found=true;break;}}
          break;
        }
      }
      if(!found) unmatched.push(`${h.date}: ${h.name}`);
    });
    saveAll();
    document.getElementById('sync-overlay')?.remove();
    window._holYear=yr; render_holidays();
    alert(`✓ Matched ${matched} holidays.\n${unmatched.length?'\nNot matched:\n'+unmatched.join('\n'):'All matched!'}`);
  }catch(e){
    res.innerHTML=`<div style="background:#FCEBEB;border:.5px solid #F09595;border-radius:7px;padding:10px;font-size:12px;color:var(--red)">
      <b>❌ ${escapeHTML(e.message)}</b><br><br>
      <span style="color:var(--mut)">Use ⚡ Auto-fill for fixed dates, then enter lunar dates manually.</span>
    </div>`;
  }
}

function _holParseAndMatch(){
  const raw=document.getElementById('paste-hol-box2').value.trim();
  const yr=parseInt(document.getElementById('paste-yr2').value)||2026;
  if(!raw){alert('Please paste content first.');return;}
  const MON={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,januari:1,februari:2,mac:3,april:4,mei:5,julai:7,ogos:8,september:9,oktober:10,november:11,disember:12};
  function pd(s){s=s.trim();let m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m)return`${m[1]}-${m[2]}-${m[3]}`;m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);if(m)return`${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;m=s.match(/^(\d{1,2})\s+([A-Za-z]+)(?:\s+(\d{4}))?$/);if(m){const mn=MON[m[2].toLowerCase()];if(mn)return`${m[3]||yr}-${String(mn).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;}m=s.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);if(m){const mn=MON[m[2].toLowerCase()];if(mn)return`${m[3]}-${String(mn).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;}return null;}
  const found=[];
  raw.split(/\r?\n/).forEach(line=>{const parts=line.split('\t').map(p=>p.trim()).filter(Boolean);if(parts.length>=2){let ds=null,nm=null;for(let i=0;i<parts.length;i++){const dv=pd(parts[i]);if(dv&&!ds){ds=dv;continue;}if(ds&&!nm&&parts[i].length>2&&!/^\d+$/.test(parts[i])){nm=parts[i];break;}}if(ds&&nm)found.push({date:ds,name:nm});}});
  if(!found.length){document.getElementById('paste-hol-result2').innerHTML=`<div style="background:#FCEBEB;border:.5px solid #F09595;border-radius:7px;padding:10px;font-size:12px;color:var(--red)">⚠️ No dates found. Try Ctrl+A → Ctrl+C on the full page.</div>`;return;}
  if(!S.holidayDates[yr]) S.holidayDates[yr]={};
  const kwMap=[['Sultan Johor','ph1_sultan_bday'],['Agong','ph1_agong_bday'],['Pekerja','ph1_labour'],['Kebangsaan','ph1_merdeka'],['Malaysia','ph1_malaysia'],['Cina',['ph2_cny1','ph2_cny2','off_cny3','off_cny4','off_cny5','off_cny6','off_cny7']],['Raya Puasa',['ph2_raya1','ph2_raya2','off_raya3','off_raya4','off_raya5','off_raya6','off_raya7']],['Deepavali',['ph2_deepavali','off_deepavali2']],['Krismas','ph2_christmas'],['Christmas','ph2_christmas'],['Thaipusam','off_thaipusam'],['Ramadan','off_ramadan'],['Wesak','off_wesak'],['Qurban','off_qurban'],['Muharram','off_hijrah'],['Hol','off_hol_iskandar'],['Nabi','off_nabi']];
  const results=[];
  found.forEach(h=>{let mid=null;for(const [kw,ids] of kwMap){if(h.name.toLowerCase().includes(kw.toLowerCase())){const arr=Array.isArray(ids)?ids:[ids];for(const id of arr){if(!S.holidayDates[yr][id]){S.holidayDates[yr][id]=h.date;mid=id;break;}}break;}}const tpl=mid?HOLIDAY_TEMPLATE.find(t=>t.id===mid):null;results.push({n:h.name,date:h.date,match:tpl?tpl.name:null});});
  saveAll();
  const ok=results.filter(r=>r.match).length,fail=results.filter(r=>!r.match).length;
  document.getElementById('paste-hol-result2').innerHTML=`
    <div style="background:#E1F5EE;border:.5px solid #9FE1CB;border-radius:6px;padding:8px;margin-bottom:8px;font-size:12px;font-weight:600;color:#0F6E56">✓ Matched ${ok} · Unmatched ${fail}</div>
    <div style="overflow-x:auto;border:.5px solid var(--bdr);border-radius:6px;max-height:160px;overflow-y:auto;margin-bottom:8px">
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead><tr style="background:var(--sur2)"><th style="padding:4px 9px">Date</th><th style="padding:4px 9px">From Website</th><th style="padding:4px 9px">Matched To</th></tr></thead>
        <tbody>${results.map(r=>`<tr><td style="padding:4px 9px">${r.date}</td><td style="padding:4px 9px">${escapeHTML(r.n)}</td><td style="padding:4px 9px">${r.match?`<span style="color:#0F6E56">✓ ${escapeHTML(r.match)}</span>`:'<span style="color:#854F0B">—</span>'}</td></tr>`).join('')}</tbody>
      </table>
    </div>
    <button class="btn-grn" onclick="document.getElementById('paste-overlay')?.remove();window._holYear=${yr};render_holidays();" style="width:100%;padding:8px">✓ Done</button>`;
}

function _collectAllHolidays(yr){
  const list = [];
  const d = _hd(yr);
  HOLIDAY_TEMPLATE.forEach(t=>{
    const dt = t.dt==='fixed' ? `${yr}-${t.md}` : d[t.id];
    if(!dt) return;
    list.push({ date:dt, name:t.name, cat:t.cat });
  });
  FESTIVAL_CONFIG.forEach(fc=>{
    const fest = (S.festivalDates[yr]||{})[fc.id]||{};
    Object.entries(fest.days||{}).forEach(([ds,cat])=>{
      if(cat==='PH2'||cat==='OFF'){
        if(new Date(ds+'T12:00:00').getDay()===0 && cat!=='PH2') return;
        // Festival OFF → grey (like calendar); Festival PH2 → black
        list.push({ date:ds, name:fc.name, cat: cat==='OFF' ? 'FEST_OFF' : cat });
      }
    });
  });
  (S.specialHolidays[yr]||[]).forEach(s=>{
    if(s.date) list.push({ date:s.date, name:s.name, cat:s.category||'PH2' });
  });
  _getSubHols(yr).forEach(s=>{
    list.push({ date:s.date, name:s.name, cat:'SUB', isReplace:true, srcName:s.name });
  });
  const sh = S.schoolHolDates[yr]||{};
  Object.entries(sh).forEach(([id, r])=>{
    if(!r.start||!r.end) return;
    list.push({
      date:r.start,
      endDate:r.end,
      name:r.name||'School Holiday',
      cat:'SH',
      isRange:true,
      depts: r.depts||['MASTER','TEACHER','SRK','GAK','ATC']
    });
  });
  list.sort((a,b)=>a.date.localeCompare(b.date));
  return list;
}

function _filterPeriodHolidays(yr, months){
  return _collectAllHolidays(yr).filter(h=>{
    const m = parseInt(h.date.slice(5,7));
    if(months.includes(m)) return true;
    if(h.isRange){
      const em = parseInt((h.endDate||h.date).slice(5,7));
      if(months.includes(em)) return true;
    }
    return false;
  });
}

function _fmtNoticeDate(ds){
  const d = new Date(ds+'T12:00:00');

  const monthsEN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dowEN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${day} ${monthsEN[d.getMonth()]} (${dowEN[d.getDay()]})`;
}
