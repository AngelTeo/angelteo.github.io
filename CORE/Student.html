// ═══ STORE (Supabase hub_students + hub_student_memberships ⇄ S blob) ═══
const CLASSES_CACHE_KEY = 'masterhub_student_classes_cache';
const Store = {
  async get(){
    try {
      const [stRes, memRes] = await Promise.all([
        _sb.from('hub_students').select('*'),
        _sb.from('hub_student_memberships').select('*')
      ]);
      if(stRes.error) throw stRes.error;
      if(memRes.error) throw memRes.error;
      // Group memberships by student_id — date-aware split relative to today.
      // current = started and not yet ended (end>today keeps a future-dated transfer's old class current until T)
      // other  = already ended (end<=today, transfer history) OR not started yet (start>today, scheduled)
      const memMap = {};   // current classes (as of today)
      const histMap = {};  // ended (history) + scheduled (future) — distinguished at render time
      const _t = _today();
      for(const m of (memRes.data||[])){
        const started = (m.start_date==null || m.start_date<=_t);
        const notEnded = (m.end_date==null || m.end_date>_t);
        const bucket = (started && notEnded) ? memMap : histMap;
        (bucket[m.student_id]=bucket[m.student_id]||[]).push({
          dept: m.dept, class: m.class_code||'',
          start_date: m.start_date||null, end_date: m.end_date||null,
          ...(m.num!=null ? {num:m.num} : {}),
          ...(m.tier ? {tier:m.tier} : {}),
          ...((m.extra && typeof m.extra==='object' && Object.keys(m.extra).length) ? m.extra : {})
        });
      }
      const students = (stRes.data||[]).map(r=>({
        id: r.id, name: r.name||'', name_cn: r.name_cn||'',
        gender: r.gender||null, birth_year: r.birth_year||null,
        status: r.status||'Active', status_note: r.status_note||'',
        notes: r.notes||'', memberships: memMap[r.id]||[], memberships_history: histMap[r.id]||[]
      }));
      // classes from localStorage cache (not in Supabase)
      let classes = {SRK:[],GAK:[],ATC:[],SRT:[]};
      try { const cc=localStorage.getItem(CLASSES_CACHE_KEY); if(cc) classes=JSON.parse(cc); } catch(e){}
      // meta from localStorage cache
      let meta = {version:'',last_updated:''};
      try { const mc=localStorage.getItem(STORAGE_KEY); if(mc){const p=JSON.parse(mc); if(p.meta) meta=p.meta;} } catch(e){}
      const raw = JSON.stringify({students, classes, meta});
      try { localStorage.setItem(STORAGE_KEY, raw); } catch(e){}
      return raw;
    } catch(e){
      console.error('Store.get supabase failed → fallback cache', e);
      return localStorage.getItem(STORAGE_KEY);
    }
  },
  async set(v){
    try { localStorage.setItem(STORAGE_KEY, v); } catch(e){}
    let obj; try { obj = JSON.parse(v); } catch(e){ return; }
    // Cache classes separately (not in Supabase)
    if(obj.classes) try { localStorage.setItem(CLASSES_CACHE_KEY, JSON.stringify(obj.classes)); } catch(e){}
    // Write students
    const stuRows = (obj.students||[]).filter(s=>s.id).map(s=>({
      id: s.id, name: s.name||'', name_cn: s.name_cn||'',
      gender: s.gender||null, birth_year: s.birth_year||null,
      status: s.status||'Active', status_note: s.status_note||'',
      notes: s.notes||''
    }));
    // Write memberships — active + history, preserving start_date/end_date
    const memRows = [];
    for(const s of (obj.students||[])){
      if(!s.id) continue;
      const allMems = [].concat(
        Array.isArray(s.memberships) ? s.memberships : [],
        Array.isArray(s.memberships_history) ? s.memberships_history : []
      );
      for(const m of allMems){
        const extra = {};
        for(const k in m){ if(!['dept','class','num','tier','start_date','end_date'].includes(k)) extra[k]=m[k]; }
        memRows.push({
          student_id: s.id, dept: m.dept||'SRK', class_code: m.class||'',
          num: m.num!=null ? m.num : null, tier: m.tier||null,
          start_date: m.start_date || _today(), end_date: m.end_date || null,
          extra: Object.keys(extra).length ? extra : null
        });
      }
    }
    try {
      if(stuRows.length){
        const { error } = await _sb.from('hub_students').upsert(stuRows, {onConflict:'id'});
        if(error) throw error;
        // WRITE-CLEAR students
        const newIds = new Set(stuRows.map(r=>r.id));
        const { data:existing } = await _sb.from('hub_students').select('id');
        const toDel = (existing||[]).map(r=>r.id).filter(id=>!newIds.has(id));
        if(toDel.length) await _sb.from('hub_students').delete().in('id', toDel);
      }
      // Memberships: delete all then insert. WIPE-GUARD: never clear a populated table from an empty blob.
      const hasStudents = (obj.students||[]).some(x=>x.id);
      if(memRows.length===0 && hasStudents){
        console.warn('Store.set wipe-guard: blob has 0 memberships but students present — skipping membership write');
      } else {
        await _sb.from('hub_student_memberships').delete().neq('id', 0);  // delete all
        if(memRows.length){
          // Batch insert in chunks of 200
          for(let i=0; i<memRows.length; i+=200){
            const chunk = memRows.slice(i, i+200);
            const { error } = await _sb.from('hub_student_memberships').insert(chunk);
            if(error) throw error;
          }
        }
      }
    } catch(e){ console.error('Store.set supabase failed (cached locally)', e); }
  },
  async del(){ try{ localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(CLASSES_CACHE_KEY); }catch(e){} },
  getKey(k){ return localStorage.getItem(k); },
  delKey(k){ try{ localStorage.removeItem(k); }catch(e){} }
};
function _dateStamp() {
  const d = new Date();
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '_' + String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0');
}
function _downloadFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function _csvEscape(s) {
  return '"' + String(s == null ? '' : s).replace(/"/g, '""') + '"';
}
function _toCsv(rows) {
  return rows.map(r => r.map(_csvEscape).join(',')).join('\n');
}

  var label = short.replace(/\./g, ' ');

  var h = '<div class="cls">';
  h += '<div class="cls-hdr">' + esc(className) + '</div>';
  h += '<div class="cls-sub">' + esc(label) + '</div>';
  h += '<table class="tbl">';

  var boys = 0, girls = 0;
  roster.forEach(function(r, i) {
    var s = r.student, m = r.membership;

    // Detect cross-dept for highlighting
    var gakTier = null;
    var hasCrossDept = false;
    for (var mi = 0; mi < s.memberships.length; mi++) {
      var mb = s.memberships[mi];
      // SRK print: detect GAK tier
      if (dept === 'SRK' && mb.dept === 'GAK' && mb.tier) {
        gakTier = mb.tier;
        if (gakTier === '300') break;
      }
      // SRT print: detect if also in SRK/GAK/ATC
      if (dept === 'SRT' && (mb.dept === 'SRK' || mb.dept === 'GAK' || mb.dept === 'ATC')) {
        hasCrossDept = true;
      }
    }

    var nameCls = '';
    var numCls = 'n';
    if (gakTier === '300') { nameCls = 'g300'; numCls = 'n g300n'; }
    else if (gakTier === '530') { nameCls = 'g530'; }
    else if (hasCrossDept) { nameCls = 'g530'; }
    var age = getAge(s.birth_year);

    if (s.gender === 'B') boys++;
    else if (s.gender === 'G') girls++;

    h += '<tr>';
    h += '<td class="' + numCls + '">' + (m.num || (i + 1)) + '</td>';
    h += '<td class="' + nameCls + '">' + titleCase(s.name) + '</td>';
    h += '<td class="a">' + (age != null ? age : '') + '</td>';
    h += '</tr>';
  });

  // Pad empty rows to align with other classes in same row
  var padTo = minRows || 0;
  for (var p = roster.length; p < padTo; p++) {
    h += '<tr><td class="n" style="color:transparent">' + (p + 1) + '</td><td>&nbsp;</td><td class="a"></td></tr>';
  }

  h += '</table>';
  h += '<div class="ft"><span>B: ' + boys + '</span><span>G: ' + girls + '</span></div>';
  h += '</div>';
  return h;
}

// ══ AUTH ══
async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const errEl=document.getElementById('auth-err');
  errEl.textContent='';
  if(!email){errEl.textContent='Please enter email';return;}
  if(!pass){errEl.textContent='Please enter password';return;}
  const btn=document.getElementById('auth-login-btn');
  btn.disabled=true;btn.textContent='Logging in...';
  try{
    const{error}=await _sb.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
    await initApp();
  }catch(e){errEl.textContent=e.message||'Login failed';btn.disabled=false;btn.textContent='Login';}
}
async function doMagicLink(){
  const email=document.getElementById('auth-email').value.trim();
  const errEl=document.getElementById('auth-err');
  errEl.textContent='';
  if(!email){errEl.textContent='Please enter email';return;}
  const btn=document.getElementById('auth-magic-btn');
  btn.disabled=true;btn.textContent='Sending...';
  try{
    const{error}=await _sb.auth.signInWithOtp({email});
    if(error)throw error;
    errEl.style.color='#0F6E56';errEl.textContent='✓ Check your email for the login link';
  }catch(e){errEl.textContent=e.message||'Failed to send';}
  btn.disabled=false;btn.textContent='Send Magic Link';
}
document.addEventListener('DOMContentLoaded',()=>{
  ['auth-email','auth-pass'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  });
});
async function initApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
  try {
    await initData();
    if (S.meta.last_updated) safeSet('last-saved', 'Saved ' + new Date(S.meta.last_updated).toLocaleTimeString('en-GB'));
    document.getElementById('loading-screen').style.display='none';
    renderCurrentPage('dashboard');
  } catch (e) {
    console.error('init failed:', e);
    document.getElementById('loading-screen').style.display='none';
    document.body.innerHTML = '<div style="padding:40px;text-align:center"><h2>System startup failed</h2><p>' + esc(e.message) + '</p><button onclick="localStorage.clear();location.reload()" style="padding:8px 16px">Wipe localStorage and reload</button></div>';
  }
}

// ===================== INIT =====================
(async () => {
  const { data: { session } } = await _sb.auth.getSession();
  if (session) { await initApp(); }
})();
window.addEventListener('beforeunload', () => { try { const payload={students:S.students,classes:S.classes,meta:{...S.meta,last_updated:new Date().toISOString()}}; localStorage.setItem(STORAGE_KEY,JSON.stringify(payload)); } catch(e){} });
</script>
