<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MasterHub — Student v22</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --layer: #5C1010; --ok: #0F6E56; --danger: #A32D2D; --warn: #854F0B; --info: #236FAD;
  --sur: #ffffff; --sur2: #f5f4f0; --bdr: #e0ddd6;
  --txt: #1a1a1a; --mut: #888888; --hint: #bbbbbb;
  --d-srk: #C45C5C; --d-gak: #E8A04E; --d-atc: #7AB05A; --d-srt: #8B6CAE;
  --boy: #185FA5; --girl: #C2185B;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; font-size: 12px; color: var(--txt); background: var(--sur2); }
.app { max-width: 1280px; margin: 0 auto; background: var(--sur); min-height: 100vh; }
.topbar { display: flex; align-items: center; padding: 12px 18px; border-bottom: .5px solid var(--bdr); background: var(--sur); position: sticky; top: 0; z-index: 50; }
.topbar h1 { margin: 0; font-size: 14px; font-weight: 600; flex: 1; }
.topbar .ver { font-size: 10px; color: var(--layer); padding: 1px 6px; background: #F9CB42; border-radius: 4px; font-weight: 700; margin-left: 4px; vertical-align: middle; }
.nav { display: flex; gap: 0; border-bottom: .5px solid var(--bdr); padding: 0 12px; background: var(--sur); }
.ntab{padding:11px 14px;font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;border:none;background:transparent;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.ntab:hover{color:#fff}
.ntab.on{color:#fff;border-bottom-color:#fff;font-weight:600}
.sub-nav{background:var(--sur);border-bottom:.5px solid var(--bdr);padding:0 16px;gap:2px;position:sticky;top:44px;z-index:49;display:none;overflow-x:auto;align-items:center;min-height:38px}
.sub-nav.show{display:flex}
.sub-ntab{padding:9px 14px;font-size:11px;color:var(--mut);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.sub-ntab:hover{color:var(--txt)}
.sub-ntab.on{color:var(--layer);border-bottom-color:var(--layer);font-weight:600}
.page { display: none; padding: 16px 18px; }
.page.on { display: block; }
.card { background: var(--sur); border: .5px solid var(--bdr); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
.card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.card-title { font-size: 12px; font-weight: 600; color: var(--txt); }
.btn { border: .5px solid var(--bdr); background: var(--sur); border-radius: 6px; padding: 5px 12px; font-size: 11px; cursor: pointer; color: var(--txt); font-family: inherit; }
.btn:hover { background: var(--sur2); }
.btn-pri { background: var(--layer); color: #fff; border-color: var(--layer); }
.btn-pri:hover { background: #134d83; }
.btn-dng { background: var(--red); color: #fff; border-color: var(--red); }
.btn-sm { padding: 3px 8px; font-size: 10px; }
.input { border: .5px solid var(--bdr); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: inherit; outline: none; }
.input:focus { border-color: var(--layer); }
select.input { background: var(--sur); }
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
.stat { background: var(--sur); border: .5px solid var(--bdr); border-radius: 10px; padding: 12px 14px; }
.stat-num { font-size: 24px; font-weight: 600; color: var(--txt); line-height: 1; }
.stat-lbl { font-size: 10px; color: var(--mut); margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }
.stat-sub { font-size: 10px; color: var(--mut); margin-top: 6px; }
.dept-chip { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; margin: 1px 2px; white-space: nowrap; line-height: 1.4; }
.dept-srk { background: #E6EEF8; color: var(--dept-srk); border: .5px solid #B7CCE3; }
.dept-gak { background: #FFF1D9; color: var(--dept-gak); border: .5px solid #E8C285; }
.dept-atc { background: #E1F5EE; color: var(--dept-atc); border: .5px solid #9FE1CB; }
.dept-srt { background: #ECE3F4; color: var(--dept-srt); border: .5px solid #C6B1DE; }
.tier-badge { display: inline-block; background: rgba(0,0,0,.08); border-radius: 4px; padding: 0 4px; margin-left: 3px; font-size: 9px; font-weight: 600; }
.flag-new { background: #FCEBEB; color: var(--red); border: .5px solid #F09595; display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 9px; }
.flag-rsvp { background: #FFF8E1; color: var(--amb); border: .5px solid #F9CB42; display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 9px; }
.flag-multi { background: #EEF2F7; color: var(--layer); border: .5px solid #AABDD4; display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 9px; }
.status-badge { display: inline-block; padding: 1px 7px; border-radius: 8px; font-size: 9px; font-weight: 500; white-space: nowrap; }
.status-active { background: #E1F5EE; color: #0F6E56; border: .5px solid #9FE1CB; }
.status-rsvp { background: #FFF8E1; color: #854F0B; border: .5px solid #F9CB42; }
.status-registered { background: #E6EEF8; color: #185FA5; border: .5px solid #B7CCE3; }
.status-transferred { background: #ECECEC; color: #666; border: .5px solid #ccc; }
.status-stopped { background: #FCEBEB; color: #A32D2D; border: .5px solid #F09595; }
.status-graduated { background: #ECE3F4; color: #6B3E97; border: .5px solid #C6B1DE; }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; vertical-align: middle; }
.status-dot.s-active { background: #0F6E56; }
.status-dot.s-rsvp { background: #F9CB42; }
.status-dot.s-registered { background: #185FA5; }
.status-dot.s-transferred { background: #888; }
.status-dot.s-stopped { background: #A32D2D; }
.status-dot.s-graduated { background: #6B3E97; }
.status-note-text { font-size: 10px; color: var(--mut); font-style: italic; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 11px; }
table.tbl th { padding: 7px 10px; text-align: left; background: var(--sur2); border-bottom: .5px solid var(--bdr); font-weight: 500; color: var(--mut); font-size: 10px; text-transform: uppercase; letter-spacing: .04em; }
table.tbl td { padding: 7px 10px; border-bottom: .5px solid var(--bdr); vertical-align: middle; }
table.tbl tr:hover { background: var(--sur2); }
table.data{width:100%;border-collapse:collapse;font-size:12px}
table.data thead th{background:#2d2d2d;color:#fff;padding:9px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;position:sticky;top:0}
table.data tbody td{padding:8px 12px;border-bottom:.5px solid var(--bdr);vertical-align:middle}
table.data tbody tr:nth-child(even){background:var(--sur2)}
table.data tbody tr:hover{background:#FFF9E6}
.stat-card{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;padding:14px 16px}
.stat-n{font-size:26px;font-weight:700;color:var(--layer)}
.stat-l{font-size:10px;color:var(--mut);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.btn-plain{background:var(--sur);border:.5px solid var(--bdr);color:var(--txt);font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-plain:hover{background:var(--sur2)}
.name-en { font-weight: 600; font-size: 11px; letter-spacing: .01em; }
.name-cn { font-size: 11px; color: var(--mut); }
.row-flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.muted { color: var(--mut); }
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--txt); color: #fff; padding: 8px 16px; border-radius: 6px; font-size: 12px; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; }
.dept-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.dept-tag { padding: 6px 14px; border-radius: 16px; border: .5px solid var(--bdr); cursor: pointer; font-size: 11px; background: var(--sur); color: var(--mut); }
.dept-tag:hover { background: var(--sur2); }
.dept-tag.on { background: var(--layer); border-color: var(--layer); color: #fff; }
.class-tile {
  padding: 7px 10px;
  border: .5px solid var(--bdr);
  border-radius: 7px;
  cursor: pointer;
  background: var(--sur);
  min-width: 0;
}
.class-tile:hover { background: var(--sur2); border-color: var(--layer); }
.class-tile.on { background: var(--layer); color: #fff; border-color: var(--layer); }
.class-tile.on .class-count { color: rgba(255,255,255,.85); }
.class-tile .class-name { font-size: 12px; font-weight: 500; line-height: 1.25; }
.class-tile .class-count { font-size: 10px; color: var(--mut); margin-top: 1px; line-height: 1.2; }
.tile-all-row { margin-bottom: 8px; }
.tile-all-tile {
  padding: 10px 14px;
  border: .5px solid var(--bdr);
  border-radius: 9px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--sur) 0%, var(--sur2) 100%);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.tile-all-tile:hover { background: var(--sur2); border-color: var(--layer); }
.tile-all-tile.on { background: var(--layer); color: #fff; border-color: var(--layer); }
.tile-all-tile.on .class-count { color: rgba(255,255,255,.85); }
.tile-flat {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(115px, 140px));
  gap: 6px;
  margin-bottom: 6px;
}
.roster-card.clickable {
  cursor: pointer;
  transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
}
.roster-card.clickable:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(0,0,0,.08);
  border-color: var(--layer);
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--layer);
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 6px;
}
.back-link:hover { background: var(--sur2); }
.class-name { font-size: 12px; font-weight: 500; }
.class-count { font-size: 10px; color: var(--mut); margin-top: 2px; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--sur); border-radius: 12px; width: 640px; max-width: 100%; max-height: 88vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,.25); }
.modal-hdr { padding: 14px 20px; border-bottom: .5px solid var(--bdr); display: flex; align-items: center; position: sticky; top: 0; background: var(--sur); border-radius: 12px 12px 0 0; }
.modal-title { font-size: 13px; font-weight: 600; flex: 1; }
.modal-body { padding: 16px 20px; }
.modal-foot { padding: 12px 20px; border-top: .5px solid var(--bdr); display: flex; justify-content: flex-end; gap: 8px; }
.x-btn { background: none; border: none; font-size: 20px; color: var(--mut); cursor: pointer; padding: 0 4px; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 11px; color: var(--mut); margin-bottom: 4px; }
.form-row input, .form-row select { width: 100%; box-sizing: border-box; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.flag-row { display: flex; gap: 18px; align-items: center; }
.flag-row label { font-size: 12px; color: var(--txt); font-weight: normal; cursor: pointer; }
.flag-row input[type="checkbox"] { margin-right: 6px; vertical-align: middle; }
.membership-row { display: flex; gap: 6px; align-items: center; padding: 6px 8px; background: var(--sur2); border-radius: 6px; margin-bottom: 4px; font-size: 11px; flex-wrap: wrap; }
.membership-row select, .membership-row input { font-size: 11px; padding: 3px 6px; border: .5px solid var(--bdr); border-radius: 4px; background: var(--sur); font-family: inherit; }
.empty { text-align: center; padding: 30px; color: var(--hint); font-size: 11px; }
.search-box { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.search-box .input { flex: 1; }
.alert-card { background: #FFF8E1; border: .5px solid #F9CB42; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.alert-card.red { background: #FCEBEB; border-color: #F09595; }
.alert-text { flex: 1; font-size: 11px; }
.emergency-btn { background: var(--red); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-left: 8px; }
.age-col { color: var(--mut); font-size: 11px; }
.gender-b { color: var(--boy); }
.gender-g { color: var(--girl); }

/* === Class Cards Grid (All view) === */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  margin-top: 12px;
}
.rows-layout {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-top: 12px;
}
.row-group {
  display: flex;
  flex-direction: column;
}
.row-label {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--txt);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: .5px solid var(--bdr);
}
.row-label .row-count {
  font-size: 10px;
  font-weight: normal;
  color: var(--mut);
  text-transform: none;
  letter-spacing: 0;
}
.row-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 10px;
}
.filter-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--txt);
  min-width: 80px;
}
.roster-card {
  background: var(--sur);
  border: .5px solid var(--bdr);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  break-inside: avoid;
  page-break-inside: avoid;
}
.roster-card-hdr {
  padding: 12px 14px 10px;
  border-top: 3px solid var(--dept-srk);
  background: linear-gradient(180deg, var(--sur) 0%, var(--sur2) 100%);
}
.roster-card.dept-SRK .roster-card-hdr { border-top-color: var(--dept-srk); }
.roster-card.dept-GAK .roster-card-hdr { border-top-color: var(--dept-gak); }
.roster-card.dept-ATC .roster-card-hdr { border-top-color: var(--dept-atc); }
.roster-card.dept-SRT .roster-card-hdr { border-top-color: var(--dept-srt); }
.roster-card-title { font-size: 14px; font-weight: 700; letter-spacing: .02em; }
.roster-card-subtitle { font-size: 9px; color: var(--mut); margin-top: 3px; text-transform: uppercase; letter-spacing: .08em; }
.roster-card-body { flex: 1; padding: 4px 0; }
.roster-row { display: flex; align-items: center; padding: 4px 14px; font-size: 11px; gap: 8px; border-bottom: .5px solid #f3f1ec; }
.roster-row:last-child { border-bottom: none; }
.roster-row-num { color: var(--mut); width: 18px; text-align: right; font-size: 10px; flex-shrink: 0; }
.roster-row-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.roster-row-dot.b { background: var(--boy); }
.roster-row-dot.g { background: var(--girl); }
.roster-row-name {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 3px 5px;
  line-height: 1.35;
}
.roster-row-cn { color: var(--mut); font-size: 10px; }
.roster-row-age { color: var(--mut); font-size: 10px; flex-shrink: 0; }
.cross-chip {
  display: inline-block;
  padding: 0px 5px;
  border-radius: 5px;
  font-size: 8.5px;
  font-weight: 500;
  line-height: 1.55;
  white-space: nowrap;
}
.cross-chip.dept-srk { background: #E6EEF8; color: var(--dept-srk); border: .5px solid #B7CCE3; }
.cross-chip.dept-gak { background: #FFF1D9; color: var(--dept-gak); border: .5px solid #E8C285; }
.cross-chip.dept-atc { background: #E1F5EE; color: var(--dept-atc); border: .5px solid #9FE1CB; }
.cross-chip.dept-srt { background: #ECE3F4; color: var(--dept-srt); border: .5px solid #C6B1DE; }
.cross-chip .tier-badge { background: rgba(0,0,0,.1); font-size: 8px; padding: 0 3px; margin-left: 2px; }
.roster-card-footer {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: .5px solid var(--bdr);
  padding: 8px 14px;
  background: var(--sur2);
  font-size: 11px;
  gap: 4px;
}
.roster-card-footer > div { display: flex; align-items: center; gap: 5px; justify-content: center; }
.roster-card-footer .lbl { color: var(--mut); font-size: 10px; }
.roster-card-footer .val { font-weight: 600; }

/* === Print styles === */
@media print {
  @page { size: A4 landscape; margin: 8mm 10mm; }
  body { background: white; font-size: 8pt; }
  .app { max-width: none; }
  .topbar, .nav, .card-hdr button, .btn, .emergency-btn, #last-saved, .search-box, .no-print { display: none !important; }
  .page { display: none !important; padding: 0 !important; }
  .page.on { display: block !important; }
  .card { border: none; box-shadow: none; padding: 0; margin: 0 0 4mm 0; }
  .card-hdr { display: none !important; }
  .cards-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 4mm;
  }
  .rows-layout { gap: 5mm !important; }
  .row-group { break-inside: avoid; page-break-inside: avoid; }
  .row-label { font-size: 8pt !important; margin-bottom: 2mm !important; padding-bottom: 1mm !important; }
  .row-cards {
    grid-template-columns: repeat(auto-fill, minmax(48mm, 1fr)) !important;
    gap: 2mm !important;
  }
  .roster-card { border: 1px solid #999 !important; break-inside: avoid; page-break-inside: avoid; }
  .roster-card-hdr { padding: 2mm 3mm 1.5mm; }
  .roster-card-title { font-size: 9pt; }
  .roster-card-subtitle { font-size: 6.5pt; }
  .roster-row { padding: 0.6mm 3mm; font-size: 7pt; }
  .roster-row-name { white-space: normal !important; }
  .roster-card-footer { padding: 1.5mm 3mm; font-size: 7pt; }
  .print-header { display: block !important; margin-bottom: 3mm; }
  .print-header h2 { font-size: 12pt; margin: 0; }
  .print-header .meta { font-size: 7pt; color: #555; margin-top: 1mm; }
  .name-cn { font-size: 6.5pt !important; }
}
.print-header { display: none; }

@media (max-width: 700px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .nav { overflow-x: auto; }
  table.tbl { font-size: 10px; }
  .cards-grid { grid-template-columns: 1fr; }
  .row-cards { grid-template-columns: 1fr !important; }
}
.mode-toggle{display:flex;gap:0;border:.5px solid var(--bdr);border-radius:6px;overflow:hidden;width:fit-content;margin-bottom:14px}
.mode-btn{padding:7px 14px;font-size:11px;cursor:pointer;border:none;background:var(--sur);color:var(--mut);font-family:inherit;transition:all .15s}
.mode-btn:hover{background:var(--sur2)}
.mode-btn.on{background:var(--layer);color:#fff}
.dept-stats-bar{display:flex;align-items:center;gap:16px;padding:10px 16px;background:var(--sur);border-bottom:.5px solid var(--bdr);font-size:12px;flex-wrap:wrap}
.dept-stats-bar .dept-label{font-weight:600;font-size:13px}
.dept-stats-bar .dept-stat{color:var(--mut);font-size:11px}
.btn-nav{padding:5px 12px;border-radius:6px;border:.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-nav:hover{opacity:.85}

/* ══════ AUTH SCREEN ══════ */
.auth-screen{position:fixed;inset:0;background:var(--sur2);z-index:9000;
  display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--sur);border:.5px solid var(--bdr);border-radius:12px;
  padding:32px 28px;width:340px;max-width:100%;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.auth-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:4px;color:var(--layer)}
.auth-sub{font-size:11px;color:var(--mut);text-align:center;margin-bottom:20px}
.auth-row{margin-bottom:14px}
.auth-row label{font-size:11px;color:var(--mut);display:block;margin-bottom:4px}
.auth-row input{width:100%;padding:8px 10px;border:.5px solid var(--bdr);border-radius:6px;
  font-size:13px;font-family:inherit;background:var(--sur);color:var(--txt)}
.auth-row input:focus{outline:none;border-color:var(--layer)}

async function loadData() {
  // ── Migration: if old localStorage key exists, it's SSOT (table may be stale seed) ──
  const migKeys = ['masterhub_student_v15','masterhub_namelist_v13','masterhub_namelist_v12','masterhub_namelist_v11'];
  for(const mk of migKeys){
    const old = localStorage.getItem(mk);
    if(old){
      try {
        const p = JSON.parse(old);
        if(p.students && Array.isArray(p.students)){
          S.students = p.students;
          if(p.classes) S.classes = p.classes;
          if(p.meta) S.meta = {...S.meta, ...p.meta};
          migKeys.forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
          return true;
        }
      } catch(e){}
    }
  }
  // ── Normal: read from Supabase ──
  const raw = await Store.get();
  if (!raw) return false;
  try {
    const p = JSON.parse(raw);
    if (p.students && Array.isArray(p.students)) S.students = p.students;
    if (p.classes) S.classes = p.classes;
    if (p.meta) S.meta = { ...S.meta, ...p.meta };
    return true;
  } catch (e) { console.error('Load failed:', e); return false; }
}
function validateData() {
  if (!Array.isArray(S.students)) return false;
  for (const s of S.students) {
    if (!s.id || !s.name || !Array.isArray(s.memberships)) return false;
  }
  if (!S.classes || typeof S.classes !== 'object') return false;
  return true;
}
function migrateStudent(s) {
  // Migrate old flags → status
  if (!s.status) {
    if (s.flags && s.flags.rsvp) s.status = 'RSVP';
    else if (s.flags && s.flags.new_pending) s.status = 'Registered';
    else s.status = 'Active';
  }
  delete s.flags;       // #1 remove flags
  delete s.age;         // #3 age computed dynamically
  if (s.status_note == null) s.status_note = '';
  if (!s.gender) s.gender = null;
  if (!s.name_cn) s.name_cn = '';
  if (!Array.isArray(s.memberships)) s.memberships = [];
  if (!Array.isArray(s.memberships_history)) s.memberships_history = [];
  // #2 + #4: clean memberships
  s.memberships.forEach(m => {
    delete m.age;        // #2 remove dup
    delete m.birth_year; // #2 remove dup
    m.class = _migrateClassName(m.dept, m.class); // #4 standardize
  });
  s.memberships_history.forEach(m => {
    m.class = _migrateClassName(m.dept, m.class); // keep history class_code standardized
  });
  return s;
}
function _migrateClassName(dept, cls) {
  if (!cls) return cls;
  // SRK: already "SRK-XX.N" — keep
  if (dept === 'SRK') return cls;
  // GAK: "SR.1" → "GAK-SR.1"
  if (dept === 'GAK' && !cls.startsWith('GAK-')) return 'GAK-' + cls;
  // ATC: "ATC1" → "ATC-1" (add dash after ATC)
  if (dept === 'ATC' && /^ATC\d/.test(cls)) return 'ATC-' + cls.slice(3);
  // SRT: "LV2.FRI.PM" → "SRT-LV2.FRI.PM"
  if (dept === 'SRT' && !cls.startsWith('SRT-')) return 'SRT-' + cls;
  return cls;
}
function _migrateClasses(classes) {
  const out = {};
  for (const dept of Object.keys(classes)) {
    out[dept] = classes[dept].map(c => _migrateClassName(dept, c));
  }
  return out;
}
function getAge(birth_year) {

  return new Date().getFullYear() - parseInt(birth_year);
}
function migrateAll() {

function renderMiniCrossChips(memberships, excludeKey) {
  const chips = [];
  const seen = new Set();
  for (const m of memberships) {
    const k = m.dept + '/' + m.class;
    if (excludeKey && k === excludeKey) continue;
    if (seen.has(k)) continue;
    seen.add(k);
    const cls = 'cross-chip dept-' + m.dept.toLowerCase();
    const tier = m.tier ? '<span class="tier-badge">' + esc(m.tier) + '</span>' : '';
    chips.push('<span class="' + cls + '">' + esc(classDisplay(m)) + tier + '</span>');
  }
  return chips.join('');
}

// ===================== NAVIGATION =====================
function goPage(p) {
  try {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('on'));
    document.querySelectorAll('.ntab').forEach(el => el.classList.remove('on'));
    const target = document.getElementById('page-' + p);
    if (target) target.classList.add('on');
    const map = { dashboard: 0, students: 1, crossclass: 2, manage: 3 };
    const tabs = document.querySelectorAll('.ntab');
    if (tabs[map[p]]) tabs[map[p]].classList.add('on');
    const subNav = document.getElementById('sub-nav');
    if (p === 'students') { subNav.classList.add('show'); }
    else { subNav.classList.remove('show'); }
    renderCurrentPage(p);
  } catch (e) { console.error('goPage error', e); }
}
function goSub(sub) {
  try {
    S.ui.currentSub = sub;
    S.ui.selectedClass = 'ALL';
    S.ui.deptSearch = '';
    S.ui.srtTimeFilter = 'all';
    S.ui.srtLevelFilter = 'all';
    S.ui.filterGender = 'all';
    S.ui.filterAge = 'all';
    S.ui.filterStatus = 'all';
    document.querySelectorAll('.sub-ntab').forEach(el => el.classList.remove('on'));
    const subMap = { all: 0, SRK: 1, GAK: 2, ATC: 3, SRT: 4 };
    const subs = document.querySelectorAll('.sub-ntab');
    if (subs[subMap[sub]]) subs[subMap[sub]].classList.add('on');
    renderStudentsPage();
  } catch (e) { console.error('goSub error', e); }
}
function renderCurrentPage(p) {
  if (!p) {
    const cur = document.querySelector('.page.on');
    if (cur) p = cur.id.replace('page-', '');
    else p = 'dashboard';
  }
  try {
    if (p === 'dashboard') renderDashboard();
    else if (p === 'students') renderStudentsPage();
    else if (p === 'crossclass') renderCrossClass();
    else if (p === 'manage') renderManage();
  } catch (e) {
    console.error('Render error on', p, e);
    safeSet(p + '-content', '<div class="card"><div style="color:var(--danger)">Render error: ' + esc(e.message) + '. Try Emergency Reset.</div></div>');
  }
}
function renderStudentsPage() {
  if (S.ui.currentSub === 'all') renderStudentsAll();
  else renderDeptPage(S.ui.currentSub);
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  try {
    const total = S.students.length;
    const active = S.students.filter(s => s.status === 'Active').length;
    const registered = S.students.filter(s => s.status === 'Registered');
    const rsvp = S.students.filter(s => s.status === 'RSVP');
    const multi = S.students.filter(isMultiClass).length;
    const transferred = S.students.filter(s => s.status === 'Transferred').length;
    const stopped = S.students.filter(s => s.status === 'Stopped').length;

    let h = '<div class="stat-grid">';
    h += '<div class="stat-card"><div class="stat-n">' + total + '</div><div class="stat-l">Total</div></div>';
    h += '<div class="stat-card"><div class="stat-n" style="color:var(--ok)">' + active + '</div><div class="stat-l">Active</div></div>';
    h += '<div class="stat-card"><div class="stat-n" style="color:var(--warn)">' + rsvp.length + '</div><div class="stat-l">RSVP</div></div>';
    h += '<div class="stat-card"><div class="stat-n" style="color:var(--info)">' + registered.length + '</div><div class="stat-l">Registered</div></div>';
    h += '</div>';

    h += '<div class="card"><div class="card-hdr"><span class="card-title">By department</span></div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    var DEPTS = ['SRK','GAK','ATC','SRT'];
    var DEPT_COLORS = {'SRK':'var(--d-srk)','GAK':'var(--d-gak)','ATC':'var(--d-atc)','SRT':'var(--d-srt)'};
    for (var di = 0; di < DEPTS.length; di++) {
      var d = DEPTS[di];
      var cnt = getDeptCount(d);
      var cls = getClasses(d).length;
      h += '<div style="padding:10px 12px;border-radius:8px;border:0.5px solid var(--bdr);background:var(--sur);border-left:3px solid ' + DEPT_COLORS[d] + ';cursor:pointer" onclick="goPage(\'students\');goSub(\'' + d + '\')">';

      h += '<div style="font-size:11px;color:var(--mut)">' + d + ' · ' + cls + ' classes</div>';
      h += '</div>';
    }
    h += '</div></div>';

    if (multi > 0) {
      h += '<div class="card" style="cursor:pointer" onclick="goPage(\'crossclass\')"><div class="card-hdr"><span class="card-title">Cross-class</span></div>';
      h += '<div style="font-size:13px"><strong>' + multi + '</strong> students in 2+ classes</div>';
      h += '</div>';
    }

    if (registered.length + rsvp.length > 0) {
      h += '<div class="card"><div class="card-hdr"><span class="card-title">Needs attention</span></div>';
      registered.forEach(function(s) {
        var cls = s.memberships[0];
        h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--bdr);font-size:12px">';
        h += '<div>' + renderStatusBadge(s.status) + ' <strong>' + esc(s.name) + '</strong></div>';
        h += '<button class="btn-plain" style="font-size:10px;padding:3px 8px" onclick="openStudent(\'' + s.id + '\')">View</button></div>';
      });
      rsvp.forEach(function(s) {
        h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--bdr);font-size:12px">';
        h += '<div>' + renderStatusBadge(s.status) + ' <strong>' + esc(s.name) + '</strong></div>';
        h += '<button class="btn-plain" style="font-size:10px;padding:3px 8px" onclick="openStudent(\'' + s.id + '\')">View</button></div>';
      });

    }

    if (transferred + stopped > 0) {
      h += '<div class="card"><div class="card-hdr"><span class="card-title">Inactive</span></div>';
      h += '<div style="font-size:12px;display:flex;gap:16px">';
      if (transferred) h += '<div><strong>' + transferred + '</strong> <span style="color:var(--mut)">Transferred</span></div>';
      if (stopped) h += '<div><strong>' + stopped + '</strong> <span style="color:var(--mut)">Stopped</span></div>';

    safeSet('dashboard-content', h);

    console.error('Dashboard render error', e);
    safeSet('dashboard-content', '<div class="card" style="color:var(--danger)">Dashboard render error: ' + esc(e.message) + '</div>');
  }
}

// ===================== ALL STUDENTS =====================
function renderStudentsAll() {
  try {
    const term = (S.ui.searchTerm || '').toLowerCase().trim();
    const dept = S.ui.filterDept || 'all';
    
    let filtered = S.students.filter(function(s) { return s.status !== 'Transferred' && s.status !== 'Stopped' && s.status !== 'Graduated'; });
    if (S.ui.showArchived) filtered = S.students.slice();
    if (term) {
      filtered = filtered.filter(function(s) {
        if (s.name.toLowerCase().includes(term)) return true;
        if (s.name_cn && s.name_cn.toLowerCase().includes(term)) return true;
        for (var i = 0; i < s.memberships.length; i++) if ((s.memberships[i].class || '').toLowerCase().includes(term)) return true;
        return false;
      });
    }
    if (dept !== 'all') filtered = filtered.filter(function(s) { return isInDept(s, dept); });
    // Sort
    if (S.ui.sortCol && S.ui.sortDir) {
      filtered.sort(function(a, b) {
        var va, vb;
        if (S.ui.sortCol === 'name') { va = a.name; vb = b.name; }
        else if (S.ui.sortCol === 'age') { va = getAge(a.birth_year) || 0; vb = getAge(b.birth_year) || 0; }
        else if (S.ui.sortCol === 'dept') { va = (a.memberships[0] || {}).dept || ''; vb = (b.memberships[0] || {}).dept || ''; }
        else if (S.ui.sortCol === 'status') { va = a.status; vb = b.status; }
        else { va = a.name; vb = b.name; }
        if (typeof va === 'string') return S.ui.sortDir === 1 ? va.localeCompare(vb) : vb.localeCompare(va);
        return S.ui.sortDir === 1 ? va - vb : vb - va;
      });
    } else {
      filtered.sort(function(a, b) { return a.name.localeCompare(b.name); });
    }

    var archivedCount = S.students.filter(function(s) { return s.status === 'Transferred' || s.status === 'Stopped' || s.status === 'Graduated'; }).length;

    var h = '<div class="toolbar" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 16px;background:var(--sur);border-bottom:0.5px solid var(--bdr)">';
    h += '<div style="position:relative;flex:1;min-width:180px"><input class="input" id="search-inp" placeholder="Search name / class..." value="' + esc(S.ui.searchTerm) + '" style="width:100%;padding-right:28px">';
    h += '<span id="search-x" onclick="window.clearSearch()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--mut);font-size:14px;display:' + (S.ui.searchTerm ? 'inline' : 'none') + '">✕</span></div>';
    h += '<button class="btn btn-pri" onclick="openStudent(null)" style="font-size:12px;padding:8px 14px">+ Add Student</button>';
    if (archivedCount > 0) {
      h += '<label style="font-size:10px;color:var(--mut);white-space:nowrap;display:flex;align-items:center;gap:4px"><input type="checkbox" ' + (S.ui.showArchived ? 'checked' : '') + ' onchange="S.ui.showArchived=this.checked;renderStudentsAll()"> Show inactive (' + archivedCount + ')</label>';
    }
    h += '</div>';

    h += '<div style="padding:4px 16px"><span class="list-count" style="font-size:11px;color:var(--mut)">' + filtered.length + ' students</span></div>';

    if (filtered.length === 0) {
      h += '<div class="empty">No students found</div>';
    } else {
      function sortHdr(label, col) {
        var arrow = S.ui.sortCol === col ? (S.ui.sortDir === 1 ? ' ▲' : ' ▼') : '';
        return '<th style="cursor:pointer;white-space:nowrap" onclick="window._sortStudents(\'' + col + '\')">' + label + arrow + '</th>';
      }
      h += '<div style="overflow-x:auto"><table class="data" style="table-layout:fixed"><colgroup><col style="width:32px"><col style="width:28%"><col style="width:15%"><col style="width:10%"><col style="width:32%"><col style="width:15%"></colgroup><thead><tr>';
      h += '<th>#</th>';
      h += sortHdr('Name', 'name');
      h += '<th>中文</th>';
      h += sortHdr('Age', 'age');
      h += '<th>Class</th>';
      h += sortHdr('Status', 'status');
      h += '</tr></thead><tbody>';
      for (var i = 0; i < filtered.length; i++) {
        var s = filtered[i];
        var nameHtml = term ? esc(s.name).replace(new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi'), '<mark>$1</mark>') : esc(s.name);
        var classTd = '—';
        if (s.memberships.length > 0) {
          classTd = '<div style="display:flex;flex-wrap:wrap;gap:3px">';
          var seen = {};
          for (var mi = 0; mi < s.memberships.length; mi++) {
            var m = s.memberships[mi];
            var mk = m.dept + '/' + m.class;
            if (seen[mk]) continue;
            seen[mk] = 1;
            classTd += '<span class="dept-chip dept-' + m.dept.toLowerCase() + '" style="font-size:10px;padding:2px 6px">' + esc(m.class) + '</span>';
          }
          classTd += '</div>';
        }
        h += '<tr style="cursor:pointer" onclick="openStudent(\'' + s.id + '\')">';
        h += '<td style="color:var(--mut)">' + (i + 1) + '</td>';
        h += '<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + nameHtml + '</td>';
        h += '<td style="color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(s.name_cn || '') + '</td>';
        h += '<td style="color:var(--mut)">' + (getAge(s.birth_year) != null ? getAge(s.birth_year) : '—') + '</td>';
        h += '<td>' + classTd + '</td>';
        h += '<td>' + renderStatusBadge(s.status) + '</td>';
        h += '</tr>';
      }
      h += '</tbody></table></div>';
    }

    safeSet('students-content', h);

    var inp = document.getElementById('search-inp');
    if (inp) {
      inp.oninput = function(e) {
        S.ui.searchTerm = e.target.value;
        renderStudentsAll();
        var newInp = document.getElementById('search-inp');
        if (newInp) { newInp.focus(); newInp.setSelectionRange(newInp.value.length, newInp.value.length); }
      };
    }
  } catch (e) {
    console.error('Students render error', e);
    safeSet('students-content', '<div class="card" style="color:var(--danger)">Students render error: ' + esc(e.message) + '</div>');
  }
}
window.setFilter = function(d) { S.ui.filterDept = d; renderStudentsAll(); };
window.clearSearch = function() { S.ui.searchTerm = ''; renderStudentsAll(); };
window._sortStudents = function(col) {
  if (S.ui.sortCol === col) { S.ui.sortDir = S.ui.sortDir === 1 ? -1 : S.ui.sortDir === -1 ? 0 : 1; }
  else { S.ui.sortCol = col; S.ui.sortDir = 1; }
  if (S.ui.sortDir === 0) S.ui.sortCol = '';
  renderStudentsAll();
};

// ===================== DEPT PAGE (replaces old By Class) =====================
function renderDeptPage(dept) {
  try {
    var cls = S.ui.selectedClass;
    var term = (S.ui.deptSearch || '').toLowerCase().trim();
    var DEPT_COLORS = {'SRK':'var(--d-srk)','GAK':'var(--d-gak)','ATC':'var(--d-atc)','SRT':'var(--d-srt)'};
    var deptStudents = getStudentsByDept(dept);
    var activeInDept = deptStudents.filter(function(s) { return s.status === 'Active'; }).length;
    var classList = getClasses(dept);

    var h = '';
    // Dept stats bar
    h += '<div class="dept-stats-bar" style="border-left:3px solid ' + DEPT_COLORS[dept] + '">';
    h += '<span class="dept-label" style="color:' + DEPT_COLORS[dept] + '">' + dept + '</span>';
    h += '<span class="dept-stat">' + deptStudents.length + ' students</span>';
    h += '<span class="dept-stat">' + classList.length + ' classes</span>';
    h += '<span class="dept-stat">' + activeInDept + ' active</span>';
    h += '</div>';

    // Search + Actions toolbar
    h += '<div class="toolbar" style="padding:10px 16px;background:var(--sur);border-bottom:.5px solid var(--bdr);display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
    h += '<div style="position:relative;flex:1;min-width:140px"><input class="input" id="dept-search-inp" placeholder="Search name / class..." value="' + esc(S.ui.deptSearch) + '" style="width:100%;padding-right:28px">';
    h += '<span id="dept-search-x" onclick="window.clearDeptSearch()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--mut);font-size:14px;display:' + (S.ui.deptSearch ? 'inline' : 'none') + '">✕</span></div>';
    h += '<button class="btn" onclick="window.printDeptNamelist(\'' + dept + '\')" style="font-size:12px;padding:8px 14px">🖨 Print</button>';
    h += '<button class="btn btn-pri" onclick="openStudent(null)" style="font-size:12px;padding:8px 14px">+ Add</button>';
    h += '</div>';

    // Filter bar: matching Teacher system layout (label + pills per row)
    var fg = S.ui.filterGender || 'all';
    var fa = S.ui.filterAge || 'all';
    var fs = S.ui.filterStatus || 'all';
    // Collect ALL ages across entire system (not just this dept)
    var allAges = {};
    S.students.forEach(function(s) { var a = getAge(s.birth_year); if (a != null) allAges[a] = 1; });
    var ageList = Object.keys(allAges).map(Number).sort(function(a,b){return a-b;});

    h += '<div style="padding:10px 16px;background:var(--sur);border-bottom:.5px solid var(--bdr);display:flex;flex-direction:column;gap:8px">';

    // Gender row
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<span style="font-size:11px;font-weight:500;min-width:60px;color:var(--txt)">GENDER</span>';
    h += '<span class="dept-tag' + (fg==='all' ? ' on' : '') + '" onclick="window.setFilterGender(\'all\')">All</span>';
    h += '<span class="dept-tag' + (fg==='B' ? ' on' : '') + '" onclick="window.setFilterGender(\'B\')">B</span>';
    h += '<span class="dept-tag' + (fg==='G' ? ' on' : '') + '" onclick="window.setFilterGender(\'G\')">G</span>';
    h += '</div>';

    // Age row
    h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    h += '<span style="font-size:11px;font-weight:500;min-width:60px;color:var(--txt)">AGE</span>';
    h += '<span class="dept-tag' + (fa==='all' ? ' on' : '') + '" onclick="window.setFilterAge(\'all\')">All</span>';
    ageList.forEach(function(a) { h += '<span class="dept-tag' + (fa==a ? ' on' : '') + '" onclick="window.setFilterAge(\'' + a + '\')">' + a + '</span>'; });
    h += '</div>';

    // Status row
    h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    h += '<span style="font-size:11px;font-weight:500;min-width:60px;color:var(--txt)">STATUS</span>';
    var statuses = [['all','All'],['Active','Active'],['RSVP','RSVP'],['Registered','Registered'],['Transferred','Transferred'],['Stopped','Stopped'],['Graduated','Graduated']];
    statuses.forEach(function(st) { h += '<span class="dept-tag' + (fs===st[0] ? ' on' : '') + '" onclick="window.setFilterStatus(\'' + st[0] + '\')">' + st[1] + '</span>'; });
    h += '</div>';

    h += '</div>';

    // SRT special filters
    if (dept === 'SRT') {
      var timeFilter = S.ui.srtTimeFilter || 'all';
      var levelFilter = S.ui.srtLevelFilter || 'all';
      var slots = ['FRI.PM', 'SAT.AM', 'SAT.NN', 'SAT.PM'];
      var levels = ['LV2','LV3','LV4','LV5','LV6','LV7','LV8','LV9','LV10'];
      h += '<div style="padding:8px 16px;background:var(--sur);border-bottom:.5px solid var(--bdr)">';
      h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">';
      h += '<span style="font-size:11px;font-weight:600;min-width:50px">Time</span>';
      h += '<span class="dept-tag' + (timeFilter==='all' ? ' on' : '') + '" onclick="window.setSrtTime(\'all\')">All</span>';
      slots.forEach(function(s) { h += '<span class="dept-tag' + (timeFilter===s ? ' on' : '') + '" onclick="window.setSrtTime(\'' + s + '\')">' + s + '</span>'; });
      h += '</div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      h += '<span style="font-size:11px;font-weight:600;min-width:50px">Level</span>';
      h += '<span class="dept-tag' + (levelFilter==='all' ? ' on' : '') + '" onclick="window.setSrtLevel(\'all\')">All</span>';
      levels.forEach(function(l) { h += '<span class="dept-tag' + (levelFilter===l ? ' on' : '') + '" onclick="window.setSrtLevel(\'' + l + '\')">' + l + '</span>'; });
      h += '</div></div>';
    }

    // Class tiles as filter
    var filteredClasses = getFilteredClasses(dept);
    var totalInFiltered = 0;
    filteredClasses.forEach(function(cn) { totalInFiltered += getClassRoster(dept, cn).length; });

    h += '<div style="padding:10px 16px">';
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
    h += '<span class="dept-tag' + (cls==='ALL' ? ' on' : '') + '" onclick="window.selectClass(\'ALL\')">All Classes (' + filteredClasses.length + ')</span>';
    filteredClasses.forEach(function(cn) {
      var rc = getClassRoster(dept, cn).length;
      h += '<span class="dept-tag' + (cls===cn ? ' on' : '') + '" onclick="window.selectClass(\'' + esc(cn) + '\')">' + esc(cn) + ' (' + rc + ')</span>';
    });
    h += '</div>';

    // Student count
    var showCount = cls === 'ALL' ? deptStudents.length : getClassRoster(dept, cls).length;
    h += '<div style="padding:4px 16px"><span style="font-size:11px;color:var(--mut)">' + showCount + ' students</span></div>';

    // Table
    if (cls === 'ALL') {
      h += renderDeptAllTable(dept, term);
    } else {
      h += renderDeptClassTable(dept, cls, term);
    }
    h += '</div>';

    safeSet('students-content', h);

    // Bind search
    var inp = document.getElementById('dept-search-inp');
    if (inp) {
      inp.oninput = function(e) {
        S.ui.deptSearch = e.target.value;
        renderDeptPage(S.ui.currentSub);
        var ni = document.getElementById('dept-search-inp');
        if (ni) { ni.focus(); ni.setSelectionRange(ni.value.length, ni.value.length); }
      };
    }
  } catch (e) {
    console.error('DeptPage render error', e);
    safeSet('students-content', '<div class="card" style="color:var(--danger)">Dept render error: ' + esc(e.message) + '</div>');
  }
}

function getFilteredClasses(dept) {
  var all = getClasses(dept);
  if (dept !== 'SRT') return all;
  var tf = S.ui.srtTimeFilter || 'all';
  var lf = S.ui.srtLevelFilter || 'all';
  return all.filter(function(cn) {
    if (tf !== 'all' && cn.indexOf(tf) < 0) return false;
    if (lf !== 'all' && !cn.startsWith('SRT-' + lf + '.')) return false;
    return true;
  });
}

function renderDeptAllTable(dept, term) {
  var students = getStudentsByDept(dept);
  if (term) {
    students = students.filter(function(s) {
      if (s.name.toLowerCase().indexOf(term) >= 0) return true;
      if (s.name_cn && s.name_cn.toLowerCase().indexOf(term) >= 0) return true;
      for (var i = 0; i < s.memberships.length; i++) if ((s.memberships[i].class || '').toLowerCase().indexOf(term) >= 0) return true;
      return false;
    });
  }
  // Apply filters
  var fg = S.ui.filterGender || 'all';
  var fa = S.ui.filterAge || 'all';
  var fs = S.ui.filterStatus || 'all';
  if (fg !== 'all') students = students.filter(function(s) { return s.gender === fg; });
  if (fa !== 'all') students = students.filter(function(s) { return getAge(s.birth_year) == fa; });
  if (fs !== 'all') students = students.filter(function(s) { return s.status === fs; });
  students.sort(function(a, b) { return a.name.localeCompare(b.name); });
  if (students.length === 0) return '<div class="empty">No students found</div>';
  var h = '<div style="overflow-x:auto"><table class="data" style="table-layout:fixed"><colgroup><col style="width:28px"><col style="width:25%"><col style="width:14%"><col style="width:10%"><col style="width:14%"><col style="width:22%"><col style="width:15%"></colgroup>';
  h += '<thead><tr><th>#</th><th>Name</th><th>中文</th><th>Age</th><th>Class</th><th>Cross-Dept</th><th>Status</th></tr></thead><tbody>';
  students.forEach(function(s, i) {
    var deptMembership = null;
    for (var mi = 0; mi < s.memberships.length; mi++) { if (s.memberships[mi].dept === dept) { deptMembership = s.memberships[mi]; break; } }
    var classChip = deptMembership ? '<span class="dept-chip dept-' + dept.toLowerCase() + '" style="font-size:10px;padding:2px 6px">' + esc(deptMembership.class) + '</span>' : '—';
    var exclKey = deptMembership ? (dept + '/' + deptMembership.class) : '';
    var crossChips = renderDeptChips(s.memberships, exclKey) || '<span style="color:var(--mut)">—</span>';
    h += '<tr style="cursor:pointer" onclick="openStudent(\'' + s.id + '\')">';
    h += '<td style="color:var(--mut)">' + (i+1) + '</td>';
    h += '<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">' + esc(s.name) + '</td>';
    h += '<td style="color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(s.name_cn || '') + '</td>';
    h += '<td style="color:var(--mut)">' + (getAge(s.birth_year) != null ? getAge(s.birth_year) : '—') + '</td>';
    h += '<td>' + classChip + '</td>';
    h += '<td>' + crossChips + '</td>';
    h += '<td>' + renderStatusBadge(s.status) + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

function renderDeptClassTable(dept, cls, term) {
  var roster = getClassRoster(dept, cls);
  if (term) {
    roster = roster.filter(function(r) {
      if (r.student.name.toLowerCase().indexOf(term) >= 0) return true;
      if (r.student.name_cn && r.student.name_cn.toLowerCase().indexOf(term) >= 0) return true;
      return false;
    });
  }
  // Apply filters
  var fg = S.ui.filterGender || 'all';
  var fa = S.ui.filterAge || 'all';
  var fs = S.ui.filterStatus || 'all';
  if (fg !== 'all') roster = roster.filter(function(r) { return r.student.gender === fg; });
  if (fa !== 'all') roster = roster.filter(function(r) { return getAge(r.student.birth_year) == fa; });
  if (fs !== 'all') roster = roster.filter(function(r) { return r.student.status === fs; });
  if (roster.length === 0) return '<div class="empty">No students match filters</div>';
  var h = '<div style="overflow-x:auto"><table class="data" style="table-layout:fixed"><colgroup><col style="width:28px"><col style="width:24%"><col style="width:14%"><col style="width:10%"><col style="width:10%"><col style="width:27%"><col style="width:15%"></colgroup>';
  h += '<thead><tr><th>#</th><th>Name</th><th>中文</th><th>Age</th><th>Gender</th><th>Cross-Dept</th><th>Status</th></tr></thead><tbody>';
  roster.forEach(function(r, i) {
    var s = r.student, m = r.membership;
    var exclKey = m.dept + '/' + m.class;
    var crossChips = renderDeptChips(s.memberships, exclKey) || '<span style="color:var(--mut)">—</span>';
    var genderDisplay = s.gender === 'B' ? '<span style="color:var(--boy)">Boy</span>' : (s.gender === 'G' ? '<span style="color:var(--girl)">Girl</span>' : '—');
    h += '<tr style="cursor:pointer" onclick="openStudent(\'' + s.id + '\')">';
    h += '<td style="color:var(--mut)">' + (m.num || (i+1)) + '</td>';
    h += '<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">' + esc(s.name) + '</td>';
    h += '<td style="color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(s.name_cn || '') + '</td>';
    h += '<td style="color:var(--mut)">' + (getAge(s.birth_year) != null ? getAge(s.birth_year) : '—') + '</td>';
    h += '<td>' + genderDisplay + '</td>';
    h += '<td>' + crossChips + '</td>';
    h += '<td>' + renderStatusBadge(s.status) + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

// ===================== CROSS-CLASS (dual mode) =====================
function renderCrossClass() {
  try {
    var mode = S.ui.crossMode || 'enrolled';
    var h = '';
    // Mode toggle
    h += '<div class="mode-toggle">';
    h += '<button class="mode-btn' + (mode==='enrolled' ? ' on' : '') + '" onclick="window.setCrossMode(\'enrolled\')">Cross-enrolled</button>';
    h += '<button class="mode-btn' + (mode==='gap' ? ' on' : '') + '" onclick="window.setCrossMode(\'gap\')">Promotion gap</button>';
    h += '</div>';

    if (mode === 'enrolled') {
      h += renderCrossEnrolled();
    } else {
      h += renderPromotionGap();
    }
    safeSet('crossclass-content', h);
  } catch (e) {
    console.error('CrossClass render error', e);
    safeSet('crossclass-content', '<div class="card" style="color:var(--danger)">CrossClass error: ' + esc(e.message) + '</div>');
  }
}

function renderCrossEnrolled() {
  var multi = S.students.filter(isMultiClass).sort(function(a,b) { return b.memberships.length - a.memberships.length; });
  var h = '<div class="card">';
  h += '<div class="card-hdr"><span class="card-title">Cross-enrolled — ' + multi.length + ' students</span></div>';
  h += '<div style="font-size:10px;color:var(--mut);margin-bottom:10px">Students in 2 or more departments. Sorted by number of enrolments.</div>';

    h += '<div class="empty">No cross-enrolled students</div>';

    h += '<div style="overflow-x:auto"><table class="data" style="table-layout:fixed"><colgroup><col style="width:28px"><col style="width:25%"><col style="width:14%"><col style="width:10%"><col style="width:36%"><col style="width:15%"></colgroup>';
    h += '<thead><tr><th>#</th><th>Name</th><th>中文</th><th>×N</th><th>All classes</th><th></th></tr></thead><tbody>';
    multi.forEach(function(s, i) {
      h += '<tr>';
      h += '<td style="color:var(--mut)">' + (i+1) + '</td>';
      h += '<td style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(s.name) + '</td>';
      h += '<td style="color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(s.name_cn || '') + '</td>';
      h += '<td><span class="flag-multi">×' + s.memberships.length + '</span></td>';

function renderPromotionGap() {
  var src = S.ui.gapSource || 'SRK';
  var tgt = S.ui.gapTarget || 'SRT';
  var DEPTS = ['SRK','GAK','ATC','SRT'];

  var h = '<div class="card">';
  h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;font-size:12px">';
  h += '<span style="color:var(--mut)">Students in</span>';
  h += '<select class="input" style="width:auto;font-size:12px;font-weight:500" onchange="S.ui.gapSource=this.value;renderCrossClass()">';
  DEPTS.forEach(function(d) { h += '<option value="' + d + '"' + (src===d ? ' selected' : '') + '>' + d + '</option>'; });
  h += '</select>';
  h += '<span style="color:var(--mut)">not enrolled in</span>';
  h += '<select class="input" style="width:auto;font-size:12px;font-weight:500" onchange="S.ui.gapTarget=this.value;renderCrossClass()">';
  DEPTS.forEach(function(d) { h += '<option value="' + d + '"' + (tgt===d ? ' selected' : '') + '>' + d + '</option>'; });
  h += '</select>';
  h += '</div>';

  if (src === tgt) {
    h += '<div class="empty">Source and target department must be different</div>';
    h += '</div>';
    return h;
  }

  var gap = S.students.filter(function(s) {
    return isInDept(s, src) && !isInDept(s, tgt) && s.status === 'Active';
  }).sort(function(a,b) { return a.name.localeCompare(b.name); });

  h += '<div class="alert alert-warn" style="margin-bottom:12px"><div style="font-size:11px"><strong>' + gap.length + '</strong> active students in ' + src + ' have no ' + tgt + ' enrolment</div></div>';

  if (gap.length === 0) {
    h += '<div class="empty">All ' + src + ' students are already in ' + tgt + '</div>';
  } else {
    h += '<div style="overflow-x:auto"><table class="data" style="table-layout:fixed"><colgroup><col style="width:28px"><col style="width:28%"><col style="width:15%"><col style="width:10%"><col style="width:32%"><col style="width:15%"></colgroup>';
    h += '<thead><tr><th>#</th><th>Name</th><th>中文</th><th>Age</th><th>Current classes</th><th>Status</th></tr></thead><tbody>';
    gap.forEach(function(s, i) {
      var chips = '<div style="display:flex;flex-wrap:wrap;gap:3px">' + renderDeptChips(s.memberships) + '</div>';
      h += '<tr style="cursor:pointer" onclick="openStudent(\'' + s.id + '\')">';
      h += '<td style="color:var(--mut)">' + (i+1) + '</td>';
      h += '<td style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(s.name) + '</td>';
      h += '<td style="color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(s.name_cn || '') + '</td>';
      h += '<td style="color:var(--mut)">' + (getAge(s.birth_year) != null ? getAge(s.birth_year) : '—') + '</td>';
      h += '<td>' + chips + '</td>';
      h += '<td>' + renderStatusBadge(s.status) + '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }
  h += '</div>';
  return h;
}

// ===================== STUDENT EDITOR MODAL =====================
window.openStudent = function(id) {
  let s;
  let isNew = false;
  if (id) {
    s = S.students.find(x => x.id === id);
    if (!s) { toast('Student not found', 2000); return; }
  } else {
    isNew = true;
    s = { id: genId(), name: '', name_cn: '', gender: null, memberships: [], memberships_history: [], status: 'Active', birth_year: null, age: null, notes: '' };
  }
  const buf = JSON.parse(JSON.stringify(s));
  if (!buf.status) buf.status = 'Active';
  
  function modalBody() {
    let h = '<div class="form-grid-2">';
    h += '<div class="form-row"><label>Name (English) *</label><input class="input" id="ed-name" value="' + esc(buf.name) + '"></div>';
    h += '<div class="form-row"><label>Name (Chinese)</label><input class="input" id="ed-name-cn" value="' + esc(buf.name_cn || '') + '"></div>';
    h += '</div>';
    
    h += '<div class="form-grid-3">';
    h += '<div class="form-row"><label>Age</label><span style="padding:6px 0;font-size:12px">' + (getAge(buf.birth_year) != null ? getAge(buf.birth_year) + ' (computed)' : '—') + '</span></div>';
    h += '<div class="form-row"><label>Birth Year (ref ' + CURRENT_YEAR + ')</label><input class="input" id="ed-byear" type="number" min="1900" max="2100" value="' + (buf.birth_year != null ? buf.birth_year : '') + '"></div>';
    h += '<div class="form-row"><label>Gender</label><select class="input" id="ed-gender"><option value="">—</option><option value="B"' + (buf.gender==='B' ? ' selected':'') + '>Boy</option><option value="G"' + (buf.gender==='G' ? ' selected':'') + '>Girl</option></select></div>';
    h += '</div>';

    h += '<div class="form-grid-2">';
    h += '<div class="form-row"><label>Status</label><select class="input" id="ed-status" onchange="window.onStatusChange()">';
    STATUS_OPTIONS.forEach(opt => {
      h += '<option value="' + opt.value + '"' + (buf.status === opt.value ? ' selected' : '') + '>' + esc(opt.label) + '</option>';
    });
    h += '</select></div>';
    const showNote = buf.status === 'Transferred' || buf.status === 'Stopped';
    const noteLabel = buf.status === 'Transferred' ? 'Transfer To' : (buf.status === 'Stopped' ? 'Reason' : 'Note');
    const notePh = buf.status === 'Transferred' ? 'e.g. Another centre in KL' : (buf.status === 'Stopped' ? 'e.g. Family relocated' : '');
    h += '<div class="form-row" id="ed-status-note-row" style="' + (showNote ? '' : 'display:none') + '">';
    h += '<label id="ed-status-note-label">' + noteLabel + '</label>';
    h += '<input class="input" id="ed-status-note" value="' + esc(buf.status_note || '') + '" placeholder="' + notePh + '">';
    h += '</div>';
    h += '</div>';

    h += '<div class="form-row"><label>Classes / Cross-Class</label><div id="ed-memberships"></div>';
    h += '<button class="btn btn-sm" onclick="window.addMembership()">+ Add Class</button></div>';

    h += '<div class="form-row"><label>Transfer History</label><div id="ed-history"></div></div>';

    h += '<div class="form-row"><label>Notes</label><input class="input" id="ed-notes" value="' + esc(buf.notes || '') + '"></div>';
    return h;
  }
  
  function renderMemberships() {
    let h = '';
    if (buf.memberships.length === 0) {
      h = '<div style="font-size:10px;color:var(--hint);padding:6px 0">No classes yet</div>';
    } else {
      buf.memberships.forEach((m, idx) => {
        h += '<div class="membership-row">';
        h += '<select onchange="window.updateMembership(' + idx + ',\'dept\',this.value)" style="width:70px">';
        ['SRK','GAK','ATC','SRT'].forEach(d => {
          h += '<option value="' + d + '"' + (m.dept===d ? ' selected':'') + '>' + d + '</option>';
        });
        h += '</select>';
        h += '<select onchange="window.updateMembership(' + idx + ',\'class\',this.value)" style="width:130px">';
        getClasses(m.dept).forEach(c => {
          const disp = c;
          h += '<option value="' + esc(c) + '"' + (m.class===c ? ' selected':'') + '>' + esc(disp) + '</option>';
        });
        h += '</select>';
        if (m.dept === 'GAK') {
          h += '<select onchange="window.updateMembership(' + idx + ',\'tier\',this.value)" style="width:80px">';
          ['530','300'].forEach(t => {
            h += '<option value="' + t + '"' + (m.tier===t ? ' selected':'') + '>Tier ' + t + '</option>';
          });
          h += '</select>';
        }
        h += '<input type="text" placeholder="#" style="width:50px" value="' + (m.num != null ? m.num : '') + '" oninput="window.updateMembership(' + idx + ',\'num\',this.value)">';
        if (m.end_date) {
          h += '<button class="btn btn-sm" style="color:#A32D2D;border-color:#A32D2D" onclick="window.cancelTransfer(' + idx + ')" title="Cancel scheduled transfer">Cancel ' + esc(m.end_date) + '</button>';
        } else {
          h += '<button class="btn btn-sm" style="color:#7870CC;border-color:#7870CC" onclick="window.openTransfer(' + idx + ')" title="Transfer (keeps history)">Transfer</button>';
        }
        h += '<button class="btn btn-sm btn-dng" onclick="window.removeMembership(' + idx + ')">×</button>';
        h += '</div>';
      });
    }
    safeSet('ed-memberships', h);
  }
  function renderHistory() {
    const _t = _today();
    const keyOf = m => (m.start_date && m.start_date > _t) ? m.start_date : (m.end_date || m.start_date || '');
    const hist = (buf.memberships_history || []).slice().sort((a,b) => (keyOf(a) > keyOf(b) ? -1 : 1));
    let h = '';
    if (!hist.length) {
      h = '<div style="font-size:10px;color:var(--hint);padding:4px 0">No transfer records</div>';
    } else {
      hist.forEach(m => {
        if (m.start_date && m.start_date > _t) {
          // Scheduled (future) — this is the incoming class; find the source (current class ending on that date)
          const src = (buf.memberships || []).find(a => a.dept === m.dept && a.end_date === m.start_date)
                   || (buf.memberships_history || []).find(a => a.dept === m.dept && a.end_date === m.start_date);
          const from = src ? esc(src.class) : '(current)';
          h += '<div style="font-size:10px;padding:3px 0;border-bottom:.5px solid var(--bdr)"><span style="color:#BA7517">📅 ' + esc(m.start_date) + '</span> · ' + esc(m.dept) + ' ' + from + ' → ' + esc(m.class) + ' <span style="color:var(--hint)">(scheduled)</span></div>';
        } else {
          // Completed transfer — find the target (class starting on this end date)
          const tgt = (buf.memberships || []).find(a => a.dept === m.dept && a.start_date === m.end_date)
                   || (buf.memberships_history || []).find(a => a.dept === m.dept && a.start_date === m.end_date);
          const arrow = tgt ? ' → ' + esc(tgt.class) : ' → (stopped / left centre)';
          h += '<div style="font-size:10px;padding:3px 0;border-bottom:.5px solid var(--bdr)"><span style="color:#7870CC">🔄 ' + esc(m.end_date || '') + '</span> · ' + esc(m.dept) + ' ' + esc(m.class) + arrow + '</div>';
        }
      });
    }
    safeSet('ed-history', h);
  }
  
  window.updateMembership = function(idx, field, val) {
    if (!buf.memberships[idx]) return;
    if (field === 'num') {
      const n = parseInt(val);
      buf.memberships[idx].num = isNaN(n) ? null : n;
    } else if (field === 'dept') {
      const oldDept = buf.memberships[idx].dept;
      buf.memberships[idx].dept = val;
      if (getClasses(val).indexOf(buf.memberships[idx].class) < 0) {
        buf.memberships[idx].class = getClasses(val)[0] || '';
      }
      if (val === 'GAK' && !buf.memberships[idx].tier) buf.memberships[idx].tier = '530';
      if (val !== 'GAK') delete buf.memberships[idx].tier;
      renderMemberships();
    } else if (field === 'class') {
      buf.memberships[idx].class = val;
    } else if (field === 'tier') {
      buf.memberships[idx].tier = val;
    }
  };
  window.removeMembership = function(idx) { buf.memberships.splice(idx, 1); renderMemberships(); };
  window.addMembership = function() {
    buf.memberships.push({ dept: 'SRK', class: S.classes.SRK[0] || '', num: null, start_date: _today(), end_date: null });
    renderMemberships();
  };
  // ── Cancel a scheduled transfer: remove end_date from old class + delete the scheduled new class ──
  window.cancelTransfer = function(idx) {
    const m = buf.memberships[idx];
    if (!m || !m.end_date) return;
    if (isModalDirty()) { toast('Save or Cancel current changes first', 3000); return; }
    const dept = m.dept, oldClass = m.class, endDate = m.end_date;
    if (!confirm('Cancel the transfer scheduled on ' + endDate + '?\n\n' + dept + ' ' + oldClass + ' will stay as the current class.')) return;
    (async function() {
      try {
        // 1. Remove end_date from old class
        const { error: e1 } = await _sb.from('hub_student_memberships')
          .update({ end_date: null })
          .eq('student_id', s.id).eq('dept', dept).eq('class_code', oldClass).eq('end_date', endDate);
        if (e1) throw e1;
        // 2. Delete the scheduled new class (start_date = endDate, same dept)
        const { error: e2 } = await _sb.from('hub_student_memberships')
          .delete()
          .eq('student_id', s.id).eq('dept', dept).eq('start_date', endDate);
        if (e2) throw e2;
        overlay.remove();
        document.removeEventListener('keydown', modalKeyHandler);
        await loadData();
        migrateAll();
        renderCurrentPage();
        alert('Transfer cancelled.\n' + dept + ' ' + oldClass + ' is back to current.');
      } catch (err) {
        alert('Cancel failed:\n' + (err.message || err));
      }
    })();
  };
  // ── Transfer: set old membership end_date + insert new membership start_date, direct Supabase ──
  window.openTransfer = function(idx) {
    const m = buf.memberships[idx];
    if (!m) return;
    if (isNew) { toast('Save the student before transferring', 2500); return; }
    if (isModalDirty()) { toast('Save or Cancel current changes before transferring', 3000); return; }
    const dept = m.dept, oldClass = m.class, oldNum = (m.num != null ? m.num : null), oldStart = m.start_date || null;
    const opts = getClasses(dept).filter(c => c !== oldClass);
    if (!opts.length) { toast('No other ' + dept + ' classes available', 2500); return; }
    const tov = document.createElement('div');
    tov.className = 'modal-bg'; tov.style.zIndex = '1001';
    let th = '<div class="modal" style="max-width:420px"><div class="modal-hdr"><div class="modal-title">Transfer</div><button class="x-btn" onclick="this.closest(\'.modal-bg\').remove()">×</button></div><div class="modal-body">';
    th += '<div style="font-size:12px;margin-bottom:10px">' + esc(dept) + ' <b>' + esc(oldClass) + '</b> &rarr; New class:</div>';
    th += '<select class="input" id="tr-newclass">';
    opts.forEach(c => { th += '<option value="' + esc(c) + '">' + esc(c) + '</option>'; });
    th += '</select>';
    th += '<div style="font-size:12px;margin:12px 0 4px">Effective date:</div>';
    th += '<input type="date" class="input" id="tr-date" value="' + _today() + '"' + (oldStart ? (' min="' + esc(oldStart) + '"') : '') + '>';
    th += '<div style="font-size:10px;color:var(--mut);margin-top:8px;line-height:1.5">Old class is kept until this date; the new class starts on this date. A future date schedules the move — the old class stays current until then. History is preserved.</div>';
    th += '</div><div class="modal-foot"><button class="btn" onclick="this.closest(\'.modal-bg\').remove()">Cancel</button><button class="btn btn-pri" id="tr-confirm">Confirm Transfer</button></div></div>';
    tov.innerHTML = th;
    document.body.appendChild(tov);
    document.getElementById('tr-confirm').onclick = async function() {
      const newClass = document.getElementById('tr-newclass').value;
      if (!newClass || newClass === oldClass) { toast('Please select a different class', 2000); return; }
      const T = (document.getElementById('tr-date').value || '').trim();
      if (!T) { toast('Please choose an effective date', 2000); return; }
      if (oldStart && T < oldStart) { toast('Date cannot be before the current class start (' + oldStart + ')', 3500); return; }
      this.disabled = true; this.textContent = 'Processing…';
      try {
        console.log('[Transfer] student=' + s.id + ' dept=' + dept + ' old=' + oldClass + ' new=' + newClass + ' date=' + T);
        const { error: e1 } = await _sb.from('hub_student_memberships')
          .update({ end_date: T })
          .eq('student_id', s.id).eq('dept', dept).eq('class_code', oldClass).is('end_date', null);
        if (e1) throw e1;
        const insRow = { student_id: s.id, dept: dept, class_code: newClass, start_date: T };
        if (oldNum != null) insRow.num = oldNum;
        const { error: e2 } = await _sb.from('hub_student_memberships').insert(insRow);
        if (e2) throw e2;
        // Verify write
        const { data: vfy } = await _sb.from('hub_student_memberships')
          .select('class_code, start_date, end_date')
          .eq('student_id', s.id).eq('dept', dept);
        const ok1 = (vfy||[]).some(r => r.class_code === oldClass && r.end_date === T);
        const ok2 = (vfy||[]).some(r => r.class_code === newClass && r.start_date === T);
        if (!ok1 || !ok2) {
          alert('Transfer warning: write may not have persisted.\n' + oldClass + ' end_date=' + T + ': ' + (ok1?'OK':'MISSING') + '\n' + newClass + ' start_date=' + T + ': ' + (ok2?'OK':'MISSING') + '\nScreenshot this for Claude.');
        }
        tov.remove();
        overlay.remove();
        document.removeEventListener('keydown', modalKeyHandler);
        await loadData();
        migrateAll();
        renderCurrentPage();
        alert('Transfer complete!\n' + oldClass + ' → ' + newClass + '\nDate: ' + T + '\n\nRe-open this student to check Transfer History.');
      } catch (err) {
        this.disabled = false; this.textContent = 'Confirm Transfer';
        alert('Transfer FAILED:\n' + (err.message || err) + '\n\nScreenshot this for Claude.');
      }
    };
  };
  
  const overlay = document.createElement('div');
  overlay.className = 'modal-bg';
  overlay.innerHTML = '<div class="modal"><div class="modal-hdr"><div class="modal-title">' + (isNew ? 'New Student' : 'Student — ' + esc(buf.name) + (buf.name_cn ? ' ' + esc(buf.name_cn) : '')) + '</div><button class="x-btn" id="modal-close-x">×</button></div><div class="modal-body">' + modalBody() + '</div><div class="modal-foot"><button class="btn" id="modal-cancel">Cancel</button><button class="btn btn-pri" id="ed-save">Save</button></div></div>';
  document.body.appendChild(overlay);
  renderMemberships();
  renderHistory();

  // --- formDirty: snapshot original for comparison ---
  var originalSnap = JSON.stringify(buf);
  function isModalDirty() {
    // Read current form values into temp
    var curName = (document.getElementById('ed-name') || {}).value || '';
    var curCn = (document.getElementById('ed-name-cn') || {}).value || '';
    var curBy = (document.getElementById('ed-byear') || {}).value || '';
    var curGender = (document.getElementById('ed-gender') || {}).value || '';
    var curStatus = (document.getElementById('ed-status') || {}).value || '';
    var curNotes = (document.getElementById('ed-notes') || {}).value || '';
    var cur = JSON.stringify({n:curName,c:curCn,b:curBy,g:curGender,s:curStatus,o:curNotes,m:buf.memberships});
    var orig = JSON.stringify({n:s.name||'',c:s.name_cn||'',b:s.birth_year!=null?String(s.birth_year):'',g:s.gender||'',s:s.status||'Active',o:s.notes||'',m:s.memberships});
    return cur !== orig;
  }
  function closeModal() {
    if (isModalDirty()) {
      if (!confirm('You have unsaved changes. Discard?')) return;
    }
    overlay.remove();
    document.removeEventListener('keydown', modalKeyHandler);
  }
  // --- ESC + Ctrl+S handler ---
  function modalKeyHandler(e) {
    if (e.key === 'Escape') { closeModal(); e.preventDefault(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      var saveBtn = document.getElementById('ed-save');
      if (saveBtn) saveBtn.click();
    }
  }
  document.addEventListener('keydown', modalKeyHandler);
  document.getElementById('modal-close-x').onclick = closeModal;
  document.getElementById('modal-cancel').onclick = closeModal;
  
  // Auto-calc age <-> birth year
  const ageInp = document.getElementById('ed-age');
  const byInp = document.getElementById('ed-byear');
  if (ageInp && byInp) {
    ageInp.addEventListener('input', function() {
      const by = ageToBirthYear(ageInp.value);
      if (by !== null) byInp.value = by;
      else if (ageInp.value === '') byInp.value = '';
    });
    byInp.addEventListener('input', function() {
      const a = birthYearToAge(byInp.value);
      if (a !== null && a >= 0 && a <= 100) ageInp.value = a;
      else if (byInp.value === '') ageInp.value = '';
    });
  }
  
  document.getElementById('ed-save').onclick = function() {
    let newName = document.getElementById('ed-name').value.trim().toUpperCase().replace(/\s+/g, ' ');
    if (!newName) { toast('Name is required', 2000); return; }
    buf.name = newName;
    buf.name_cn = document.getElementById('ed-name-cn').value.trim();
    const by = parseInt(document.getElementById('ed-byear').value);
    buf.birth_year = isNaN(by) ? null : by;
    buf.gender = document.getElementById('ed-gender').value || null;
    buf.status = document.getElementById('ed-status').value || 'Active';
    const noteEl = document.getElementById('ed-status-note');
    buf.status_note = (buf.status === 'Transferred' || buf.status === 'Stopped') && noteEl ? noteEl.value.trim() : '';
    // Remove old flags field for cleanliness
    if (buf.flags) delete buf.flags;
    buf.notes = document.getElementById('ed-notes').value;
    
    if (isNew) S.students.push(buf);
    else {
      const idx = S.students.findIndex(x => x.id === buf.id);
      if (idx >= 0) S.students[idx] = buf;
    }
    saveAll();
    overlay.remove();
    document.removeEventListener('keydown', modalKeyHandler);
    toast(isNew ? 'Student added' : 'Saved', 1500);
    renderCurrentPage();
  };
};

window.onStatusChange = function() {
  const status = document.getElementById('ed-status').value;
  const row = document.getElementById('ed-status-note-row');
  const label = document.getElementById('ed-status-note-label');
  const input = document.getElementById('ed-status-note');
  if (!row) return;
  if (status === 'Transferred') {
    row.style.display = '';
    label.textContent = 'Transfer To';
    input.placeholder = 'e.g. Another centre in KL';
  } else if (status === 'Stopped') {
    row.style.display = '';
    label.textContent = 'Reason';
    input.placeholder = 'e.g. Family relocated';
  } else {
    row.style.display = 'none';
    input.value = '';
  }
};

window.deleteStudent = function(id) {
  const s = S.students.find(x => x.id === id);
  if (!s) return;
  if (!confirm('Delete "' + s.name + '"? This cannot be undone.')) return;

  if (m) m.remove();
  toast('Deleted', 1500);
  renderCurrentPage();
};

window.openAddClass = function() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-bd';

  h += '<div class="modal-hdr"><h2>Add Class</h2><button class="close-x" onclick="this.closest(\'.modal-bd\').remove()">×</button></div>';
  h += '<div class="modal-body">';
  h += '<div class="form-row"><label>Department</label><select class="input" id="ac-dept">';
  ['SRK','GAK','ATC','SRT'].forEach(d => { h += '<option value="' + d + '">' + d + '</option>'; });
  h += '</select></div>';
  h += '<div class="form-row"><label>Class Name</label><input class="input" id="ac-name" placeholder="e.g. SRK-SR.4"></div>';
  h += '<div id="ac-hint" style="font-size:11px;color:var(--mut);line-height:1.5;background:var(--sur2);padding:8px 10px;border-radius:6px;margin-top:-6px"></div>';
  h += '<div id="ac-error" style="color:var(--red);font-size:11px;margin-top:8px;display:none"></div>';
  h += '</div>';
  h += '<div class="modal-ftr"><button class="btn" onclick="this.closest(\'.modal-bd\').remove()">Cancel</button>';
  h += '<button class="btn btn-pri" id="ac-save">Add</button></div>';
  h += '</div>';
  overlay.innerHTML = h;
  document.body.appendChild(overlay);

  const hints = {
    'SRK': 'Format: <code>SRK-XX.N</code> &nbsp;e.g. <code>SRK-SR.4</code>, <code>SRK-IN.3</code>',
    'GAK': 'Format: <code>GAK-XX.N</code> &nbsp;e.g. <code>GAK-SR.4</code>, <code>GAK-IN.3</code>',
    'ATC': 'Format: <code>ATC-N</code> &nbsp;e.g. <code>ATC-7</code>, <code>ATC-8</code>',
    'SRT': 'Format: <code>SRT-LVn.TIME</code> &nbsp;e.g. <code>SRT-LV5.SAT.PM</code>'
  };

  const deptSel = document.getElementById('ac-dept');
  const hintBox = document.getElementById('ac-hint');
  const updateHint = () => { hintBox.innerHTML = hints[deptSel.value]; };
  deptSel.onchange = updateHint;
  updateHint();

  document.getElementById('ac-save').onclick = () => {
    const dept = deptSel.value;
    let name = document.getElementById('ac-name').value.trim();
    const err = document.getElementById('ac-error');
    err.style.display = 'none';
    if (!name) { err.textContent = 'Class name required'; err.style.display = 'block'; return; }
    if (!/^[A-Za-z0-9.\-]+$/.test(name)) { err.textContent = 'Use only letters, digits, dots, and hyphens'; err.style.display = 'block'; return; }
    // Auto-prepend dept prefix if missing
    if (!name.startsWith(dept + '-')) name = dept + '-' + name;

    // Department-specific format check
    let valid = true; let msg = '';
    if (dept === 'SRK' && !/^SRK-[A-Z]+\.\d+$/i.test(name) && name !== 'SRK-RSVP') { valid = false; msg = 'Format: SRK-XX.N (e.g. SRK-SR.4)'; }
    if (dept === 'GAK' && !/^GAK-[A-Z]+\.\d+$/i.test(name)) { valid = false; msg = 'Format: GAK-XX.N (e.g. GAK-SR.4)'; }
    if (dept === 'ATC' && !/^ATC-\d+$/i.test(name)) { valid = false; msg = 'Format: ATC-N (e.g. ATC-7)'; }
    if (dept === 'SRT' && !/^SRT-LV\d+(\.[A-Z])?\.(FRI\.PM|SAT\.AM|SAT\.NN|SAT\.PM)$/i.test(name)) { valid = false; msg = 'Format: SRT-LVn.TIME (e.g. SRT-LV5.SAT.PM)'; }
    if (!valid) { err.textContent = msg; err.style.display = 'block'; return; }

    if (!S.classes[dept]) S.classes[dept] = [];
    if (S.classes[dept].includes(name)) { err.textContent = 'Class already exists'; err.style.display = 'block'; return; }
    S.classes[dept].push(name);
    saveAll();
    overlay.remove();
    toast('Added ' + (dept === 'GAK' ? 'GAK-' + name : name), 2000);
    renderCurrentPage();
  };
};

window.deleteClass = function(dept, className) {
