// Build a mini calendar for one month, colours from holiday list
// ── Notice mini calendar — copy of Calendar month render, notice colours ──
function _buildNoticeMiniCal(yr, mo, allHol, noticeDept){
  const MNAMES=['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  const MNAMES_CN=['\u4e00\u6708','\u4e8c\u6708','\u4e09\u6708','\u56db\u6708','\u4e94\u6708','\u516d\u6708',
                   '\u4e03\u6708','\u516b\u6708','\u4e5d\u6708','\u5341\u6708','\u5341\u4e00\u6708','\u5341\u4e8c\u6708'];

  const days = new Date(yr, mo, 0).getDate();
  const ms   = `${yr}-${String(mo).padStart(2,'0')}`;
  const af   = (new Date(yr, mo-1, 1).getDay() + 6) % 7; // first day offset Mon=0
  const d    = _hd(yr);

  // ── Dept helpers (same as Calendar, dept = noticeDept) ───────────
  const dept = noticeDept || 'SRK';
  const satIsWork = false; // SRK/GAK/ATC/SRT: Sat is off

  const subDates = new Set(_getSubHols(yr).map(s=>s.date));

  function deptMatch(depts){ return !depts||depts.includes(dept)||depts.includes('MASTER'); }

  function isSHForDept(ds2){
    const sh2 = S.schoolHolDates[yr]||{};
    return Object.values(sh2).some(r=>r.start&&r.end&&ds2>=r.start&&ds2<=r.end&&deptMatch(r.depts));
  }

  function getFestCatLocal(ds2){
    const tplDates = new Set(HOLIDAY_TEMPLATE.map(t=>t.dt==='fixed'?`${yr}-${t.md}`:(d[t.id]||'')).filter(Boolean));
    if(tplDates.has(ds2)) return null;
    for(const fc of FESTIVAL_CONFIG){
      const f=(S.festivalDates[yr]||{})[fc.id]||{};
      if(f.start&&f.end&&ds2>=f.start&&ds2<=f.end) return (f.days||{})[ds2]||null;
    }
    return null;
  }

  // ── getDayStyle equivalent (SAME logic as Calendar) ─────────────
  // Maps Calendar colours to notice palette:
  //   black (#000)    → #5C1010  (dark maroon)
  //   grey  (#AAAAAA) → #F2DADA  (light pink)
  //   white (#fff)    → #fff
  function noticeStyle(ds2, dow){
    const isSun=dow===6, isSat=dow===5;
    if(isSun||(isSat&&!satIsWork)) return {bg:'#5C1010',txt:'#fff',bold:false};
    const festCat=getFestCatLocal(ds2);
    const shDay=isSHForDept(ds2);
    const isSpec=(S.specialHolidays[yr]||[]).some(h=>h.date===ds2);
    const isSub=subDates.has(ds2);
    const nonFestPH=(isPH(ds2)&&!festCat)||isSpec||isSub;
    const nonFestOFF=isCentreOff(ds2)&&!festCat;
    if(nonFestPH||nonFestOFF) return {bg:'#5C1010',txt:'#fff',bold:true};
    if(festCat==='PH2') return {bg:'#5C1010',txt:'#fff',bold:true};
    if(festCat==='OFF') return {bg:'#F2DADA',txt:'#7A1E1E',bold:true};
    if(shDay)           return {bg:'#F2DADA',txt:'#7A1E1E',bold:true};
    return {bg:'#fff',txt:'#555',bold:false};
  }

  // isECDay — exact copy of Calendar's isExtraClass(ds, dept) logic
  function isECDay(ds2){
    return ((S.extraClasses||{})[yr]||[]).some(e=>{
      if(!e.start||!e.end||ds2<e.start||ds2>e.end) return false;
      return !dept||!e.depts||!e.depts.length||e.depts.includes(dept);
    });
  }

  // ── Build HTML ────────────────────────────────────────────────────
  let html = `<div style="border:2px solid #5C1010;border-radius:6px;overflow:hidden;font-family:Arial,sans-serif;background:#fff;">`;

  // Month header
  html += `<div style="background:#5C1010;color:#fff;padding:7px 12px;display:flex;justify-content:space-between;align-items:center;">
    <span style="font-weight:700;font-size:12px;">${MNAMES[mo-1]} ${yr}</span>
    <span style="font-size:10px;opacity:.7;">${MNAMES_CN[mo-1]}</span>
  </div>`;

  // Day headers — M-F medium red, S/S dark
  html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);">
    ${['M','T','W','T','F','S','S'].map((x,i)=>`<div style="text-align:center;font-size:9px;font-weight:700;padding:4px 0;background:${i>=5?'#3d1a1a':'#8B3030'};color:#fff;">${x}</div>`).join('')}
  </div>`;

  // Day grid
  html += `<div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #5C1010;">`;
  for(let i=0;i<af;i++) html+=`<div style="min-height:26px;background:#faf9f7;"></div>`;
  for(let day=1;day<=days;day++){
    const ds2=`${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow=(af+day-1)%7;
    const {bg,txt,bold}=noticeStyle(ds2,dow);
    const ec=isECDay(ds2);
    html+=`<div style="min-height:26px;padding:2px;background:${bg};border:1px solid ${bg==='#fff'?'#ede9e3':'transparent'};display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <span style="font-size:11px;font-weight:700;color:${txt};line-height:1;">${day}</span>
      ${ec?`<span style="font-size:7px;line-height:1;color:${bg==='#5C1010'?'#fff':bg==='#F2DADA'?'#7A1E1E':'#5C1010'}">★</span>`:''}
    </div>`;
  }
  const rem=(af+days)%7;
  if(rem>0) for(let i=0;i<7-rem;i++) html+=`<div style="min-height:26px;background:#faf9f7;"></div>`;
  html+=`</div>`;

  // ── Sections (SAME logic as Calendar) ─────────────────────────────

  // isFestOnlyOFF: same as Calendar
  const isFestOnlyOFF=(ds2)=>{
    const isFestOFF=FESTIVAL_CONFIG.some(fc=>{
      const f=(S.festivalDates[yr]||{})[fc.id]||{};
      return f.start&&f.end&&ds2>=f.start&&ds2<=f.end&&(f.days||{})[ds2]==='OFF';
    });
    if(!isFestOFF) return false;
    const tpl=new Set(HOLIDAY_TEMPLATE.map(t=>t.dt==='fixed'?`${yr}-${t.md}`:(d[t.id]||'')).filter(Boolean));
    return !tpl.has(ds2);
  };

  // Holiday list
  const subs2=_getSubHols(yr);
  const monthPHList=[];
  for(let dd=1;dd<=days;dd++){
    const ds2=`${yr}-${String(mo).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const subEntry=subs2.find(s=>s.date===ds2);
    if(!subEntry&&isFestOnlyOFF(ds2)) continue;
    const phName=getPHNameFull(ds2)||getOffName(ds2);
    if(subEntry) monthPHList.push(`<div style="font-size:9px;line-height:1.6;font-weight:700"><b>${dd}</b> ${escapeHTML(subEntry.name.replace(/\s*\([^)]*\)/g,'').trim())}</div>`);
    else if(phName) monthPHList.push(`<div style="font-size:9px;line-height:1.6;font-weight:700"><b>${dd}</b> ${escapeHTML(phName)}</div>`);
  }

  // Festival ranges
  const festInMonth=[];
  FESTIVAL_CONFIG.forEach(fc=>{
    const fest=(S.festivalDates[yr]||{})[fc.id]||{};
    if(!fest.start||!fest.end) return;
    if(fest.end<ms+'-01'||fest.start>ms+'-31') return;
    festInMonth.push({name:fc.name,start:_ddmmS(fest.start),end:_ddmmS(fest.end)});
  });

  // School holiday ranges
  const sh=S.schoolHolDates[yr]||{};
  const shRanges=Object.values(sh).filter(r=>{
    if(!r.start||!r.end) return false;
    if(!deptMatch(r.depts)) return false;
    return r.start.startsWith(ms)||r.end.startsWith(ms)||(r.start<=ms+'-01'&&r.end>=ms+'-28');
  });

  // Extra class
  // ecInMonth — exact copy of Calendar's ecInMonth filter logic
  const ecInMonth = ((S.extraClasses||{})[yr]||[]).filter(e=>{
    if(!e.start||!e.end) return false;
    if(!(!dept||!e.depts||!e.depts.length||e.depts.includes(dept))) return false;
    return e.start.startsWith(ms)||e.end.startsWith(ms)||(e.start<=ms+'-01'&&e.end>=ms+'-28');
  });

  // Government type: solid outer → dashed between PH and SH
  // Centre type:     solid separator → dashed between Festive and EC
  if(monthPHList.length) html+=`<div style="padding:6px 10px;border-top:1px solid #5C1010;background:#faf8f5;">
    <div style="font-size:8px;font-weight:700;color:#5C1010;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Public Holiday</div>
    ${monthPHList.join('')}</div>`;
  if(shRanges.length) html+=`<div style="padding:6px 10px;border-top:${monthPHList.length?'1.5px dashed #C0A0A0':'1px solid #5C1010'};background:#edecea;">
    <div style="font-size:8px;font-weight:700;color:#5C1010;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">KPM School Holiday</div>
    ${shRanges.map(r=>`<div style="font-size:9px;line-height:1.6">${_ddmmS(r.start)} – ${_ddmmS(r.end)} (${escapeHTML(r.name||'School Holiday')})</div>`).join('')}</div>`;
  if(festInMonth.length) html+=`<div style="padding:6px 10px;border-top:1px solid #5C1010;background:#f5f2ec;">
    <div style="font-size:8px;font-weight:700;color:#5C1010;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Our Festive Holidays</div>
    ${festInMonth.map(f=>`<div style="font-size:9px;line-height:1.6">${f.start} – ${f.end} (${escapeHTML(f.name)})</div>`).join('')}</div>`;
  if(ecInMonth.length){
    // Deduplicate by date range (e.start / e.end)
    const ecGroups={};
    ecInMonth.forEach(e=>{
      const key=`${e.start}|${e.end||e.start}`;
      if(!ecGroups[key]) ecGroups[key]={start:e.start,end:e.end||e.start,entries:[]};
      const lbl=[e.name&&e.name!=='Extra Class'?e.name:'',e.time||''].filter(Boolean).join(' ');
      if(lbl&&!ecGroups[key].entries.includes(lbl)) ecGroups[key].entries.push(lbl);
    });
    const ecRows=Object.values(ecGroups).map(g=>`<div style="font-size:9px;line-height:1.7"><b>${_ddmmS(g.start)}${g.end&&g.end!==g.start?' – '+_ddmmS(g.end):''}</b>${g.entries.length?' <span style="font-weight:400">'+escapeHTML(g.entries.join(' / '))+'</span>':''}</div>`);
    html+=`<div style="padding:6px 10px;border-top:${festInMonth.length?'1.5px dashed #C0A0A0':'1px solid #5C1010'};background:#f5f0fa;">
    <div style="font-size:8px;font-weight:700;color:#5C1010;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">★ Our Extra Learning Day</div>
    ${ecRows.join('')}</div>`;
  }
  if(!monthPHList.length&&!festInMonth.length&&!shRanges.length&&!ecInMonth.length)
    html+=`<div style="border-top:1px solid #5C1010;min-height:4px;"></div>`;

  html+=`</div>`;
  return html;
}

// ── Book Notice mini calendar — same logic, black/grey/white palette ──
function _buildBookMiniCal(yr, mo, allHol, noticeDept){
  const MNAMES=['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
  const MNAMES_CN=['一月','二月','三月','四月','五月','六月',
                   '七月','八月','九月','十月','十一月','十二月'];
  const days=new Date(yr,mo,0).getDate();
  const ms=`${yr}-${String(mo).padStart(2,'0')}`;
  const af=(new Date(yr,mo-1,1).getDay()+6)%7;
  const d=_hd(yr);
  const dept=noticeDept||'SRK';
  const satIsWork=false;
  const subDates=new Set(_getSubHols(yr).map(s=>s.date));
  function deptMatch(depts){return !depts||depts.includes(dept)||depts.includes('MASTER');}
  function isSHForDept(ds2){
    return Object.values(S.schoolHolDates[yr]||{}).some(r=>r.start&&r.end&&ds2>=r.start&&ds2<=r.end&&deptMatch(r.depts));
  }
  function getFestCatLocal(ds2){
    const tpl=new Set(HOLIDAY_TEMPLATE.map(t=>t.dt==='fixed'?`${yr}-${t.md}`:(d[t.id]||'')).filter(Boolean));
    if(tpl.has(ds2)) return null;
    for(const fc of FESTIVAL_CONFIG){
      const f=(S.festivalDates[yr]||{})[fc.id]||{};
      if(f.start&&f.end&&ds2>=f.start&&ds2<=f.end) return (f.days||{})[ds2]||null;
    }
    return null;
  }
  // BLACK/GREY/WHITE palette (instead of maroon/pink)
  function noticeStyle(ds2,dow){
    const isSun=dow===6,isSat=dow===5;
    if(isSun||(isSat&&!satIsWork)) return {bg:'#000',txt:'#fff',bold:false};
    const festCat=getFestCatLocal(ds2);
    const shDay=isSHForDept(ds2);
    const isSpec=(S.specialHolidays[yr]||[]).some(h=>h.date===ds2);
    const isSub=subDates.has(ds2);
    const nonFestPH=(isPH(ds2)&&!festCat)||isSpec||isSub;
    const nonFestOFF=isCentreOff(ds2)&&!festCat;
    if(nonFestPH||nonFestOFF) return {bg:'#000',txt:'#fff',bold:true};
    if(festCat==='PH2') return {bg:'#000',txt:'#fff',bold:true};
    if(festCat==='OFF') return {bg:'#AAAAAA',txt:'#000',bold:true};
    if(shDay) return {bg:'#AAAAAA',txt:'#000',bold:true};
    return {bg:'#fff',txt:'#555',bold:false};
  }
  function isECDay(ds2){
    return ((S.extraClasses||{})[yr]||[]).some(e=>{
      if(!e.start||!e.end||ds2<e.start||ds2>e.end) return false;
      return !dept||!e.depts||!e.depts.length||e.depts.includes(dept);
    });
  }
  // Day header row — dark grey for M-F, black for S/S
  const dowHdr=['M','T','W','T','F','S','S'].map((x,i)=>
    `<div style="text-align:center;font-size:9px;font-weight:700;padding:4px 0;background:${i>=5?'#000':'#555'};color:#fff;">${x}</div>`
  ).join('');
  let cells='';
  for(let i=0;i<af;i++) cells+=`<div style="min-height:26px;background:#f8f8f8;"></div>`;
  for(let day=1;day<=days;day++){
    const ds2=`${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow=(af+day-1)%7;
    const {bg,txt,bold}=noticeStyle(ds2,dow);
    const ec=isECDay(ds2);
    cells+=`<div style="min-height:26px;padding:2px;background:${bg};border:1px solid ${bg==='#fff'?'#e0e0e0':'transparent'};display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <span style="font-size:11px;font-weight:700;color:${txt};line-height:1;">${day}</span>
      ${ec?`<span style="font-size:7px;line-height:1;color:${bg==='#000'?'#fff':'#000'}">★</span>`:''}
    </div>`;
  }
  const rem=(af+days)%7;
  if(rem>0) for(let i=0;i<7-rem;i++) cells+=`<div style="min-height:26px;background:#f8f8f8;"></div>`;

  // Sections — same logic, black/grey dividers
  const isFestOnlyOFF=(ds2)=>{
    const isFO=FESTIVAL_CONFIG.some(fc=>{const f=(S.festivalDates[yr]||{})[fc.id]||{};return f.start&&f.end&&ds2>=f.start&&ds2<=f.end&&(f.days||{})[ds2]==='OFF';});
    if(!isFO) return false;
    const tpl=new Set(HOLIDAY_TEMPLATE.map(t=>t.dt==='fixed'?`${yr}-${t.md}`:(d[t.id]||'')).filter(Boolean));
    return !tpl.has(ds2);
  };
  const subs2=_getSubHols(yr);
  const monthPHList=[];
  for(let dd=1;dd<=days;dd++){
    const ds2=`${yr}-${String(mo).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const subEntry=subs2.find(s=>s.date===ds2);
    if(!subEntry&&isFestOnlyOFF(ds2)) continue;
    const phName=getPHNameFull(ds2)||getOffName(ds2);
    if(subEntry) monthPHList.push(`<div style="font-size:9px;line-height:1.6;font-weight:700"><b>${dd}</b> ${escapeHTML(subEntry.name.replace(/\s*\([^)]*\)/g,'').trim())}</div>`);
    else if(phName) monthPHList.push(`<div style="font-size:9px;line-height:1.6;font-weight:700"><b>${dd}</b> ${escapeHTML(phName)}</div>`);
  }
  const festInMonth=[];
  FESTIVAL_CONFIG.forEach(fc=>{
    const fest=(S.festivalDates[yr]||{})[fc.id]||{};
    if(!fest.start||!fest.end) return;
    if(fest.end<ms+'-01'||fest.start>ms+'-31') return;
    festInMonth.push({name:fc.name,start:_ddmmS(fest.start),end:_ddmmS(fest.end)});
  });
  const sh=S.schoolHolDates[yr]||{};
  const shRanges=Object.values(sh).filter(r=>{
    if(!r.start||!r.end) return false;
    if(!deptMatch(r.depts)) return false;
    return r.start.startsWith(ms)||r.end.startsWith(ms)||(r.start<=ms+'-01'&&r.end>=ms+'-28');
  });
  const ecInMonth=((S.extraClasses||{})[yr]||[]).filter(e=>{
    if(!e.start||!e.end) return false;
    if(!(!dept||!e.depts||!e.depts.length||e.depts.includes(dept))) return false;
    return e.start.startsWith(ms)||e.end.startsWith(ms)||(e.start<=ms+'-01'&&e.end>=ms+'-28');
  });

  const S_LINE='border-top:1px solid #000';
  const D_LINE='border-top:1.5px dashed #aaa';
  let secs='';
  if(monthPHList.length) secs+=`<div style="padding:6px 10px;${S_LINE};background:#f8f8f8;"><div style="font-size:8px;font-weight:700;color:#000;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Public Holiday</div>${monthPHList.join('')}</div>`;
  if(shRanges.length) secs+=`<div style="padding:6px 10px;${monthPHList.length?D_LINE:S_LINE};background:#f0f0f0;"><div style="font-size:8px;font-weight:700;color:#000;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">KPM School Holiday</div>${shRanges.map(r=>`<div style="font-size:9px;line-height:1.6">${_ddmmS(r.start)} – ${_ddmmS(r.end)} (${escapeHTML(r.name||'School Holiday')})</div>`).join('')}</div>`;
  if(festInMonth.length) secs+=`<div style="padding:6px 10px;${S_LINE};background:#eee;"><div style="font-size:8px;font-weight:700;color:#000;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">Our Festive Holidays</div>${festInMonth.map(f=>`<div style="font-size:9px;line-height:1.6">${f.start} – ${f.end} (${escapeHTML(f.name)})</div>`).join('')}</div>`;
  if(ecInMonth.length){
    const ecG={};
    ecInMonth.forEach(e=>{const k=`${e.start}|${e.end||e.start}`;if(!ecG[k])ecG[k]={start:e.start,end:e.end||e.start,entries:[]};const lbl=[e.name&&e.name!=='Extra Class'?e.name:'',e.time||''].filter(Boolean).join(' ');if(lbl&&!ecG[k].entries.includes(lbl))ecG[k].entries.push(lbl);});
    secs+=`<div style="padding:6px 10px;${festInMonth.length?D_LINE:S_LINE};background:#e8e8e8;"><div style="font-size:8px;font-weight:700;color:#000;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">★ Our Extra Learning Day</div>${Object.values(ecG).map(g=>`<div style="font-size:9px;line-height:1.7"><b>${_ddmmS(g.start)}${g.end&&g.end!==g.start?' – '+_ddmmS(g.end):''}</b>${g.entries.length?' <span style="font-weight:400">'+escapeHTML(g.entries.join(' / '))+'</span>':''}</div>`).join('')}</div>`;
  }
  if(!secs) secs=`<div style="${S_LINE};min-height:4px;"></div>`;

  return `<div style="border:2px solid #000;border-radius:6px;overflow:hidden;font-family:Arial,sans-serif;background:#fff;">
    <div style="background:#000;color:#fff;padding:7px 12px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-weight:700;font-size:12px;">${MNAMES[mo-1]} ${yr}</span>
      <span style="font-size:10px;opacity:.6;">${MNAMES_CN[mo-1]}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);">${dowHdr}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid #000;">${cells}</div>
    ${secs}
  </div>`;
}

// Dept-aware holiday collector for parent notice
function _filterPeriodHolidaysForDept(yr, months, dept){
  const list = [];
  const d = _hd(yr);
  // Template holidays (same for all depts)
  HOLIDAY_TEMPLATE.forEach(t=>{
    const dt = t.dt==='fixed' ? `${yr}-${t.md}` : d[t.id];
    if(!dt) return;
    list.push({ date:dt, name:t.name, cat:t.cat });
  });
  // Festival holidays (same for all depts)
  FESTIVAL_CONFIG.forEach(fc=>{
    const fest = (S.festivalDates[yr]||{})[fc.id]||{};
    Object.entries(fest.days||{}).forEach(([ds,cat])=>{
      if(!fest.start||!fest.end||ds<fest.start||ds>fest.end) return;
      if(cat==='PH2'||cat==='OFF'){
        if(new Date(ds+'T12:00:00').getDay()===0 && cat!=='PH2') return;
        list.push({ date:ds, name:fc.name, cat });
      }
    });
  });
  // Special holidays
  (S.specialHolidays[yr]||[]).forEach(s=>{
    if(s.date) list.push({ date:s.date, name:s.name, cat:s.category||'PH2' });
  });
  // Substitute holidays
  _getSubHols(yr).forEach(s=>{
    list.push({ date:s.date, name:s.name.replace(/\s*\(.*?\)/g,'').trim(), cat:'SUB', isReplace:true });
  });
  // School holidays — filtered by dept
  const sh = S.schoolHolDates[yr]||{};
  Object.entries(sh).forEach(([id, r])=>{
    if(!r.start||!r.end) return;
    const depts = r.depts||['SRK','GAK','ATC'];
    if(dept && !depts.includes(dept) && !depts.includes('MASTER')) return;
    list.push({
      date:r.start, endDate:r.end,
      name:r.name||'School Holiday', cat:'SH', isRange:true,
      depts: depts
    });
  });
  // Extra classes — filter by dept (same logic as Calendar deptMatch)
  ((S.extraClasses||{})[yr]||[]).forEach(ec=>{
    if(!ec.start) return;
    const ecDepts = ec.depts||[];
    // Empty depts = applies to all; otherwise must include this dept or MASTER
    if(ecDepts.length>0 && !ecDepts.includes(dept) && !ecDepts.includes('MASTER')) return;
    list.push({ date:ec.start, endDate:ec.end||ec.start, name:ec.name||'Extra Class', cat:'EC', isRange:!!(ec.end&&ec.end!==ec.start), isEC:true, depts:ecDepts });
  });

  list.sort((a,b)=>a.date.localeCompare(b.date));
  return list.filter(h=>{
    const m = parseInt(h.date.slice(5,7));
    if(months.includes(m)) return true;
    if(h.isRange){
      const em = parseInt((h.endDate||h.date).slice(5,7));
      if(months.includes(em)) return true;
    }
    return false;
  });
}

function _noticeCopy(periodId, yr){
  const period = NOTICE_PERIODS.find(p=>p.id===periodId);
  const holidays = _filterPeriodHolidays(yr, period.months);
  const center = (S.meta && S.meta.centerName) || 'Academee';
  let txt = `*${center.toUpperCase()} - HOLIDAY NOTICE*\n*${period.label} ${yr} · ${period.labelCN} ${yr}*\n\n`;
  txt += `Dear Parents, please be informed of our holiday schedule for ${period.label} ${yr}:\n`;
  txt += `亲爱的家长，谨此通知本中心 ${period.labelCN} 的休假日如下：\n\n`;
  if(!holidays.length){
    txt += `(No holidays in this period / 此期间无假期)\n`;
  } else {
    holidays.forEach(h=>{
      const cn = NOTICE_NAME_CN[h.name] || h.name;
      const dateStr = h.isRange ? `${_fmtNoticeDate(h.date)} – ${_fmtNoticeDate(h.endDate)}` : _fmtNoticeDate(h.date);
      txt += `📅 ${dateStr}\n   ${h.name}\n   ${cn}\n\n`;
    });
  }
  const pf = PERIOD_FOOTER[periodId]||PERIOD_FOOTER.p1;
  txt += `${pf.en}\n${pf.cn}\n\n— ${center} Management`;
  navigator.clipboard.writeText(txt).then(()=>alert('✓ Copied to clipboard!\n\nReady to paste into WhatsApp / WeChat.'))
  .catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    alert('✓ Copied to clipboard!');
  });
}

// IMPORT / EXPORT
// ═══════════════════════════════════════════════════════════════════════════
// ═══ STORE (async interface — Calendar Supabase mapping pending schema check) ═══
// ── Store: Supabase calendar_events ⇄ S blob (relational mapping) ──
// Strategy A: table stores REAL depts only (MASTER/TEACHER are see-all VIEWS).
const Store = {
  async get(){
    let cachedMeta = {};
    try { const c = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); cachedMeta = c.meta||{}; } catch(e){}
    try {
      const { data, error } = await _sb.from('calendar_events').select('*');
      if(error) throw error;
      const S2 = { holidayDates:{}, schoolHolDates:{}, specialHolidays:{}, festivalDates:{}, extraClasses:{}, meta:cachedMeta };
      const TPL_IDS = SCHOOL_HOL_TEMPLATE.map(t=>t.id);
      for(const r of (data||[])){
        const yr = String(r.year);
        const depts = Array.isArray(r.depts) ? r.depts : [];
        const det = r.details || {};
        if(r.type==='public_holiday'){
          (S2.holidayDates[yr]=S2.holidayDates[yr]||{})[r.name]=r.start_date;
        } else if(r.type==='school_holiday'){
          const key = TPL_IDS.includes(r.name) ? r.name : r.id;   // template id → matches SCHOOL_HOL_TEMPLATE name lookup
          (S2.schoolHolDates[yr]=S2.schoolHolDates[yr]||{})[key]={ start:r.start_date, end:r.end_date, depts:depts, name:r.name };
        } else if(r.type==='festival'){
          (S2.festivalDates[yr]=S2.festivalDates[yr]||{})[r.name]={ start:r.start_date, end:r.end_date, days:(det.days||{}) };
        } else if(r.type==='extra_class'){
          (S2.extraClasses[yr]=S2.extraClasses[yr]||[]).push({ id:r.id, name:r.name, start:r.start_date, end:r.end_date, time:(det.time||''), depts:depts });
        } else if(r.type==='special_holiday'){
          (S2.specialHolidays[yr]=S2.specialHolidays[yr]||[]).push(Object.assign({ date:r.start_date, name:r.name }, det));
        }
      }
      const raw = JSON.stringify(S2);
      try { localStorage.setItem(STORAGE_KEY, raw); } catch(e){}
      return raw;
    } catch(e){
      console.error('Store.get supabase failed → fallback cache', e);
      return localStorage.getItem(STORAGE_KEY);
    }
  },
  async set(v){
    try { localStorage.setItem(STORAGE_KEY, v); } catch(e){}   // cache first (sync-safe)
    let obj; try { obj = JSON.parse(v); } catch(e){ return; }
    const strip = (a)=> (Array.isArray(a)?a:[]).filter(d=>d!=='MASTER'&&d!=='TEACHER');   // table stores real depts only
    const rows = [];
    for(const yr in (obj.holidayDates||{})){
      for(const name in obj.holidayDates[yr]){
        rows.push({ id:name, year:parseInt(yr), type:'public_holiday', name:name, start_date:obj.holidayDates[yr][name]||null, end_date:null, depts:[], details:{} });
      }
    }
    for(const yr in (obj.schoolHolDates||{})){
      for(const key in obj.schoolHolDates[yr]){
        const h = obj.schoolHolDates[yr][key];
        rows.push({ id:key, year:parseInt(yr), type:'school_holiday', name:(h.name||key), start_date:h.start||null, end_date:h.end||null, depts:strip(h.depts), details:{} });
      }
    }
    for(const yr in (obj.festivalDates||{})){
      for(const name in obj.festivalDates[yr]){
        const f = obj.festivalDates[yr][name];
        rows.push({ id:name, year:parseInt(yr), type:'festival', name:name, start_date:f.start||null, end_date:f.end||null, depts:[], details:{ days:(f.days||{}) } });
      }
    }
    for(const yr in (obj.extraClasses||{})){
      for(const e of (obj.extraClasses[yr]||[])){
        rows.push({ id:(e.id||('ec_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5))), year:parseInt(yr), type:'extra_class', name:(e.name||'Extra Class'), start_date:e.start||null, end_date:e.end||null, depts:strip(e.depts), details:{ time:(e.time||'') } });
      }
    }
    for(const yr in (obj.specialHolidays||{})){
      for(const s of (obj.specialHolidays[yr]||[])){
        const rest = {}; for(const k in s){ if(k!=='date'&&k!=='name'&&k!=='id') rest[k]=s[k]; }
        rows.push({ id:(s.id||('sp_'+(s.date||'')+'_'+Math.random().toString(36).slice(2,6))), year:parseInt(yr), type:'special_holiday', name:(s.name||'Special'), start_date:(s.date||null), end_date:null, depts:[], details:rest });
      }
    }
    try {
      const valid = rows.filter(r=>r.start_date);   // skip incomplete (no start date) → don't persist empty slots
      if(valid.length){
        const { error } = await _sb.from('calendar_events').upsert(valid, { onConflict:'id' });
        if(error) throw error;
        // WRITE-CLEAR: delete rows no longer present
        const newIds = new Set(valid.map(r=>r.id));
        const { data: existing, error: selErr } = await _sb.from('calendar_events').select('id');
        if(!selErr){
          const toDel = (existing||[]).map(r=>r.id).filter(id=>!newIds.has(id));
          if(toDel.length){
            const { error: delErr } = await _sb.from('calendar_events').delete().in('id', toDel);
            if(delErr) console.error('Store.set cleanup failed', delErr);
          }
        }
      }
    } catch(e){
      console.error('Store.set supabase failed (cached locally)', e);
    }
  },
  async del(){ try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} },
  async getKey(k){ return localStorage.getItem(k); },
  delKey(k){ try{ localStorage.removeItem(k); }catch(e){} }
};
function _dateStamp(){var d=new Date();return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"_"+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0");}
function exportAll(){
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'MasterHub_Calendar_' + _dateStamp() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importAll(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try{
      const p = JSON.parse(e.target.result);
      if(!confirm('This will OVERWRITE all current holiday data with the imported file. Continue?')) return;
      if(p.holidayDates    && typeof p.holidayDates==='object')    S.holidayDates    = p.holidayDates;
      if(p.schoolHolDates  && typeof p.schoolHolDates==='object')  S.schoolHolDates  = p.schoolHolDates;
      if(p.specialHolidays && typeof p.specialHolidays==='object') S.specialHolidays = p.specialHolidays;
      if(p.festivalDates   && typeof p.festivalDates==='object')   S.festivalDates   = p.festivalDates;
      if(p.extraClasses    && typeof p.extraClasses==='object')    S.extraClasses    = p.extraClasses;
      if(p.meta && typeof p.meta==='object') S.meta = Object.assign({}, S.meta, p.meta);
      await saveAll();
      alert('Import successful!');
      location.reload();
    }catch(err){ alert('Import failed: '+err.message); }
  };
  reader.readAsText(file);
}
async function clearAll(){
  if(!confirm('Reset ALL data to factory? Cannot undo.')) return;
  if(prompt('Type DELETE to confirm:') !== 'DELETE') return;
  exportAll();
  await Store.del();
  location.reload();
}

// ═══ SCORECARD BEHAVIORS ═══
var _dirty = false;
function _markDirty(){ _dirty = true; }
var _origSaveAll = saveAll;
saveAll = async function(){ await _origSaveAll(); _dirty = false; };
document.addEventListener('keydown', async function(e){
  if(e.key==='Escape'){
    var ov = document.getElementById('sync-overlay') || document.getElementById('paste-overlay');
    if(ov){ ov.remove(); e.preventDefault(); }
  }
  if((e.ctrlKey||e.metaKey) && e.key==='s'){ e.preventDefault(); await saveAll(); flashSaved(); }
});
window.addEventListener('beforeunload', function(e){
  if(_dirty){ e.preventDefault(); e.returnValue=''; }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); } catch(ex){}
});

// ══ AUTH ══
async function doLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';
  if (!email) { errEl.textContent = 'Please enter email'; return; }
  if (!pass) { errEl.textContent = 'Please enter password'; return; }
  const btn = document.getElementById('auth-login-btn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    await initApp();
  } catch (e) {
    errEl.textContent = e.message || 'Login failed';
    btn.disabled = false; btn.textContent = 'Login';
  }
}

async function doMagicLink() {
  const email = document.getElementById('auth-email').value.trim();
  const errEl = document.getElementById('auth-err');
  errEl.textContent = '';
  if (!email) { errEl.textContent = 'Please enter email'; return; }
  const btn = document.getElementById('auth-magic-btn');
  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const { error } = await _sb.auth.signInWithOtp({ email });
    if (error) throw error;
    errEl.style.color = 'var(--grn)';
    errEl.textContent = '✓ Check your email for the login link';
  } catch (e) {
    errEl.textContent = e.message || 'Failed to send';
  }
  btn.disabled = false; btn.textContent = 'Send Magic Link';
}

document.addEventListener('DOMContentLoaded', () => {
  ['auth-email','auth-pass'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
});

  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'flex';
  await loadData();
  document.getElementById('loading-screen').style.display = 'none';
