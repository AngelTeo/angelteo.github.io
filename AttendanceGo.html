<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1,user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<title>OPR-AttendanceGo v8</title>
<style>
:root{
  --layer:#8B6C2A;
  --d-srk:#C45C5C;--d-gak:#E8A04E;--d-atc:#7AB05A;--d-srt:#8B6CAE;
  --sur:#ffffff;--sur2:#f7f6f2;--bdr:#e0ddd6;
  --txt:#1a1a1a;--mut:#888888;--hint:#bbbbbb;
  --ok:#0F6E56;--warn:#854F0B;--danger:#A32D2D;--info:#236FAD;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:var(--sur2);color:var(--txt);font-size:13px;line-height:1.4}

/* NAV */
.nav{background:var(--layer);border-bottom:.5px solid rgba(0,0,0,.2);
  display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:50;overflow-x:auto;gap:0}
.nav-home{background:none;border:none;color:rgba(255,255,255,.6);font-size:15px;cursor:pointer;padding:11px 10px 11px 0;flex-shrink:0}
.nav-home:hover{color:#fff}
.nav-logo{font-size:13px;font-weight:600;padding:12px 14px 12px 0;border-right:.5px solid rgba(255,255,255,.2);margin-right:4px;white-space:nowrap;flex-shrink:0;color:#fff}
.ver{background:#F9CB42;color:var(--layer);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;vertical-align:middle}
.ntab{padding:11px 14px;font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;border:none;background:transparent;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.ntab:hover{color:#fff}
.ntab.on{color:#fff;border-bottom-color:#fff;font-weight:600}
.nav-r{margin-left:auto;display:flex;gap:5px;align-items:center;padding-left:10px;flex-shrink:0}
.saved{font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap}

/* PAGES */
.page{display:none;padding:16px;max-width:1200px;margin:0 auto}
.page.on{display:block}

/* CARDS */
.card{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;padding:16px;margin-bottom:10px}

/* DEPT TABS */
.dept-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.dept-tab{padding:8px 16px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--sur);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.dept-tab.on{color:#fff;border-color:transparent}
.dept-tab[data-dept="SRK"].on{background:var(--d-srk)}
.dept-tab[data-dept="GAK"].on{background:var(--d-gak)}
.dept-tab[data-dept="ATC"].on{background:var(--d-atc)}
.dept-tab[data-dept="SRT"].on{background:var(--d-srt)}

/* CLASS CARD */
.class-card{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;margin-bottom:8px;overflow:hidden}
.class-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.class-hdr:active{background:var(--sur2)}
.class-name{font-size:13px;font-weight:600}
.class-stat{font-size:11px;color:var(--mut)}
.class-body{display:none;border-top:.5px solid var(--bdr)}
.class-body.open{display:block}

/* STUDENT ROW */
.stu-row{display:flex;align-items:center;padding:10px 14px;border-bottom:.5px solid var(--bdr);gap:10px}
.stu-row:last-child{border-bottom:none}
.stu-name{flex:1;font-size:12px}
.stu-num{font-size:10px;color:var(--mut);width:24px;text-align:center;flex-shrink:0}
.stu-cn{font-size:10px;color:var(--mut)}

/* STATUS TOGGLE */
.status-btn{padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;border:1.5px solid var(--bdr);background:var(--sur);cursor:pointer;font-family:inherit;min-width:28px;text-align:center;transition:all .1s;-webkit-tap-highlight-color:transparent}
.status-btn.s-present{background:#E1F5EE;color:var(--ok);border-color:#9FE1CB}
.status-btn.s-absent{background:#FCEBEB;color:var(--danger);border-color:#F09595}
.status-btn.s-late{background:#FFF8E1;color:var(--warn);border-color:#F9CB42}
.status-btn.s-mc{background:#EEF2F7;color:var(--info);border-color:#AABDD4}

/* MARK ALL BAR */
.mark-all-bar{display:flex;gap:6px;padding:10px 14px;background:var(--sur2);align-items:center}
.mark-all-bar span{font-size:10px;color:var(--mut);margin-right:auto}

/* STATS GRID */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--sur);border:.5px solid var(--bdr);border-radius:8px;padding:12px 10px;text-align:center}
.stat-num{font-size:22px;font-weight:700}
.stat-label{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* DEPT SUMMARY */
.dept-sum{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--bdr)}
.dept-sum:last-child{border-bottom:none}
.dept-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dept-info{flex:1}
.dept-info-name{font-size:12px;font-weight:600}
.dept-info-stat{font-size:10px;color:var(--mut)}
.pct-bar{width:80px;height:6px;background:var(--sur2);border-radius:3px;overflow:hidden;flex-shrink:0}
.pct-fill{height:100%;border-radius:3px;background:var(--ok);transition:width .3s}

/* DATE PICKER */
.date-input{padding:8px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:13px;font-family:inherit}

/* AUTH */
#auth-screen{display:flex;justify-content:center;align-items:center;min-height:100vh;background:var(--sur2)}
#auth-box{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:32px 28px;width:340px;max-width:90vw;text-align:center}
#auth-box h2{font-size:18px;font-weight:600;margin-bottom:4px;color:var(--layer)}
#auth-box p{font-size:12px;color:var(--mut);margin-bottom:20px}
#auth-box input{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:13px;margin-bottom:10px;font-family:inherit}
#auth-box button{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:6px}
.btn-login{background:var(--layer);color:#fff}
.btn-magic{background:var(--sur2);color:var(--mut);border:1px solid var(--bdr)!important}
#auth-err{color:var(--danger);font-size:11px;min-height:16px;margin-bottom:8px}
#loading-screen{display:none;justify-content:center;align-items:center;min-height:60vh;font-size:13px;color:var(--mut)}
#app{display:none}

/* HOLIDAY BANNER */
.holiday-banner{background:#FFF8E1;border:1px solid #F9CB42;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--warn);font-weight:500}

/* HISTORY TABLE */
.hist-row{display:flex;align-items:center;padding:8px 14px;border-bottom:.5px solid var(--bdr);font-size:12px}
.hist-row:last-child{border-bottom:none}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--txt);color:#fff;
  padding:9px 18px;border-radius:8px;font-size:12px;font-weight:500;opacity:0;
  transition:opacity .25s,transform .25s;pointer-events:none;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MANAGE */
.mg-title{font-size:11px;font-weight:600;color:var(--mut);letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px}
.mg-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--bdr);font-size:12px}
.mg-row:last-child{border-bottom:none}
.mg-row .k{color:var(--mut)}
.mg-row .v{font-weight:600}
.mg-code{font-size:11px;background:var(--sur2);padding:2px 6px;border-radius:3px;font-family:monospace}
.btn-pri{padding:8px 16px;border-radius:8px;border:none;background:var(--layer);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

@media(max-width:480px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div id="auth-screen">
  <div id="auth-box">
    <h2>AttendanceGo</h2>
    <p>Daily Attendance · Login</p>
    <div id="auth-err"></div>
    <input type="email" id="auth-email" placeholder="Email">
    <input type="password" id="auth-pass" placeholder="Password">
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div style="display:flex;align-items:center;gap:12px;margin:4px 0"><div style="flex:1;height:1px;background:var(--bdr)"></div><span style="font-size:12px;color:var(--mut)">or</span><div style="flex:1;height:1px;background:var(--bdr)"></div></div>
    <button class="btn-magic" onclick="doMagicLink()">Send Magic Link</button>
  </div>
</div>

<div id="loading-screen">Loading data…</div>

<!-- NO ACCESS -->
<div id="no-access" style="display:none;min-height:100vh;background:var(--bg);justify-content:center;align-items:center">
  <div style="text-align:center;padding:40px">
    <div style="font-size:48px;margin-bottom:12px">🔒</div>
    <div style="font-size:18px;font-weight:600;color:var(--layer);margin-bottom:8px">No Access</div>
    <div style="font-size:12px;color:var(--mut)">You do not have permission to view this system.</div>
    <button onclick="location.href='/index.html'" style="margin-top:20px;padding:8px 20px;border-radius:8px;border:none;background:var(--layer);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">← Back to Home</button>
  </div>
</div>

<div id="app">
  <div class="nav">
    <button class="nav-home" onclick="location.href='/index.html'">←</button>
    <div class="nav-logo">OPR-AttendanceGo <span class="ver">v8</span></div>
    <button class="ntab on" onclick="goPage('dashboard')">Dashboard</button>
    <button class="ntab" onclick="goPage('mark')">Mark</button>
    <button class="ntab" onclick="goPage('monthly')">Monthly</button>
    <button class="ntab" onclick="goPage('tracker')">Tracker</button>
    <button class="ntab" onclick="goPage('manage')">Manage</button>
    <div class="nav-r"><span class="saved" id="last-saved"></span></div>
  </div>

  <div class="page on" id="page-dashboard"><div id="dash-content"></div></div>
  <div class="page" id="page-mark"><div id="mark-content"></div></div>
  <div class="page" id="page-monthly"><div id="monthly-content"></div></div>
  <div class="page" id="page-tracker"><div id="tracker-content"></div></div>
  <div class="page" id="page-manage"><div id="manage-content"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://qnpvqsvvsgsantekgfbz.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFucHZxc3Z2c2dzYW50ZWtnZmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzg4MzIsImV4cCI6MjA5MTc1NDgzMn0.8rfv0BQpWNNSD8yrhHNwCOkcG9q5_uMD7B7z_Y324a0';
const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const APP_VERSION=8;
const DEPTS=['SRK','GAK','ATC','SRT'];
const DEPT_COLORS={SRK:'var(--d-srk)',GAK:'var(--d-gak)',ATC:'var(--d-atc)',SRT:'var(--d-srt)'};
const STATUSES=['present','absent','late','mc'];
const STATUS_LABELS={present:'✓',absent:'✕',late:'⏰',mc:'🤒'};
const DAY_MAP={0:'SUN',1:'MON',2:'TUE',3:'WED',4:'THU',5:'FRI',6:'SAT'};

// ── State ──
let allStudents=[];     // from hub_students
let allMemberships=[];  // from hub_student_memberships
let allCalendar=[];     // from calendar_events
let todayRecords=[];    // from attendance table
let markerNames={};     // email → display_name lookup
let currentDept='SRK';
let selectedDate=todayStr();
let userEmail='';

function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(ds){ return new Date(ds+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }
function fmtTime(){ return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }

// ── Auth ──
async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  document.getElementById('auth-err').textContent='';
  if(!email||!pass){document.getElementById('auth-err').textContent='Enter email and password';return;}
  const{error}=await _sb.auth.signInWithPassword({email,password:pass});
  if(error){document.getElementById('auth-err').textContent=error.message;return;}
  userEmail=email;
  initApp();
}
async function doMagicLink(){
  const email=document.getElementById('auth-email').value.trim();
  document.getElementById('auth-err').textContent='';
  if(!email){document.getElementById('auth-err').textContent='Enter email';return;}
  const{error}=await _sb.auth.signInWithOtp({email});
  if(error){document.getElementById('auth-err').textContent=error.message;return;}
  document.getElementById('auth-err').style.color='var(--ok)';
  document.getElementById('auth-err').textContent='✓ Check your email for the login link';
}

// ── Init ──
async function initApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
  // ── Permission gate ──
  const{data:perm}=await _sb.rpc('can_access',{p_system:'OPR-AttendanceGo'});
  if(!perm||!perm[0]||!perm[0].can_see){
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('no-access').style.display='flex';
    return;
  }
  try{
    const[stuRes, memRes, calRes]=await Promise.all([
      _sb.from('hub_students').select('id,name,name_cn,status'),
      _sb.from('hub_student_memberships').select('student_id,dept,class_code,num,start_date,end_date'),
      _sb.from('calendar_events').select('type,name,start_date,end_date,depts')
    ]);
    allStudents=(stuRes.data||[]).filter(s=>(s.status||'').toLowerCase()==='active');
    allMemberships=memRes.data||[];
    allCalendar=calRes.data||[];
    // Load marker display names
    const{data:mn}=await _sb.rpc('get_marker_names');
    (mn||[]).forEach(u=>{markerNames[u.email]=u.display_name;});
    console.log('Loaded:',allStudents.length,'students,',allMemberships.length,'memberships,',allCalendar.length,'calendar events');
    await loadAttendance(selectedDate);
  }catch(e){console.error('Init failed:',e);}
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='block';
  goPage('dashboard');
}

// ── Load attendance for a date ──
async function loadAttendance(date){
  selectedDate=date;
  const{data,error}=await _sb.from('attendance').select('*').eq('date',date);
  if(!error) todayRecords=data||[];
}

// ── Holiday check: returns matching holiday or null ──
// public_holiday / school_holiday / special_holiday / festival = no school
// extra_class = override, school ON even during holiday
const NO_SCHOOL_TYPES=['public_holiday','school_holiday','special_holiday','festival'];
function getHoliday(dateStr,dept){
  return allCalendar.find(ev=>{
    if(!NO_SCHOOL_TYPES.includes(ev.type)) return false;
    if(dateStr<ev.start_date) return false;
    if(ev.end_date&&dateStr>ev.end_date) return false;
    if(!ev.end_date&&dateStr!==ev.start_date) return false;
    // depts null = all; depts array = only listed
    if(ev.depts&&ev.depts.length>0&&!ev.depts.includes(dept)) return false;
    return true;
  })||null;
}
function hasExtraClass(dateStr,dept){
  return allCalendar.find(ev=>{
    if(ev.type!=='extra_class') return false;
    if(dateStr<ev.start_date) return false;
    if(ev.end_date&&dateStr>ev.end_date) return false;
    if(!ev.end_date&&dateStr!==ev.start_date) return false;
    if(ev.depts&&ev.depts.length>0&&!ev.depts.includes(dept)) return false;
    return true;
  })||null;
}
function getHolidayAllDepts(dateStr){
  return allCalendar.find(ev=>{
    if(!NO_SCHOOL_TYPES.includes(ev.type)) return false;
    if(dateStr<ev.start_date) return false;
    if(ev.end_date&&dateStr>ev.end_date) return false;
    if(!ev.end_date&&dateStr!==ev.start_date) return false;
    if(!ev.depts||ev.depts.length===0) return true;
    return false;
  })||null;
}

// ── Transfer helpers ──
// Find all memberships for a student that overlap a date range
function getOverlappingMems(studentId,dept,monthStart,monthEnd){
  return allMemberships.filter(m=>
    m.student_id===studentId&&m.dept===dept&&
    m.start_date<=monthEnd&&
    (m.end_date==null||m.end_date>=monthStart)
  );
}
// Find the new class after a transfer (same student, same dept, start_date near end_date)
function getTransferTarget(studentId,dept,endDate){
  return allMemberships.find(m=>
    m.student_id===studentId&&m.dept===dept&&
    m.start_date===endDate&&m.end_date==null
  )||null;
}

// ── Get students for a dept+class_code ──
function getClassStudents(dept,classCode){
  const mems=allMemberships.filter(m=>m.dept===dept&&m.class_code===classCode&&m.start_date<=selectedDate&&(m.end_date==null||m.end_date>=selectedDate));
  return mems.map(m=>{
    const stu=allStudents.find(s=>s.id===m.student_id);
    if(!stu) return null;
    return{...stu,num:m.num,dept,class_code:classCode};
  }).filter(Boolean).sort((a,b)=>(a.num??999)-(b.num??999));
}

// ── Get attendance status for a student ──
function getStatus(studentId,dept){
  const rec=todayRecords.find(r=>r.student_id===studentId&&r.dept===dept);
  return rec?rec.status:'unmarked';
}

// ── SRT: check if class has session today ──
function isSRTToday(classCode){
  // class_code like SRT_LV10_SAT_AM (D40 new format) or legacy SRT-LV10.SAT.AM
  const parts=classCode.replace(/^SRT[-_]/,'').split(/[._]/);
  // Day is the part matching MON/TUE/WED/THU/FRI/SAT/SUN
  const DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];
  const dayPart=parts.find(p=>DAYS.includes(p));
  if(!dayPart) return false;
  const today=DAY_MAP[new Date(selectedDate+'T12:00:00').getDay()];
  return dayPart===today;
}

// ── Get unique classes for dept from memberships ──
function getDeptClasses(dept,filterToday=true){
  const codes=[...new Set(allMemberships.filter(m=>m.dept===dept&&m.start_date<=selectedDate&&(m.end_date==null||m.end_date>=selectedDate)).map(m=>m.class_code))];
  let sorted=codes.sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  if(dept==='SRT'&&filterToday) sorted=sorted.filter(c=>isSRTToday(c));
  sorted=sorted.filter(c=>!c.includes('RSVP'));
  return sorted;
}

// ── Navigation ──
function goPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(el=>el.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  const map={dashboard:0,mark:1,monthly:2,tracker:3,manage:4};
  document.querySelectorAll('.ntab')[map[p]]?.classList.add('on');
  if(p==='dashboard') renderDashboard();
  if(p==='mark') renderMark();
  if(p==='monthly') renderMonthly();
  if(p==='tracker') renderTracker();
  if(p==='manage') renderManage();
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
function renderDashboard(){
  const el=document.getElementById('dash-content');
  const total=allStudents.length;
  const marked=todayRecords.length;

  // Group by status+dept
  const byStatus={absent:[],late:[],mc:[]};
  todayRecords.forEach(r=>{if(byStatus[r.status])byStatus[r.status].push(r);});
  function deptCount(arr,dept){return arr.filter(r=>r.dept===dept).length;}
  function deptDetail(arr){return DEPTS.map(d=>{const n=deptCount(arr,d);return n?`<span style="color:${DEPT_COLORS[d]}">${d} ${n}</span>`:null;}).filter(Boolean).join(' · ')||'–';}

  let h='';

  // Holiday check (all-dept holidays on dashboard)
  const dashHoliday=getHolidayAllDepts(selectedDate);
  if(dashHoliday){
    h+=`<div class="holiday-banner">🏖 Today is a holiday — <strong>${dashHoliday.name}</strong>. No attendance required.</div>`;
  }

  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div><div style="font-size:16px;font-weight:600">${fmtDate(selectedDate)}</div>
    <div style="font-size:11px;color:var(--mut)">${marked} of ${total} students marked</div></div>
    <button onclick="goPage('mark')" style="padding:8px 16px;border-radius:8px;border:none;background:var(--layer);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Mark Attendance</button>
  </div>`;

  // 3 stat boxes (Absent / Late / MC) with dept breakdown
  h+=`<div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">`;
  const statCfg=[
    {key:'absent',label:'ABSENT',color:'var(--danger)',icon:'✕'},
    {key:'late',label:'LATE',color:'var(--warn)',icon:'⏰'},
    {key:'mc',label:'MC',color:'var(--info)',icon:'🤒'}
  ];
  statCfg.forEach(cfg=>{
    const arr=byStatus[cfg.key];
    h+=`<div class="stat-box" style="cursor:pointer" onclick="dashDetail('${cfg.key}')">
      <div class="stat-num" style="color:${cfg.color}">${arr.length}</div>
      <div class="stat-label">${cfg.label}</div>
      <div style="font-size:9px;margin-top:6px;line-height:1.6">${deptDetail(arr)}</div>
    </div>`;
  });
  h+=`</div>`;

  // Detail panel (hidden, shown on click)
  h+=`<div id="dash-detail" style="display:none"></div>`;

  // Contact parents section
  h+=`<div class="card" style="margin-top:10px"><div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--danger)">📞 Contact Parents</div>`;
  h+=`<div style="font-size:10px;color:var(--mut);margin-bottom:8px">Absent 2+ consecutive days without notified reason</div>`;
  h+=`<div id="contact-parents">Loading...</div></div>`;

  el.innerHTML=h;
  loadContactParents();
}

// Show detail list for a status
function dashDetail(status){
  const el=document.getElementById('dash-detail');
  const arr=todayRecords.filter(r=>r.status===status);
  const ICON={absent:'✕',late:'⏰',mc:'🤒'};
  if(!arr.length){el.style.display='none';return;}
  let h=`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <div style="font-size:13px;font-weight:600">${status.toUpperCase()} · ${arr.length} students</div>
    <button onclick="document.getElementById('dash-detail').style.display='none'" style="background:none;border:none;font-size:16px;color:var(--mut);cursor:pointer">✕</button>
  </div>`;
  // Group by dept
  for(const dept of DEPTS){
    const deptArr=arr.filter(r=>r.dept===dept);
    if(!deptArr.length) continue;
    h+=`<div style="font-size:10px;font-weight:600;color:${DEPT_COLORS[dept]};margin:8px 0 4px">${dept}</div>`;
    deptArr.forEach(r=>{
      h+=`<div style="display:flex;align-items:center;padding:4px 0;font-size:11px;border-bottom:.5px solid var(--bdr)">
        <div style="flex:1">${r.student_name}</div>
        <div style="font-size:10px;color:var(--mut)">${r.class_code}</div>
        ${r.note?`<div style="font-size:9px;color:var(--warn);margin-left:8px">${r.note}</div>`:''}
      </div>`;
    });
  }
  h+=`</div>`;
  el.innerHTML=h;
  el.style.display='block';
}

// Contact parents: 2+ consecutive absent without reason
async function loadContactParents(){
  const el=document.getElementById('contact-parents');
  if(!el) return;
  // Get yesterday's date (skip weekends simply)
  const today=new Date(selectedDate+'T12:00:00');
  const prev=new Date(today);
  prev.setDate(prev.getDate()-1);
  // Skip Sunday→Friday, Saturday→Friday
  if(prev.getDay()===0) prev.setDate(prev.getDate()-2);
  if(prev.getDay()===6) prev.setDate(prev.getDate()-1);
  const prevDate=prev.getFullYear()+'-'+String(prev.getMonth()+1).padStart(2,'0')+'-'+String(prev.getDate()).padStart(2,'0');

  const{data:prevRecs}=await _sb.from('attendance').select('student_id,student_name,dept,class_code,note').eq('date',prevDate).eq('status','absent');
  const prevAbsent=prevRecs||[];

  // Today's absent without reason
  const todayAbsent=todayRecords.filter(r=>r.status==='absent'&&!r.note);

  // Find students absent BOTH days without reason
  const needContact=[];
  todayAbsent.forEach(t=>{
    const prev=prevAbsent.find(p=>p.student_id===t.student_id&&p.dept===t.dept&&!p.note);
    if(prev) needContact.push(t);
  });

  if(!needContact.length){
    el.innerHTML='<div style="font-size:11px;color:var(--ok);padding:4px 0">✓ No students need contacting</div>';
    return;
  }
  let h='';
  needContact.forEach(r=>{
    h+=`<div style="display:flex;align-items:center;padding:6px 0;border-bottom:.5px solid var(--bdr);font-size:12px">
      <div class="dept-dot" style="background:${DEPT_COLORS[r.dept]};margin-right:8px"></div>
      <div style="flex:1;font-weight:500">${r.student_name}</div>
      <div style="font-size:10px;color:var(--mut)">${r.dept} · ${r.class_code}</div>
    </div>`;
  });
  el.innerHTML=h;
}

// ═══════════════════════════════════════
// MARK ATTENDANCE
// ═══════════════════════════════════════
function renderMark(){
  const el=document.getElementById('mark-content');
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div style="font-size:14px;font-weight:600">${fmtDate(selectedDate)}</div>
    <input type="date" class="date-input" value="${selectedDate}" onchange="changeDate(this.value)">
  </div>`;

  // Weekend check: SRK/GAK/ATC have no classes on Sat/Sun
  const _dow=new Date(selectedDate+'T12:00:00').getDay();
  if((_dow===0||_dow===6)&&currentDept!=='SRT'){
    h+=`<div class="holiday-banner">📅 <strong>${currentDept}</strong> — No classes on weekends.</div>`;
    el.innerHTML=h;return;
  }

  // Holiday check for current dept
  const markHoliday=getHoliday(selectedDate,currentDept);
  if(markHoliday){
    const extra=hasExtraClass(selectedDate,currentDept);
    if(extra){
      // Extra class overrides holiday — allow marking
      h+=`<div class="holiday-banner">📋 <strong>${currentDept}</strong> holiday — <strong>${markHoliday.name}</strong>. Extra class: <strong>${extra.name}</strong>.</div>`;
    }else{
      h+=`<div class="holiday-banner">🏖 <strong>${currentDept}</strong> holiday — <strong>${markHoliday.name}</strong>. No attendance needed.</div>`;
      el.innerHTML=h;return;
    }
  }

  // Dept tabs
  h+=`<div class="dept-tabs">`;
  for(const d of DEPTS){
    h+=`<button class="dept-tab${d===currentDept?' on':''}" data-dept="${d}" onclick="switchDept('${d}')">${d}</button>`;
  }
  h+=`</div>`;

  // Classes for current dept
  const classes=getDeptClasses(currentDept);
  if(!classes.length){
    h+=`<div class="card" style="text-align:center;color:var(--mut);padding:24px">`;
    h+=currentDept==='SRT'?'No SRT classes scheduled today':'No classes in this department';
    h+=`</div>`;
  }else{
    classes.forEach(code=>{
      const students=getClassStudents(currentDept,code);
      const markedCount=students.filter(s=>getStatus(s.id,currentDept)!=='unmarked').length;
      const allMarked=markedCount===students.length&&students.length>0;
      const safeId=code.replace(/[^a-zA-Z0-9]/g,'_');
      h+=`<div class="class-card" id="cc-${safeId}">
        <div class="class-hdr" onclick="toggleClass('${safeId}')">
          <div><span class="class-name">${code}</span></div>
          <div class="class-stat">${allMarked?'✓ ':''}${markedCount}/${students.length}</div>
        </div>
        <div class="class-body" id="cb-${safeId}">
          <div class="mark-all-bar"><span>Quick:</span>
            <button class="status-btn s-present" onclick="markAll('${currentDept}','${code}','present')">All ✓</button>
          </div>`;
      students.forEach(s=>{
        const st=getStatus(s.id,currentDept);
        const active=st==='unmarked'?'':st;
        const rec=todayRecords.find(r=>r.student_id===s.id&&r.dept===currentDept);
        const note=rec?.note||'';
        // Transfer check: is today this student's last day in this class?
        const mem=allMemberships.find(m=>m.student_id===s.id&&m.dept===currentDept&&m.class_code===code);
        const isTransferDay=mem&&mem.end_date===selectedDate;
        const transferTo=isTransferDay?getTransferTarget(s.id,currentDept,mem.end_date):null;
        const transferTag=isTransferDay?'<span style="font-size:9px;color:#7870CC;margin-left:6px">→ '+(transferTo?transferTo.class_code:'调班')+'</span>':'';
        // Extract late time for button display
        const lateMatch=(note||'').match(/Late:\s*(\d{1,2}:\d{2})/);
        const lateLabel=lateMatch?'⏰'+lateMatch[1]:'⏰';
        const LABELS_ROW={present:'✓',absent:'✕',late:lateLabel,mc:'🤒'};
        h+=`<div class="stu-row"${isTransferDay?' style="opacity:.5"':''}>
          <div class="stu-num">${s.num??''}</div>
          <div class="stu-name">${s.name}${s.name_cn?' <span class="stu-cn">'+s.name_cn+'</span>':''}${transferTag}${note&&active==='absent'&&!isTransferDay?'<div style="font-size:9px;color:var(--danger);margin-top:2px">'+note+'</div>':''}</div>
          ${isTransferDay
            ?'<div style="font-size:10px;color:#7870CC;font-weight:600;white-space:nowrap">已调班</div>'
            :STATUSES.map(status=>
              `<button class="status-btn${active===status?' s-'+status:''}" onclick="markStudent('${s.id}','${s.name}','${currentDept}','${code}','${status}')">${LABELS_ROW[status]}</button>`
            ).join('')}
        </div>`;
      });
      h+=`</div></div>`;
    });
  }
  el.innerHTML=h;
}

function toggleClass(id){
  const body=document.getElementById('cb-'+id);
  body.classList.toggle('open');
}

function switchDept(d){
  currentDept=d;
  renderMark();
}

async function changeDate(d){
  await loadAttendance(d);
  renderMark();
}

async function markStudent(studentId,studentName,dept,classCode,status){
  let note='';
  if(status==='late'){
    const now=new Date();
    const timeStr=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    const input=prompt('Late time:',timeStr);
    if(input===null) return; // cancelled
    note='Late: '+input;
  }
  if(status==='absent'){
    const reason=prompt('Reason (optional):','');
    if(reason===null) return;
    if(reason) note=reason;
  }
  const scrollY=window.scrollY;
  const openIds=[...document.querySelectorAll('.class-body.open')].map(el=>el.id);
  const existing=todayRecords.findIndex(r=>r.student_id===studentId&&r.dept===dept);
  if(existing>=0){ todayRecords[existing].status=status; todayRecords[existing].note=note; }
  else todayRecords.push({date:selectedDate,student_id:studentId,student_name:studentName,dept,class_code:classCode,status,note,marked_by:userEmail});
  renderMark();
  openIds.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('open');});
  window.scrollTo(0,scrollY);
  try{
    const{error}=await _sb.from('attendance').upsert({
      date:selectedDate,student_id:studentId,student_name:studentName,
      dept,class_code:classCode,status,note,marked_by:userEmail,
      updated_at:new Date().toISOString()
    },{onConflict:'date,student_id,dept'});
    if(error){ console.error('Save failed:',error); toast('✕ Save failed'); }
    else { document.getElementById('last-saved').textContent='Saved '+fmtTime(); toast('✓ Saved'); }
  }catch(e){console.error('Save error:',e);toast('✕ Save error');}
}

async function markAll(dept,classCode,status){
  const scrollY=window.scrollY;
  const openIds=[...document.querySelectorAll('.class-body.open')].map(el=>el.id);
  const students=getClassStudents(dept,classCode);
  for(const s of students){
    const existing=todayRecords.findIndex(r=>r.student_id===s.id&&r.dept===dept);
    if(existing>=0) todayRecords[existing].status=status;
    else todayRecords.push({date:selectedDate,student_id:s.id,student_name:s.name,dept,class_code:classCode,status,marked_by:userEmail});
  }
  renderMark();
  openIds.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('open');});
  window.scrollTo(0,scrollY);
  // Batch save
  const rows=students.map(s=>({
    date:selectedDate,student_id:s.id,student_name:s.name,
    dept,class_code:classCode,status,marked_by:userEmail,
    updated_at:new Date().toISOString()
  }));
  try{
    const{error}=await _sb.from('attendance').upsert(rows,{onConflict:'date,student_id,dept'});
    if(error){ console.error('Batch save failed:',error); toast('✕ Save failed'); }
    else { document.getElementById('last-saved').textContent='Saved '+fmtTime(); toast('✓ All marked'); }
  }catch(e){console.error('Batch error:',e);toast('✕ Save error');}
}

// ═══════════════════════════════════════
// MONTHLY VIEW
// ═══════════════════════════════════════
let monthlyDept='SRK';
let monthlyClass='';
let monthlyMonth=todayStr().slice(0,7); // YYYY-MM

async function renderMonthly(){
  const el=document.getElementById('monthly-content');
  // Build class options for current dept
  const classes=getDeptClasses(monthlyDept,false);
  if(!monthlyClass&&classes.length) monthlyClass=classes[0];

  let h=`<div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:14px">
    <select class="date-input" onchange="monthlyDept=this.value;monthlyClass='';renderMonthly()">
      ${DEPTS.map(d=>`<option value="${d}"${d===monthlyDept?' selected':''}>${d}</option>`).join('')}
    </select>
    <select class="date-input" onchange="monthlyClass=this.value;renderMonthly()">
      ${classes.map(c=>`<option value="${c}"${c===monthlyClass?' selected':''}>${c}</option>`).join('')}
    </select>
    <input type="month" class="date-input" value="${monthlyMonth}" onchange="monthlyMonth=this.value;renderMonthly()">
    <button onclick="printMonthly()" style="padding:8px 14px;border-radius:8px;border:none;background:var(--layer);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">🖨 Print</button>
  </div>`;

  if(!monthlyClass){
    h+=`<div class="card" style="text-align:center;color:var(--mut);padding:24px">Select a class</div>`;
    el.innerHTML=h;return;
  }

  // Get students — time overlap: visible if membership overlaps this month
  const [yr,mo]=monthlyMonth.split('-').map(Number);
  const daysInMonth=new Date(yr,mo,0).getDate();
  const dayNames=['SU','MO','TU','WE','TH','FR','SA'];
  const monthStart=monthlyMonth+'-01';
  const monthEnd=monthlyMonth+'-'+String(daysInMonth).padStart(2,'0');
  const activeMems=allMemberships.filter(m=>
    m.dept===monthlyDept&&m.class_code===monthlyClass&&
    m.start_date<=monthEnd&&
    (m.end_date==null||m.end_date>=monthStart)
  );
  // Deduplicate students and get their membership info for this class
  const stuMap=new Map();
  activeMems.forEach(m=>{
    const stu=allStudents.find(s=>s.id===m.student_id);
    if(stu&&!stuMap.has(stu.id)) stuMap.set(stu.id,{...stu,mem:m});
  });
  const students=[...stuMap.values()].sort((a,b)=>(a.mem.num??999)-(b.mem.num??999));

  // Fetch month records
  const startDate=monthlyMonth+'-01';
  const endDate=monthlyMonth+'-'+String(daysInMonth).padStart(2,'0');
  const{data:monthRecs}=await _sb.from('attendance').select('*')
    .gte('date',startDate).lte('date',endDate)
    .eq('dept',monthlyDept).eq('class_code',monthlyClass);
  const recs=monthRecs||[];

  // Build lookup: recMap[studentId][day] = {status, note, marked_by}
  const recMap={};
  recs.forEach(r=>{
    const day=parseInt(r.date.split('-')[2]);
    (recMap[r.student_id]=recMap[r.student_id]||{})[day]={status:r.status,note:r.note||'',marked_by:r.marked_by||''};
  });

  const ICON={present:'✓',absent:'✕',late:'⏰',mc:'🤒'};
  const BG={present:'#E1F5EE',absent:'#FCEBEB',late:'#FFF8E1',mc:'#EEF2F7'};
  function lateTime(note){ const m=(note||'').match(/Late:\s*(\d{1,2}:\d{2})/); return m?m[1]:''; }

  h+=`<div id="monthly-grid" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;background:var(--sur);border-radius:10px;overflow:hidden">
    <thead><tr style="background:var(--sur2)">
      <th style="padding:8px;text-align:left;min-width:140px;position:sticky;left:0;background:var(--sur2);z-index:1">Student (${students.length})</th>`;
  for(let d=1;d<=daysInMonth;d++){
    const dow=new Date(yr,mo-1,d).getDay();
    const isWknd=dow===0||dow===6;
    h+=`<th style="padding:4px 2px;text-align:center;min-width:28px;font-size:9px;${isWknd?'color:var(--danger);':''}"><div>${d}</div><div style="font-size:8px">${dayNames[dow]}</div></th>`;
  }
  h+=`</tr></thead><tbody>`;

  // Student rows
  students.forEach(s=>{
    const mem=s.mem;
    const transferred=mem.end_date!=null;
    const transferTarget=transferred?getTransferTarget(s.id,monthlyDept,mem.end_date):null;
    const nameLabel=s.name+(transferred?' <span style="font-size:9px;color:var(--hint)">↗ '+( transferTarget?transferTarget.class_code:'已调')+'</span>':'');
    h+=`<tr><td style="padding:6px 8px;border-bottom:.5px solid var(--bdr);white-space:nowrap;position:sticky;left:0;background:var(--sur);z-index:1;font-size:11px">${nameLabel}</td>`;
    for(let d=1;d<=daysInMonth;d++){
      const dayStr=monthlyMonth+'-'+String(d).padStart(2,'0');
      const hol=getHoliday(dayStr,monthlyDept);
      // Check if this day is outside membership range
      const beforeStart=dayStr<mem.start_date;
      const afterEnd=transferred&&dayStr>mem.end_date;
      if(hol){
        const r=(recMap[s.id]||{})[d];
        const extra=hasExtraClass(dayStr,monthlyDept);
        if(extra&&r){
          const icon=r.status==='late'&&lateTime(r.note)?lateTime(r.note):ICON[r.status];
          h+=`<td style="padding:2px;text-align:center;border-bottom:.5px solid var(--bdr);background:${BG[r.status]||''};font-size:10px" title="${hol.name} (${extra.name})">${icon}</td>`;
        }else{
          h+=`<td style="padding:2px;text-align:center;border-bottom:.5px solid var(--bdr);background:#FFF8E1;color:var(--warn);font-size:9px;font-weight:600" title="${hol.name}">H</td>`;
        }
      }else if(transferred&&dayStr===mem.end_date){
        // Transfer day: show attendance record + transfer marker below
        const r=(recMap[s.id]||{})[d];
        const targetName=transferTarget?transferTarget.class_code.replace(/^[A-Z]+_/,''):'调';
        const attIcon=r?(r.status==='late'&&lateTime(r.note)?lateTime(r.note):ICON[r.status]):'·';
        const attBg=r?BG[r.status]||'':'';
        h+=`<td style="padding:1px;text-align:center;border-bottom:.5px solid var(--bdr);background:${attBg};line-height:1.1" title="调班 → ${transferTarget?transferTarget.class_code:'—'}">
          <div style="font-size:10px">${attIcon}</div>
          <div style="font-size:6px;color:#7870CC;font-weight:700">→${targetName}</div>
        </td>`;
      }else if(beforeStart||afterEnd){
        h+=`<td style="padding:2px;text-align:center;border-bottom:.5px solid var(--bdr);background:#f5f5f5;color:var(--hint);font-size:9px">–</td>`;
      }else{
        const r=(recMap[s.id]||{})[d];
        if(r){
          const display=r.status==='late'&&lateTime(r.note)?lateTime(r.note):ICON[r.status]||'·';
          h+=`<td style="padding:2px;text-align:center;border-bottom:.5px solid var(--bdr);background:${BG[r.status]||''};font-size:${r.status==='late'?'8px':'11px'}" title="${r.note||r.status}">${display}</td>`;
        }else{
          h+=`<td style="padding:2px;text-align:center;border-bottom:.5px solid var(--bdr);color:var(--hint)">·</td>`;
        }
      }
    }
    h+=`</tr>`;
  });

  // Rate row
  h+=`<tr style="background:var(--sur2);font-weight:600"><td style="padding:6px 8px;position:sticky;left:0;background:var(--sur2);z-index:1;font-size:10px">Rate</td>`;
  for(let d=1;d<=daysInMonth;d++){
    const dayStr=monthlyMonth+'-'+String(d).padStart(2,'0');
    const hol=getHoliday(dayStr,monthlyDept);
    if(hol){
      const dayRecs=recs.filter(r=>parseInt(r.date.split('-')[2])===d);
      const extra=hasExtraClass(dayStr,monthlyDept);
      if(extra&&dayRecs.length){
        const present=dayRecs.filter(r=>r.status==='present'||r.status==='late').length;
        const pct=Math.round(present/dayRecs.length*100);
        h+=`<td style="padding:2px;text-align:center;font-size:9px;color:${pct>=90?'var(--ok)':pct>=70?'var(--warn)':'var(--danger)'};background:#FFF8E1" title="${hol.name} (${extra.name})">${pct}%</td>`;
      }else{
        h+=`<td style="padding:2px;text-align:center;font-size:9px;color:var(--warn);background:#FFF8E1" title="${hol.name}">H</td>`;
      }
    }else{
      const dayRecs=recs.filter(r=>parseInt(r.date.split('-')[2])===d);
      if(dayRecs.length){
        const present=dayRecs.filter(r=>r.status==='present'||r.status==='late').length;
        const pct=Math.round(present/dayRecs.length*100);
        h+=`<td style="padding:2px;text-align:center;font-size:9px;color:${pct>=90?'var(--ok)':pct>=70?'var(--warn)':'var(--danger)'}">${pct}%</td>`;
      }else{
        h+=`<td style="padding:2px;text-align:center;font-size:9px;color:var(--hint)">–</td>`;
      }
    }
  }
  h+=`</tr>`;

  // Marked by row
  h+=`<tr style="background:var(--sur2)"><td style="padding:6px 8px;position:sticky;left:0;background:var(--sur2);z-index:1;font-size:10px;color:var(--mut)">Marked by</td>`;
  for(let d=1;d<=daysInMonth;d++){
    const dayRecs=recs.filter(r=>parseInt(r.date.split('-')[2])===d);
    const markers=[...new Set(dayRecs.map(r=>r.marked_by).filter(Boolean))];
    const short=markers.map(e=>markerNames[e]||e.split('@')[0].slice(0,3).toUpperCase()).join(',');
    h+=`<td style="padding:2px;text-align:center;font-size:7px;color:var(--mut)" title="${markers.join(', ')}">${short||'–'}</td>`;
  }
  h+=`</tr>`;

  h+=`</tbody></table></div>`;

  el.innerHTML=h;
}

function printMonthly(){
  const grid=document.getElementById('monthly-grid');
  if(!grid) return;
  const w=window.open('','_blank','width=1200,height=800');
  w.document.write(`<!DOCTYPE html><html><head><title>Attendance — ${monthlyClass} · ${monthlyMonth}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;padding:20px;font-size:10px}

  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">`;
  for(let i=0;i<3;i++){
    h+=`<div style="flex:1;min-width:140px;position:relative">
      <input type="text" class="date-input stu-input" data-idx="${i}" style="width:100%" placeholder="Student ${i+1}..." oninput="searchStudentMulti(this.value,${i})" value="${trackerStudents[i]?.name||''}">
      <div id="stu-dd-${i}" style="position:absolute;top:100%;left:0;right:0;background:var(--sur);border:1px solid var(--bdr);border-radius:0 0 8px 8px;z-index:10;display:none;max-height:200px;overflow-y:auto"></div>
    </div>`;
  }
  h+=`</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center">
      <input type="date" class="date-input" id="tk-from" value="${trackerFrom}">
      <span style="color:var(--mut)">→</span>
      <input type="date" class="date-input" id="tk-to" value="${trackerTo}">
      <button onclick="loadTrackerMatrix()" style="padding:6px 14px;border-radius:6px;border:none;background:var(--layer);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">View</button>
      <button onclick="printTracker()" style="padding:6px 12px;border-radius:6px;border:none;background:var(--layer);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">🖨 Print</button>
    </div>
  </div>
  <div id="tracker-matrix"></div>`;
  el.innerHTML=h;

let trackerStudents=[{id:'',name:''},{id:'',name:''},{id:'',name:''}];
let trackerFrom=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';})();
let trackerTo=todayStr();
let searchTimeout;
let searchIdx=0;

function searchStudentMulti(query,idx){
  searchIdx=idx;
  clearTimeout(searchTimeout);
  const el=document.getElementById('stu-dd-'+idx);
  if(!el) return;
  if(query.length<2){el.style.display='none';return;}
  searchTimeout=setTimeout(()=>{
    const q=query.toLowerCase();
    const matches=allStudents.filter(s=>s.name.toLowerCase().includes(q)||(s.name_cn||'').includes(q)).slice(0,5);
    if(!matches.length){el.innerHTML='<div style="padding:8px;font-size:11px;color:var(--mut)">No match</div>';el.style.display='block';return;}
    let h='';
    matches.forEach(s=>{
      h+=`<div style="padding:6px 8px;border-bottom:.5px solid var(--bdr);cursor:pointer;font-size:12px" onclick="selectTrackerStudent('${s.id}','${s.name}',${idx})">${s.name}${s.name_cn?' <span style="color:var(--mut)">'+s.name_cn+'</span>':''}</div>`;
    });
    el.innerHTML=h;
    el.style.display='block';
  },300);
}

function selectTrackerStudent(id,name,idx){
  trackerStudents[idx]={id,name};
  document.querySelectorAll('.stu-input')[idx].value=name;
  document.getElementById('stu-dd-'+idx).style.display='none';
  loadTrackerMatrix();
}

async function loadTrackerMatrix(){
  trackerFrom=document.getElementById('tk-from')?.value||trackerFrom;
  trackerTo=document.getElementById('tk-to')?.value||trackerTo;
  const el=document.getElementById('tracker-matrix');
  if(!el) return;
  const active=trackerStudents.filter(s=>s.id);
  if(!active.length){el.innerHTML='';return;}

  // Build date columns
  const from=new Date(trackerFrom+'T12:00:00');
  const to=new Date(trackerTo+'T12:00:00');
  const days=[];
  const dayNames=['SU','MO','TU','WE','TH','FR','SA'];
  for(let d=new Date(from);d<=to;d.setDate(d.getDate()+1)){
    days.push({date:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'),
      day:d.getDate(),dow:d.getDay(),label:dayNames[d.getDay()]});
  }
  if(days.length>31) days.length=31;

  // Fetch all records for selected students in range
  const ids=active.map(s=>s.id);
  const{data}=await _sb.from('attendance').select('*').in('student_id',ids).gte('date',trackerFrom).lte('date',trackerTo);
  const recs=data||[];

  const ICON={present:'✓',absent:'✕',late:'⏰',mc:'🤒'};
  const BG={present:'#E1F5EE',absent:'#FCEBEB',late:'#FFF8E1',mc:'#EEF2F7'};
  function lateTime(note){const m=(note||'').match(/Late:\s*(\d{1,2}:\d{2})/);return m?m[1]:'';}

  // Stats
  const total=recs.length;
  const present=recs.filter(r=>r.status==='present').length;
  const late=recs.filter(r=>r.status==='late').length;
  const absent=recs.filter(r=>r.status==='absent').length;
  const mc=recs.filter(r=>r.status==='mc').length;
  const rate=total?Math.round((present+late)/total*100):0;

  let h=`<div class="card">
    <div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;font-size:12px">
      <span>Records: <strong>${total}</strong></span>
      <span style="color:${rate>=90?'var(--ok)':rate>=70?'var(--warn)':'var(--danger)'}">Rate: <strong>${rate}%</strong></span>
      <span style="color:var(--ok)">✓${present}</span><span style="color:var(--danger)">✕${absent}</span>
      <span style="color:var(--warn)">⏰${late}</span><span style="color:var(--info)">🤒${mc}</span>
    </div>
    <div id="tracker-grid" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr style="background:var(--sur2)">
        <th style="padding:6px 8px;text-align:left;min-width:140px;position:sticky;left:0;background:var(--sur2);z-index:1">Student / Class</th>`;
  days.forEach(d=>{
    const isWknd=d.dow===0||d.dow===6;
    h+=`<th style="padding:3px 2px;text-align:center;min-width:28px;font-size:9px;${isWknd?'color:var(--danger);':''}"><div>${d.day}</div><div style="font-size:8px">${d.label}</div></th>`;
  });
  h+=`</tr></thead><tbody>`;

  // Rows for each student × each membership
  active.forEach(stu=>{
    const mems=allMemberships.filter(m=>m.student_id===stu.id).sort((a,b)=>a.start_date>b.start_date?1:-1);
    const stuRecs=recs.filter(r=>r.student_id===stu.id);

    // Show transfer summary if multiple memberships in same dept
    const transfers=mems.filter(m=>m.end_date!=null);
    if(transfers.length>0){
      let transferHtml='';
      transfers.forEach(t=>{
        const target=getTransferTarget(stu.id,t.dept,t.end_date);
        if(target){
          transferHtml+=`<span style="font-size:10px;color:#7870CC;margin-right:10px">🔄 ${t.end_date}: <span style="color:${DEPT_COLORS[t.dept]}">${t.dept}</span> ${t.class_code} → ${target.class_code}</span>`;
        }
      });
      if(transferHtml){
        h+=`<tr><td colspan="${days.length+1}" style="padding:4px 8px;border-bottom:.5px solid var(--bdr);background:#F9F5FF">${transferHtml}</td></tr>`;
      }
    }

    mems.forEach((mem,mi)=>{
      const recByDate={};
      stuRecs.filter(r=>r.dept===mem.dept&&r.class_code===mem.class_code).forEach(r=>{recByDate[r.date]=r;});
      const ended=mem.end_date!=null;
      h+=`<tr><td style="padding:5px 8px;border-bottom:.5px solid var(--bdr);position:sticky;left:0;background:var(--sur);z-index:1;font-size:10px;white-space:nowrap">
        ${mi===0?'<strong>'+stu.name+'</strong><br>':''}
        <span style="color:${DEPT_COLORS[mem.dept]}">${mem.dept}</span> ${mem.class_code}${ended?' <span style="font-size:8px;color:var(--hint)">(~'+mem.end_date+')</span>':''}
      </td>`;
      days.forEach(d=>{
        const r=recByDate[d.date];
        if(r){
          const display=r.status==='late'&&lateTime(r.note)?lateTime(r.note):ICON[r.status];
          h+=`<td style="padding:2px;text-align:center;border-bottom:.5px solid var(--bdr);background:${BG[r.status]||''};font-size:${r.status==='late'?'8px':'11px'}" title="${r.note||r.status}">${display}</td>`;
        }else{
          h+=`<td style="padding:2px;text-align:center;border-bottom:.5px solid var(--bdr);color:var(--hint)">·</td>`;
        }
      });
      h+=`</tr>`;
    });
    // Separator between students
    if(active.indexOf(stu)<active.length-1){
      h+=`<tr><td colspan="${days.length+1}" style="height:4px;background:var(--sur2)"></td></tr>`;
    }
  });

  h+=`</tbody></table></div></div>`;
  el.innerHTML=h;
}

}

async function exportCSV(){
  toast('Preparing export…',4000);
  try{
    const{data,error}=await _sb.from('attendance').select('date,dept,class_code,student_name,status,note,marked_by').order('date',{ascending:true});
    if(error){toast('✕ Export failed');return;}
    const rows=data||[];
    if(!rows.length){toast('No records to export');return;}
    const cols=['date','dept','class_code','student_name','status','note','marked_by'];
    const esc=v=>{const s=(v??'').toString();return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
    const lines=[cols.join(',')];
    rows.forEach(r=>lines.push(cols.map(c=>esc(r[c])).join(',')));
    const csv='\uFEFF'+lines.join('\r\n'); // UTF-8 BOM
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const now=new Date();
    const stamp=now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')
      +'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='OPR-AttendanceGo_'+stamp+'.csv';
    a.click();URL.revokeObjectURL(a.href);
    toast('✓ Exported '+rows.length+' records');
  }catch(e){console.error('Export error:',e);toast('✕ Export error');}
}
