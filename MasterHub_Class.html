<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MasterHub — Class v6</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --layer:#5C1010;
  --d-srk:#C45C5C;--d-gak:#E8A04E;--d-atc:#7AB05A;--d-srt:#8B6CAE;
  --sur:#ffffff;--sur2:#f7f6f2;--bdr:#e0ddd6;
  --txt:#1a1a1a;--mut:#888888;--hint:#bbbbbb;
  --ok:#0F6E56;--warn:#854F0B;--danger:#A32D2D;--info:#236FAD;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:var(--sur2);color:var(--txt);font-size:13px;line-height:1.4}
button,input,select,textarea{font-family:inherit;font-size:13px}

/* ══ NAV ══ */
.nav{background:var(--layer);border-bottom:.5px solid rgba(0,0,0,.2);
  display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:50;overflow-x:auto;gap:0}
.nav-home{background:none;border:none;color:rgba(255,255,255,.6);font-size:15px;cursor:pointer;padding:11px 10px 11px 0;flex-shrink:0}
.nav-home:hover{color:#fff}
.nav-logo{font-size:13px;font-weight:600;padding:12px 14px 12px 0;border-right:.5px solid rgba(255,255,255,.2);margin-right:4px;white-space:nowrap;flex-shrink:0;color:#fff}
.ver{background:#F9CB42;color:var(--layer);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px;vertical-align:middle}
.ntab{padding:11px 14px;font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;border:none;background:transparent;border-bottom:2.5px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.ntab:hover{color:#fff}.ntab.on{color:#fff;border-bottom-color:#fff;font-weight:600}
.nav-r{margin-left:auto;display:flex;gap:5px;align-items:center;padding-left:10px;flex-shrink:0}
.saved{font-size:10px;color:rgba(255,255,255,.5);white-space:nowrap}
.btn-nav{padding:5px 12px;border-radius:6px;border:.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:#fff;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-nav:hover{opacity:.85}

/* ══ PAGES ══ */
.page{display:none;padding:16px;max-width:1000px;margin:0 auto}.page.on{display:block}

/* ══ BUTTONS ══ */
.btn{padding:5px 12px;border-radius:6px;border:.5px solid var(--bdr);background:var(--sur);color:var(--txt);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--sur2)}
.btn-pri{background:var(--layer);color:#fff;border-color:var(--layer);font-weight:600}.btn-pri:hover{opacity:.85}
.btn-dng{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:3px 8px;font-size:10px}

/* ══ CARDS ══ */
.card{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;padding:16px;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.card-title{font-size:11px;font-weight:500;color:var(--mut);letter-spacing:.05em;text-transform:uppercase}

/* ══ STAT ══ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;padding:14px 16px}
.stat-n{font-size:26px;font-weight:700}
.stat-l{font-size:10px;color:var(--mut);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

/* ══ TABLE ══ */
table.data{width:100%;border-collapse:collapse;font-size:12px}
table.data thead th{background:#2d2d2d;color:#fff;padding:9px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;position:sticky;top:0}
table.data thead th.sortable{cursor:pointer;user-select:none}
table.data thead th.sortable:hover{background:#444}
table.data thead th .sort-arrow{font-size:8px;margin-left:3px;opacity:.4}
table.data thead th.sorted .sort-arrow{opacity:1}
table.data tbody td{padding:8px 12px;border-bottom:.5px solid var(--bdr);vertical-align:middle}
table.data tbody tr:nth-child(even){background:var(--sur2)}
table.data tbody tr:hover{background:#FFF9E6;cursor:pointer}

/* ══ INPUTS ══ */
input[type=text],input[type=number],select,textarea{
  border:.5px solid var(--bdr);border-radius:6px;padding:6px 10px;
  font-size:12px;font-family:inherit;background:var(--sur);color:var(--txt);box-sizing:border-box}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--layer)}

/* ══ DEPT BADGES ══ */
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.b-srk{background:rgba(196,92,92,.12);color:var(--d-srk)}
.b-gak{background:rgba(232,160,78,.12);color:var(--d-gak)}
.b-atc{background:rgba(122,176,90,.12);color:var(--d-atc)}
.b-srt{background:rgba(139,108,174,.12);color:var(--d-srt)}

/* ══ STATUS TAGS ══ */
.b-active{background:#E1F5EE;color:var(--ok)}
.b-archived{background:var(--sur2);color:var(--mut)}

/* ══ TOOLBAR ══ */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.toolbar input[type=text]{flex:1;min-width:180px}
.dept-row{display:flex;gap:4px;flex-wrap:wrap}
.dept-tag{padding:4px 12px;border-radius:14px;border:.5px solid var(--bdr);cursor:pointer;font-size:10px;background:var(--sur);color:var(--mut);font-family:inherit}
.dept-tag:hover{border-color:var(--layer);color:var(--layer)}
.dept-tag.on{background:var(--layer);border-color:var(--layer);color:#fff}

/* ══ MODAL ══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--sur);border-radius:10px;width:560px;max-width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.modal-hdr{padding:14px 20px;border-bottom:.5px solid var(--bdr);display:flex;align-items:center;position:sticky;top:0;background:var(--sur);border-radius:10px 10px 0 0;z-index:2}
.modal-title{font-size:14px;font-weight:600;flex:1}
.modal-body{padding:16px 20px}
.modal-foot{padding:12px 20px;border-top:.5px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--sur);border-radius:0 0 10px 10px}
.x-btn{background:none;border:none;font-size:18px;color:var(--mut);cursor:pointer}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--mut);margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:20px;right:20px;background:var(--txt);color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;pointer-events:auto}

/* ══ EMPTY ══ */
.empty{text-align:center;padding:40px 20px;color:var(--hint);font-size:12px}

/* ══ PRINT ══ */
.print-hdr,.print-ftr{display:none}
@media print{
  @page{margin:8mm 10mm;size:A4 portrait}
  .nav,.toolbar,.btn,.toast,.no-print,.modal-bg{display:none!important}
  body{font-size:11pt;background:#fff}
  .card,table{page-break-inside:avoid}
  table.data thead th{background:#333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table.data th,table.data td{border:1px solid #999}
  .print-hdr{display:block!important;font-size:14pt;font-weight:700;text-align:center;margin-bottom:4mm}
  .print-ftr{display:block!important;font-size:8pt;color:#888;text-align:center;margin-top:4mm}
}

@media(max-width:600px){.stat-grid{grid-template-columns:repeat(2,1fr)}.form-grid-2{grid-template-columns:1fr}}
@media(max-width:480px){.stat-grid{grid-template-columns:1fr}.ntab{padding:10px 10px;font-size:10px}}

/* ══════ AUTH SCREEN ══════ */
.auth-screen{position:fixed;inset:0;background:var(--sur2);z-index:9000;
  display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--sur);border:.5px solid var(--bdr);border-radius:12px;
  padding:32px 28px;width:340px;max-width:100%;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.auth-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:4px;color:var(--layer)}
.auth-sub{font-size:11px;color:var(--mut);text-align:center;margin-bottom:20px}
.auth-row{margin-bottom:14px}
.auth-row label{font-size:11px;color:var(--mut);display:block;margin-bottom:4px}
.auth-row input{width:100%;padding:8px 10px;border:.5px solid var(--bdr);border-radius:6px;
  font-size:13px;font-family:inherit;background:var(--sur);color:var(--txt)}
.auth-row input:focus{outline:none;border-color:var(--layer)}
.auth-btn{width:100%;padding:10px;border-radius:6px;border:none;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .15s}
.auth-btn-pri{background:var(--layer);color:#fff}
.auth-btn-sec{background:transparent;color:var(--layer);border:.5px solid var(--layer);margin-top:8px}
.auth-btn:hover{opacity:.85}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{font-size:11px;color:var(--danger);text-align:center;margin-top:10px;min-height:16px}
.auth-or{text-align:center;font-size:10px;color:var(--hint);margin:12px 0}
</style>
</head>
<body>

<!-- ══════ AUTH SCREEN ══════ -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <div class="auth-title">MasterHub</div>
    <div class="auth-sub">Class Management · Academee</div>
    <div class="auth-row"><label>Email</label><input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="auth-row"><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="auth-btn auth-btn-pri" id="auth-login-btn" onclick="doLogin()">Login</button>
    <div class="auth-or">— or —</div>
    <button class="auth-btn auth-btn-sec" id="auth-magic-btn" onclick="doMagicLink()">Send Magic Link</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>
<div id="loading-screen" style="display:none;position:fixed;inset:0;background:var(--sur2);z-index:8000;align-items:center;justify-content:center">
  <div style="font-size:13px;color:var(--mut)">Loading...</div>
</div>

<!-- ══ NAV ══ -->
<div class="nav">
  <button class="nav-home" onclick="location.href='academee_navigation_preview.html'" title="Home">←</button>
  <div class="nav-logo">MasterHub — Class <span class="ver">v6</span></div>
  <button class="ntab on" onclick="goPage('dashboard')">Dashboard</button>
  <button class="ntab" onclick="goPage('list')">All Classes</button>
  <button class="ntab" onclick="goPage('manage')">Manage</button>
  <div class="nav-r">
    <span class="saved" id="last-saved"></span>
    <button class="btn-nav" onclick="doPrint()">🖨 Print</button>
    <button class="btn-nav" onclick="exportData()">↓ Export</button>
    <label class="btn-nav" style="cursor:pointer">↑ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div class="page on" id="page-dashboard">
  <div id="dashboard-content"></div>
</div>

<!-- ══ ALL CLASSES ══ -->
<div class="page" id="page-list">
  <div class="print-hdr">MasterHub — Class</div>
  <div class="toolbar">
    <div style="position:relative;flex:1;min-width:180px">
      <input type="text" id="search-inp" placeholder="Search classes..." oninput="doFilter()" style="width:100%;padding-right:28px">
      <button id="search-x" onclick="clearSearch()" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:14px;color:var(--mut);cursor:pointer;display:none;padding:2px">✕</button>
    </div>
    <div class="dept-row">
      <span class="dept-tag on" onclick="setDept('ALL',this)">All</span>
      <span class="dept-tag" onclick="setDept('SRK',this)">SRK</span>
      <span class="dept-tag" onclick="setDept('GAK',this)">GAK</span>
      <span class="dept-tag" onclick="setDept('ATC',this)">ATC</span>
      <span class="dept-tag" onclick="setDept('SRT',this)">SRT</span>
    </div>
    <label style="font-size:10px;color:var(--mut);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px">
      <input type="checkbox" id="show-archived" onchange="UI.showArchived=this.checked;renderList()"> Show archived
    </label>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span id="list-count" style="font-size:12px;font-weight:600"></span>
    <button class="btn btn-pri btn-sm" onclick="openClassForm(null)">+ Add Class</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto">
      <table class="data">
        <thead><tr>
          <th class="sortable" onclick="sortBy('code')">Code <span class="sort-arrow" id="sa-code">▲</span></th>
          <th>Name</th>
          <th class="sortable" onclick="sortBy('dept')">Dept <span class="sort-arrow" id="sa-dept">▲</span></th>
          <th>Teacher</th>
          <th class="sortable" onclick="sortBy('capacity')">Cap <span class="sort-arrow" id="sa-capacity">▲</span></th>
          <th>Status</th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
  <div class="print-ftr">MasterHub — Class · <span class="print-date"></span></div>
</div>

<!-- ══ MANAGE ══ -->
<div class="page" id="page-manage">
  <div class="card">
    <div class="card-hdr"><span class="card-title">System Information</span></div>
    <div style="font-size:12px;line-height:2.2">
      <div>System: <b>MasterHub — Class</b></div>
      <div>Storage: <code style="background:var(--sur2);padding:2px 6px;border-radius:4px;font-size:11px">masterhub_class_v6</code></div>
      <div>Records: <b><span id="manage-total">0</span> total (<span id="manage-active">0</span> active, <span id="manage-archived">0</span> archived)</b></div>
      <div>Version: <span class="ver">v6</span></div>
    </div>
  </div>
  <div style="margin-top:40px;text-align:center">
    <button style="font-size:10px;color:var(--danger);background:none;border:none;cursor:pointer" onclick="resetToSeed()">⚠ Reset to factory data</button>
  </div>
</div>

<!-- ══ MODAL SLOT ══ -->
<div id="modal-slot"></div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"></div>

// ══ CORE FUNCTIONS ══
async function loadData(){
  // ── Migration: if old localStorage key exists, it's SSOT (table may be stale seed) ──
  const migKeys = ['masterhub_class_v5','masterhub_class_v3','masterhub_class_v1'];
  for(const mk of migKeys){
    const old = localStorage.getItem(mk);
    if(old){
      try{
        const p = JSON.parse(old);
        if(p.classes?.length){
          p.classes.forEach(c => { if(c.status === 'inactive') c.status = 'archived'; });
          const srtOld = p.classes.filter(c => c.dept==='SRT' && !c.slot);
          if(srtOld.length > 0){
            const nonSrt = p.classes.filter(c => c.dept!=='SRT');
            const seedSrt = SEED_CLASSES.filter(c => c.dept==='SRT');
            S.classes = [...nonSrt,...seedSrt];
          } else {
            S.classes = p.classes;
          }
          await saveData();
          migKeys.forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
          return;
        }
      }catch(e){}
    }
  }
  // ── Normal: read from Supabase ──
  var raw = await Store.get();
  if(raw){
    try{
      const p = JSON.parse(raw);
      if(p.classes?.length){
        S.classes = p.classes;
        return;
      }
    }catch(e){}
  }
  // ── Fallback: seed ──
  S.classes = JSON.parse(JSON.stringify(SEED_CLASSES));
  await saveData();
}

async function saveData(){
  await Store.set( JSON.stringify(S));
  const el = document.getElementById('last-saved');
  if(el){ el.textContent = 'Saved ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); el.style.display = ''; }
  updateManageCounts();
}

function genId(){ return 'cls_' + Date.now().toString(36); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function updateManageCounts(){
  const t = document.getElementById('manage-total');
  const a = document.getElementById('manage-active');
  const r = document.getElementById('manage-archived');
  if(t) t.textContent = S.classes.length;
  if(a) a.textContent = S.classes.filter(c=>c.status==='active').length;
  if(r) r.textContent = S.classes.filter(c=>c.status==='archived').length;
}

// ══ SORT (3-cycle) ══
function sortBy(col){
  if(UI.sortCol === col){
    UI.sortDir = UI.sortDir === 1 ? -1 : UI.sortDir === -1 ? 0 : 1;
  } else {
    UI.sortCol = col; UI.sortDir = 1;
  }
  // Reset all arrows
  document.querySelectorAll('th.sortable').forEach(th => th.classList.remove('sorted'));
  document.querySelectorAll('.sort-arrow').forEach(a => { a.textContent = '▲'; a.style.opacity = '.4'; });
  if(UI.sortDir !== 0){
    const th = document.querySelector(`#sa-${col}`)?.closest('th');
    if(th) th.classList.add('sorted');
    const arrow = document.getElementById('sa-' + col);
    if(arrow){ arrow.textContent = UI.sortDir === 1 ? '▲' : '▼'; arrow.style.opacity = '1'; }
  }
  renderList();
}

// ══ RENDER LIST (All Classes) ══
function renderList(){
  let list = [...S.classes];
  // Filter archived
  if(!UI.showArchived) list = list.filter(c => c.status !== 'archived');
  // Filter dept
  if(UI.dept !== 'ALL') list = list.filter(c => c.dept === UI.dept);
  // Search
  if(UI.search){
    const q = UI.search.toLowerCase();
    list = list.filter(c =>
      (c.label||c.code||'').toLowerCase().includes(q) ||
      (c.classTeacher||'').toLowerCase().includes(q) ||
      (c.code||'').toLowerCase().includes(q)
    );
  }
  // Default sort: dept order (SRK→GAK→ATC→SRT), then code within dept
  const DEPT_ORDER = {SRK:0,GAK:1,ATC:2,SRT:3};
  list.sort((a,b) => {
    const da = DEPT_ORDER[a.dept] ?? 9, db = DEPT_ORDER[b.dept] ?? 9;
    if(da !== db) return da - db;
    return String(a.code||'').localeCompare(String(b.code||''), undefined, {numeric:true});
  });
  // User sort overrides
  if(UI.sortCol && UI.sortDir !== 0){
    list.sort((a,b) => {
      let va = a[UI.sortCol] || '', vb = b[UI.sortCol] || '';
      if(typeof va === 'number') return (va - vb) * UI.sortDir;
      return String(va).localeCompare(String(vb), undefined, {numeric:true}) * UI.sortDir;
    });
  }
  // Count
  document.getElementById('list-count').textContent = list.length + ' classes';
  // Highlight helper
  function hl(text){
    if(!UI.search || !text) return text || '';
    const re = new RegExp('(' + UI.search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi');
    return String(text).replace(re, '<mark>$1</mark>');
  }
  // Render
  const tbody = document.getElementById('table-body');
  if(!list.length){
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No classes found</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(c => `<tr onclick="openClassForm('${esc(c.id)}')" style="${c.status==='archived'?'opacity:.5':''}">
    <td style="font-weight:600;font-family:monospace;font-size:11px">${hl(c.code)}</td>
    <td>${hl(c.label||c.code)}</td>
    <td>${deptBadge(c.dept)}</td>
    <td style="font-size:11px">${hl(c.classTeacher) || '<span style="color:var(--hint)">—</span>'}</td>
    <td style="font-size:11px">${c.capacity || '—'}</td>
    <td>${statusBadge(c.status||'active')}</td>
  </tr>`).join('');
  // Print date
  document.querySelectorAll('.print-date').forEach(el => el.textContent = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}));
}

          <option value="">—</option>
          ${SRT_ALL_LVS.map(lv => `<option value="${lv}" ${isEdit && c.level===lv ? 'selected':''}>${lv}</option>`).join('')}
        </select></div>
    </div>
    <div class="form-row" id="srt-slot-row" style="display:${isSRT?'block':'none'}"><label>Slot (SRT)</label>

        ${SRT_SLOTS.map(s => `<option value="${s}" ${isEdit && c.slot===s ? 'selected':''}>${s}</option>`).join('')}
      </select></div>
  `;

  // Delete button (only for edit, left side)
  const deleteBtn = isEdit
    ? `<button class="btn btn-dng btn-sm" onclick="deleteClass('${esc(c.id)}')" style="margin-right:auto">Delete</button>`
    : '';

  document.getElementById('modal-slot').innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)tryCloseModal()">
      <div class="modal">
        <div class="modal-hdr">
          <span class="modal-title">${title}</span>
          <button class="x-btn" onclick="tryCloseModal()">×</button>

        <div class="modal-body">${body}</div>

          ${deleteBtn}

function toggleSRTFields(){
  const isSRT = document.getElementById('f-dept').value === 'SRT';
  document.getElementById('srt-level-row').style.display = isSRT ? 'block' : 'none';
  document.getElementById('srt-slot-row').style.display = isSRT ? 'block' : 'none';
}

function markDirty(){ modalDirty = true; }

function tryCloseModal(){
  if(modalDirty && !confirm('Unsaved changes. Discard?')) return;
  closeModal();
}
function closeModal(){
  document.getElementById('modal-slot').innerHTML = '';
  editId = null; modalDirty = false;
}

function saveClass(){
  const code = document.getElementById('f-code').value.trim();
  if(!code){ toast('✕ Code is required'); return; }
  const dept = document.getElementById('f-dept').value;
  const status = document.getElementById('f-status').value;
  const label = document.getElementById('f-label').value.trim() || code;
  const teacher = document.getElementById('f-teacher').value.trim();
  const cap = parseInt(document.getElementById('f-cap').value) || null;
  const level = document.getElementById('f-level')?.value || '';
  const slot = document.getElementById('f-slot')?.value || '';

  if(editId){
    const c = S.classes.find(x => x.id === editId);
    if(c){
      c.code = code; c.dept = dept; c.status = status; c.label = label;
      c.classTeacher = teacher; c.capacity = cap;
      if(dept === 'SRT'){ c.level = level; c.slot = slot; }
      else { delete c.level; delete c.slot; }
    }
  } else {
    const obj = { id:genId(), code, dept, label, capacity:cap, classTeacher:teacher, status };
    if(dept === 'SRT'){ obj.level = level; obj.slot = slot; }
    S.classes.push(obj);
  }
  saveData(); modalDirty = false; closeModal();
  renderList(); toast('✓ Saved');
}

// ══ DELETE (双确认 — 主数据源) ══
function deleteClass(id){
  if(!confirm('Delete this class?')) return;
  if(prompt('Type DELETE to confirm:') !== 'DELETE'){ toast('Delete cancelled'); return; }
  const idx = S.classes.findIndex(x => x.id === id);
  if(idx === -1) return;
  const removed = S.classes.splice(idx, 1)[0];
  saveData(); closeModal();
  // Undo toast
  toast('✓ Deleted <button onclick="undoDelete()" style="background:none;border:none;color:#F9CB42;cursor:pointer;font-weight:700;text-decoration:underline;font-family:inherit;font-size:12px;margin-left:6px">Undo</button>', 30000);
  window._undoClass = { item:removed, idx };
  clearTimeout(window._undoTimer);
  window._undoTimer = setTimeout(() => { window._undoClass = null; }, 30000);
  renderList(); renderDashboard();
}
function undoDelete(){
  if(!window._undoClass) return;
  S.classes.splice(window._undoClass.idx, 0, window._undoClass.item);
  window._undoClass = null;
  saveData(); renderList(); renderDashboard();
  toast('✓ Restored');

// ═══ STORE (Supabase hub_classes ⇄ S.classes relational mapping) ═══
const Store = {
  async get(){
    try {
      const { data, error } = await _sb.from('hub_classes').select('*');
      if(error) throw error;
      const classes = (data||[]).map(r=>({
        id: r.id, code: r.code||'', dept: r.dept||'SRK', label: r.label||'',
        capacity: r.capacity||null, classTeacher: r.class_teacher||'',
        status: r.status||'active',
        ...(r.slot ? {slot:r.slot} : {}),
        ...(r.level ? {level:r.level} : {})
      }));
      const raw = JSON.stringify({classes});
      try { localStorage.setItem(STORAGE_KEY, raw); } catch(e){}
      return raw;
    } catch(e){
      console.error('Store.get supabase failed → fallback cache', e);
      return localStorage.getItem(STORAGE_KEY);
    }
  },
  async set(v){
    try { localStorage.setItem(STORAGE_KEY, v); } catch(e){}
    let obj; try { obj = JSON.parse(v); } catch(e){ return; }
    const rows = (obj.classes||[]).filter(c=>c.id).map(c=>({
      id: c.id, code: c.code||'', dept: c.dept||'SRK', label: c.label||'',
      capacity: c.capacity||null, class_teacher: c.classTeacher||'',
      status: c.status||'active', slot: c.slot||null, level: c.level||null
    }));
    try {
      if(rows.length){
        const { error } = await _sb.from('hub_classes').upsert(rows, {onConflict:'id'});
        if(error) throw error;
        const newIds = new Set(rows.map(r=>r.id));
        const { data:existing } = await _sb.from('hub_classes').select('id');
        const toDel = (existing||[]).map(r=>r.id).filter(id=>!newIds.has(id));
        if(toDel.length){ await _sb.from('hub_classes').delete().in('id', toDel); }
      }
    } catch(e){ console.error('Store.set supabase failed (cached locally)', e); }
  },
  async del(){ try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} },
  getKey(k){ return localStorage.getItem(k); },
  delKey(k){ try{ localStorage.removeItem(k); }catch(e){} }
};
function _dateStamp(){var d=new Date();return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"_"+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0");}

// ══ IMPORT (Merge-with-preview) ══
function importData(e){
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const p = JSON.parse(r.result);
      if(!p.classes){ toast('✕ Invalid format'); return; }
      // Auto-backup before import
      exportData();
      // Merge: new items added, existing updated by id
      const existingIds = new Set(S.classes.map(c => c.id));
      let added = 0, updated = 0;
      p.classes.forEach(nc => {
        nc.status = nc.status === 'inactive' ? 'archived' : (nc.status || 'active');
        const existing = S.classes.find(c => c.id === nc.id);
        if(existing){ Object.assign(existing, nc); updated++; }
        else { S.classes.push(nc); added++; }
      });
      saveData(); renderList(); renderDashboard();
      toast(`✓ Import: ${added} new, ${updated} updated`);
    }catch(err){ toast('✕ Parse error'); }
  };
  r.readAsText(f); e.target.value = '';
}

// +/- group adjustment (preserved)
function adjustGroup(dept, encPrefix, delta){
  const prefix = decodeURIComponent(encPrefix);
  if(dept === 'SRT'){ openSRTDialog(prefix, delta); return; }
  if(dept === 'ATC'){ openATCDialog(delta); return; }
  // SRK/GAK
  const grpCls = S.classes.filter(c => c.dept===dept && c.code.startsWith(prefix+' '))
    .sort((a,b) => parseInt(a.code.split(' ')[1]) - parseInt(b.code.split(' ')[1]));
  if(delta > 0){
    const nums = grpCls.map(c => parseInt(c.code.split(' ')[1])).filter(n => !isNaN(n));
    const next = nums.length ? Math.max(...nums)+1 : 1;
    const code = `${prefix} ${next}`;
    S.classes.push({id:genId(),code,dept,label:code,capacity:null,classTeacher:'',status:'active'});
  } else {
    if(!grpCls.length) return;
    S.classes = S.classes.filter(c => c.id !== grpCls[grpCls.length-1].id);
  }
  saveData(); renderDashboard();
}

function clearGroup(dept, encPrefix){
  const prefix = decodeURIComponent(encPrefix);
  if(dept === 'SRT') S.classes = S.classes.filter(c => !(c.dept==='SRT' && c.slot===prefix));
  else if(dept === 'ATC') S.classes = S.classes.filter(c => c.dept !== 'ATC');
  else S.classes = S.classes.filter(c => !(c.dept===dept && c.code.startsWith(prefix+' ')));
  saveData(); renderDashboard();
}

  let srtBody = '';
  if(srtViewMode === 'grid'){
    srtBody = `<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:12px">
      <thead><tr>
        <th style="background:#1a1a1a;color:#fff;padding:7px 12px;border:.5px solid #333;text-align:left;min-width:52px"></th>
        ${SRT_SLOTS.map(s=>`<th style="background:#1a1a1a;color:#fff;padding:7px 12px;border:.5px solid #333;text-align:center;font-weight:700;white-space:nowrap">${s}</th>`).join('')}
      </tr></thead>
      <tbody>${(()=>{
        let rows = '';
        SRT_ALL_LVS.forEach(lv => {
          const bySlot = {};
          SRT_SLOTS.forEach(slot => {
            bySlot[slot] = active.filter(c=>c.dept==='SRT'&&c.slot===slot&&c.level===lv)
              .sort((a,b)=>(a.id||'').localeCompare(b.id||''));
          });
          const maxRows = Math.max(...SRT_SLOTS.map(s=>bySlot[s].length), 1);
          for(let ri=0; ri<maxRows; ri++){
            const isFirst = ri === 0;
            const labelCell = isFirst
              ? `<td rowspan="${maxRows}" style="padding:7px 12px;border:.5px solid #ddd;font-weight:700;background:#fff;vertical-align:middle">${lv}</td>`
              : '';
            const slotCells = SRT_SLOTS.map(slot => {
              const cls = bySlot[slot][ri];
              if(cls){
                const lbl = cls.label !== lv+'.'+slot ? `<span style="font-size:8px;color:#888;display:block;line-height:1.2">${cls.label}</span>` : '';
                return `<td onclick="doRemoveSRTClass('${cls.id}')" style="text-align:center;border:.5px solid #ddd;cursor:pointer;background:#fff;font-size:14px;font-weight:700" title="Remove ${cls.label}">✓${lbl}</td>`;
              } else if(bySlot[slot].length === 0){
                return isFirst
                  ? `<td onclick="toggleSRTCell('${lv}','${slot}')" style="text-align:center;border:.5px solid #1a1a1a;cursor:pointer;background:#1a1a1a" title="Add"></td>`
                  : `<td style="background:#f7f7f7;border:.5px solid #eee"></td>`;
              } else {
                return `<td style="background:#f7f7f7;border:.5px solid #eee"></td>`;
              }
            }).join('');
            rows += `<tr>${labelCell}${slotCells}</tr>`;
          }
        });
        return rows;
      })()}</tbody>
    </table></div>`;
  } else {
    srtBody = SRT_SLOTS.map(slot => {
      const cls = active.filter(c=>c.dept==='SRT'&&c.slot===slot)
        .sort((a,b)=>SRT_ALL_LVS.indexOf(a.level)-SRT_ALL_LVS.indexOf(b.level));
      return classRow(slot, cls, 'SRT', slot, 'var(--d-srt)');
    }).join('');
  }
  const srtHTML = card('SRT','English Course', srtToggle + srtBody);

  // Stats
  const statsHTML = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-n">${active.length}</div><div class="stat-l">Active Classes</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--d-srk)">${active.filter(c=>c.dept==='SRK').length}</div><div class="stat-l">SRK</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--d-gak)">${active.filter(c=>c.dept==='GAK').length}</div><div class="stat-l">GAK</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--d-atc)">${active.filter(c=>c.dept==='ATC').length}</div><div class="stat-l">ATC</div></div>
    <div class="stat-card"><div class="stat-n" style="color:var(--d-srt)">${active.filter(c=>c.dept==='SRT').length}</div><div class="stat-l">SRT</div></div>
  </div>`;

  document.getElementById('dashboard-content').innerHTML = statsHTML + srkHTML + gakHTML + atcHTML + srtHTML;
}

// ══ AUTH ══
async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const errEl=document.getElementById('auth-err');
  errEl.textContent='';
  if(!email){errEl.textContent='Please enter email';return;}
  if(!pass){errEl.textContent='Please enter password';return;}
  const btn=document.getElementById('auth-login-btn');
  btn.disabled=true;btn.textContent='Logging in...';
  try{
    const{error}=await _sb.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
    await initApp();
  }catch(e){errEl.textContent=e.message||'Login failed';btn.disabled=false;btn.textContent='Login';}
}
async function doMagicLink(){
  const email=document.getElementById('auth-email').value.trim();
  const errEl=document.getElementById('auth-err');
  errEl.textContent='';
  if(!email){errEl.textContent='Please enter email';return;}
  const btn=document.getElementById('auth-magic-btn');
  btn.disabled=true;btn.textContent='Sending...';
  try{
    const{error}=await _sb.auth.signInWithOtp({email});
    if(error)throw error;
    errEl.style.color='var(--ok)';errEl.textContent='✓ Check your email for the login link';
  }catch(e){errEl.textContent=e.message||'Failed to send';}
  btn.disabled=false;btn.textContent='Send Magic Link';
}
document.addEventListener('DOMContentLoaded',()=>{
  ['auth-email','auth-pass'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  });
});
async function initApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
  await loadData();
  document.getElementById('loading-screen').style.display='none';
  renderDashboard();
}

// ══ INIT ══
(async()=>{
  const{data:{session}}=await _sb.auth.getSession();
  if(session){await initApp();}
})();

// beforeunload
window.addEventListener('beforeunload',()=>{try{localStorage.setItem(STORAGE_KEY, JSON.stringify(S));}catch(e){}});
</script>
