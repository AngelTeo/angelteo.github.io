<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta property="og:title" content="CORE-MasterAuth">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<title>CORE-MasterAuth v3</title>
<style>
:root{
  --layer:#5C1010;
  --bg:#faf9f6;--sur:#ffffff;--sur2:#f7f6f2;--bdr:#e0ddd6;
  --txt:#1a1a1a;--mut:#888888;--hint:#bbbbbb;
  --ok:#0F6E56;--warn:#854F0B;--danger:#A32D2D;--info:#236FAD;
  --srk:#C45C5C;--gak:#E8A04E;--atc:#7AB05A;--srt:#8B6CAE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--txt);font-size:13px}
/* NAV */
.nav{background:var(--layer);display:flex;align-items:center;flex-wrap:wrap;padding:0 14px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:13px;font-weight:600;color:#fff;padding:12px 14px 12px 0}
.ver{background:#F9CB42;color:var(--layer);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:6px}
.ntab{padding:11px 14px;font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;font-family:inherit}
.ntab:hover{color:#fff}
.ntab.on{color:#fff;border-bottom-color:#fff;font-weight:600}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-nav{padding:5px 12px;border-radius:6px;border:.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:11px;cursor:pointer;font-family:inherit}
.btn-nav:hover{opacity:.85}
/* LAYOUT */
main{max-width:960px;margin:0 auto;padding:18px 16px}
.page{display:none}.page.on{display:block}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.toolbar input[type=text]{flex:1;min-width:160px;padding:8px 10px;border:.5px solid var(--bdr);border-radius:6px;font-size:13px;font-family:inherit}
.dept-row{display:flex;gap:4px;flex-wrap:wrap}
.dept-tag{padding:5px 11px;border:.5px solid var(--bdr);border-radius:14px;font-size:11px;cursor:pointer;background:var(--sur);color:var(--mut)}
.dept-tag.on{background:var(--layer);border-color:var(--layer);color:#fff}
.btn{padding:6px 13px;border-radius:6px;border:.5px solid var(--bdr);background:var(--sur);color:var(--txt);font-size:12px;cursor:pointer;font-family:inherit}
.btn:hover{background:var(--sur2)}
.btn-pri{background:var(--layer);color:#fff;border-color:var(--layer);font-weight:600}
.btn-pri:hover{opacity:.85}
.btn-dng{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:3px 9px;font-size:10px}
/* TABLE */
.tbl-wrap{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);padding:9px 12px;border-bottom:.5px solid var(--bdr);background:var(--sur2)}
td{padding:10px 12px;border-bottom:.5px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
.nm{font-weight:600}
.em{font-size:11px;color:var(--mut)}
.chip{display:inline-block;padding:2px 9px;border-radius:11px;font-size:10px;font-weight:600}
.chip-ok{background:#E1F5EE;color:var(--ok)}
.chip-warn{background:#FFF3CD;color:var(--warn)}
.chip-danger{background:#FCEBEB;color:var(--danger)}
.chip-info{background:#E8F0F7;color:var(--info)}
.chip-muted{background:var(--sur2);color:var(--mut)}
.dchip{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin:1px;color:#fff}
.d-SRK{background:var(--srk)}.d-GAK{background:var(--gak)}.d-ATC{background:var(--atc)}.d-SRT{background:var(--srt)}
.acts{display:flex;gap:5px;justify-content:flex-end}
.empty{text-align:center;color:var(--mut);padding:30px;font-size:12px}
/* MANAGE */
.card{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;padding:16px;margin-bottom:12px}
.mg-title{font-size:11px;font-weight:600;color:var(--mut);letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px}
.mg-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--bdr);font-size:12px}
.mg-row:last-child{border-bottom:none}
.mg-row .k{color:var(--mut)}.mg-row .v{font-weight:600}
.mg-code{font-size:11px;background:var(--sur2);padding:2px 6px;border-radius:3px;font-family:monospace}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.on{display:flex}
.modal{background:var(--sur);border-radius:12px;width:400px;max-width:100%;max-height:90vh;overflow:auto}
.modal-hdr{padding:16px 18px;border-bottom:.5px solid var(--bdr);font-size:14px;font-weight:700}
.modal-body{padding:16px 18px}
.modal-foot{padding:14px 18px;border-top:.5px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--mut);margin-bottom:5px;font-weight:600}
.field input,.field select{width:100%;padding:8px 10px;border:.5px solid var(--bdr);border-radius:6px;font-size:13px;font-family:inherit;background:var(--sur);color:var(--txt)}
.field input:focus,.field select:focus{outline:none;border-color:var(--layer)}
.hint{font-size:10px;color:var(--hint);margin-top:4px}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--txt);color:#fff;padding:9px 18px;border-radius:8px;font-size:12px;font-weight:500;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* AUTH */
.auth-screen{position:fixed;inset:0;background:var(--sur2);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--sur);border:.5px solid var(--bdr);border-radius:12px;padding:32px 28px;width:340px;max-width:100%;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.auth-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:4px;color:var(--layer)}
.auth-sub{font-size:11px;color:var(--mut);text-align:center;margin-bottom:20px}
.auth-row{margin-bottom:14px}
.auth-row label{font-size:11px;color:var(--mut);display:block;margin-bottom:4px}
.auth-row input{width:100%;padding:8px 10px;border:.5px solid var(--bdr);border-radius:6px;font-size:13px;font-family:inherit}
.auth-row input:focus{outline:none;border-color:var(--layer)}
.auth-btn{width:100%;padding:10px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.auth-btn-pri{background:var(--layer);color:#fff}
.auth-btn-sec{background:transparent;color:var(--layer);border:.5px solid var(--layer);margin-top:8px}
.auth-btn:hover{opacity:.85}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-or{text-align:center;font-size:10px;color:var(--hint);margin:12px 0}
.auth-err{font-size:11px;color:var(--danger);text-align:center;margin-top:10px;min-height:16px}
#loading-screen{display:none;position:fixed;inset:0;background:var(--sur2);z-index:8000;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--mut);font-size:12px}
.spin{width:26px;height:26px;border:2px solid var(--bdr);border-top-color:var(--layer);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <div class="auth-title">CORE-MasterAuth</div>
    <div class="auth-sub">Access Control · Academee</div>
    <div class="auth-row"><label>Email</label><input type="email" id="auth-email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="auth-row"><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="auth-btn auth-btn-pri" id="auth-login-btn" onclick="doLogin()">Login</button>
    <div class="auth-or">— or —</div>
    <button class="auth-btn auth-btn-sec" id="auth-magic-btn" onclick="doMagicLink()">Send Magic Link</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-screen"><div class="spin"></div><div>Loading…</div></div>

<!-- APP -->
<div id="app" style="display:none">
<div class="nav">
  <div class="nav-logo">CORE-MasterAuth <span class="ver">v3</span></div>
  <button class="ntab on" onclick="goPage('roster')">Roster</button>
  <button class="ntab" onclick="goPage('manage')">Manage</button>
  <div class="nav-r">
    <span id="who" style="color:rgba(255,255,255,.7);font-size:11px"></span>
    <button class="btn-nav" onclick="doLogout()">Logout</button>
  </div>
</div>

<main>
  <div class="page on" id="page-roster">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search name or email…" oninput="renderRoster()">
      <div class="dept-row" id="dept-filter"></div>
      <button class="btn btn-pri" onclick="openInvite()">+ Invite Teacher</button>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Name</th><th>Role</th><th>Dept</th><th>Status</th><th style="text-align:right">Actions</th></tr></thead>
      <tbody id="roster-body"></tbody>
    </table></div>
  </div>

  <div class="page" id="page-manage"><div id="manage-content"></div></div>
</main>
</div>

<!-- INVITE MODAL -->
<div class="modal-bg" id="invite-modal">
  <div class="modal">
    <div class="modal-hdr">Invite Teacher</div>
    <div class="modal-body">
      <div class="field"><label>Email *</label><input type="email" id="inv-email" placeholder="teacher@email.com"><div class="hint">A Magic Link will be sent. On first login they join automatically.</div></div>
      <div class="field"><label>Display Name</label><input type="text" id="inv-name" placeholder="e.g. Nurul"></div>
      <div class="field"><label>Role</label><select id="inv-role"></select></div>
      <div class="field"><label>Department(s)</label><div class="dept-row" id="inv-dept"></div></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('invite-modal')">Cancel</button>
      <button class="btn btn-pri" id="inv-send" onclick="submitInvite()">Send Invite</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="edit-modal">
  <div class="modal">
    <div class="modal-hdr">Edit Member</div>
    <div class="modal-body">
      <div class="field"><label>Name</label><input type="text" id="ed-name"></div>
      <div class="field"><label>Role</label><select id="ed-role"></select></div>
      <div class="field"><label>Department(s)</label><div class="dept-row" id="ed-dept"></div></div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn btn-pri" id="ed-save" onclick="submitEdit()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://qnpvqsvvsgsantekgfbz.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFucHZxc3Z2c2dzYW50ZWtnZmJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzg4MzIsImV4cCI6MjA5MTc1NDgzMn0.8rfv0BQpWNNSD8yrhHNwCOkcG9q5_uMD7B7z_Y324a0';
const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const DB=_sb;

const ROLES=['OWNER','ADMIN','TOP_MGMT','MGMT','MARKETING','TEACHER'];
const DEPTS=['SRK','GAK','ATC','SRT'];
let ROSTER=[];            // merged users_meta + pending
let MY_UID=null, MY_EMAIL=null;
let deptFilter=new Set();
let invDept=new Set(), edDept=new Set(), edTarget=null;

// ══ TOAST ══
function toast(m,ms){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms||2200);}

// ══ NAV ══
function goPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('on');
  document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('on'));
  ({roster:0,manage:1})[p]!=null&&document.querySelectorAll('.ntab')[({roster:0,manage:1})[p]].classList.add('on');
  if(p==='manage') renderManage();
}

// ══ DATA ══
async function loadData(){
  const [um,pi]=await Promise.all([
    DB.from('users_meta').select('user_id,role,department,dept_group,is_active,display_name,email,lifecycle_status'),
    DB.from('pending_invites').select('email,role,department,display_name,invited_at')
  ]);
  const rows=[];
  (um.data||[]).forEach(u=>rows.push({
    kind:'member', id:u.user_id, name:u.display_name||u.email||'—', email:u.email||'',
    role:u.role, dept:u.department||[], active:u.is_active, status:u.lifecycle_status
  }));
  (pi.data||[]).forEach(p=>rows.push({
    kind:'invite', id:p.email, name:p.display_name||p.email, email:p.email,
    role:p.role, dept:p.department||[], active:false, status:'INVITED'
  }));
  ROSTER=rows;
}

// ══ RENDER ROSTER ══
function statusChip(r){
  if(r.status==='INVITED') return '<span class="chip chip-info">INVITED</span>';
  if(!r.active||r.status==='TERMINATED') return '<span class="chip chip-danger">TERMINATED</span>';
  if(r.status==='SUSPENDED') return '<span class="chip chip-warn">SUSPENDED</span>';
  if(r.status==='PENDING') return '<span class="chip chip-muted">PENDING</span>';
  return '<span class="chip chip-ok">ACTIVE</span>';
}
function deptChips(arr){return (arr||[]).map(d=>`<span class="dchip d-${d}">${d}</span>`).join('')||'<span class="em">—</span>';}
function rowActions(r){
  if(r.kind==='invite')
    return `<button class="btn btn-sm" onclick="resendInvite('${r.email}')">Resend</button>
            <button class="btn btn-sm btn-dng" onclick="cancelInvite('${r.email}')">Cancel</button>`;
  const self=r.id===MY_UID;
  if(!r.active||r.status==='TERMINATED')
    return `<button class="btn btn-sm" onclick="reactivate('${r.id}')">Reactivate</button>`;
  let a=`<button class="btn btn-sm" onclick="openEdit('${r.id}')">Edit</button>`;
  if(!self) a+=`<button class="btn btn-sm btn-dng" onclick="terminate('${r.id}')">Terminate</button>`;
  else a+=`<span class="em" style="padding:3px 6px">you</span>`;
  return a;
}
function renderRoster(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  let list=ROSTER.filter(r=>{
    if(q&&!(r.name.toLowerCase().includes(q)||r.email.toLowerCase().includes(q))) return false;
    if(deptFilter.size&&!(r.dept||[]).some(d=>deptFilter.has(d))) return false;
    return true;
  });
  list.sort((a,b)=>{
    const rank={INVITED:0,ACTIVE:1,PENDING:1,SUSPENDED:2,TERMINATED:3};
    return (rank[a.status]??1)-(rank[b.status]??1)||a.name.localeCompare(b.name);
  });
  const b=document.getElementById('roster-body');
  if(!list.length){b.innerHTML='<tr><td colspan="5"><div class="empty">No members yet. Invite your first teacher.</div></td></tr>';return;}
  b.innerHTML=list.map(r=>`<tr>
    <td><div class="nm">${esc(r.name)}</div><div class="em">${esc(r.email)}</div></td>
    <td>${r.role||'—'}</td>
    <td>${deptChips(r.dept)}</td>
    <td>${statusChip(r)}</td>
    <td><div class="acts">${rowActions(r)}</div></td>
  </tr>`).join('');
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ══ DEPT TAGS ══
function buildDeptTags(containerId,set){
  const el=document.getElementById(containerId);
  el.innerHTML=DEPTS.map(d=>`<span class="dept-tag ${set.has(d)?'on':''}" data-d="${d}">${d}</span>`).join('');
  el.querySelectorAll('.dept-tag').forEach(t=>t.onclick=()=>{
    const d=t.dataset.d; set.has(d)?set.delete(d):set.add(d);
    t.classList.toggle('on');
  });
}
function buildRoleSelect(id,val){document.getElementById(id).innerHTML=ROLES.map(r=>`<option ${r===val?'selected':''}>${r}</option>`).join('');}

// ══ INVITE ══
function openInvite(){
  document.getElementById('inv-email').value='';
  document.getElementById('inv-name').value='';
  buildRoleSelect('inv-role','TEACHER');
  invDept=new Set(); buildDeptTags('inv-dept',invDept);
  document.getElementById('invite-modal').classList.add('on');
}
async function submitInvite(){
  const email=document.getElementById('inv-email').value.trim().toLowerCase();
  const name=document.getElementById('inv-name').value.trim();
  const role=document.getElementById('inv-role').value;
  if(!email||!email.includes('@')){toast('Enter a valid email');return;}
  const dept=[...invDept];
  const btn=document.getElementById('inv-send'); btn.disabled=true; btn.textContent='Sending…';
  try{
    await DB.from('pending_invites').delete().eq('email',email);
    const {error:e1}=await DB.from('pending_invites').insert({
      email, role, department:dept, dept_group:dept, display_name:name||null
    });
    if(e1) throw e1;
    const {error:e2}=await _sb.auth.signInWithOtp({email});
    if(e2) throw e2;
    closeModal('invite-modal');
    toast('✓ Invite sent to '+email);
    await refresh();
  }catch(e){console.error(e);toast('✕ '+(e.message||'Invite failed'));}
  btn.disabled=false; btn.textContent='Send Invite';
}
async function resendInvite(email){
  try{const {error}=await _sb.auth.signInWithOtp({email});if(error)throw error;toast('✓ Link resent to '+email);}
  catch(e){toast('✕ '+(e.message||'Failed'));}
}
async function cancelInvite(email){
  if(!confirm('Cancel invite for '+email+'?'))return;
  const {error}=await DB.from('pending_invites').delete().eq('email',email);
  if(error){toast('✕ '+error.message);return;}
  toast('Invite cancelled'); await refresh();
}

// ══ EDIT ══
function openEdit(uid){
  const r=ROSTER.find(x=>x.id===uid&&x.kind==='member'); if(!r)return;
  edTarget=uid;
  document.getElementById('ed-name').value=r.name==='—'?'':r.name;
  buildRoleSelect('ed-role',r.role);
  edDept=new Set(r.dept); buildDeptTags('ed-dept',edDept);
  document.getElementById('edit-modal').classList.add('on');
}
async function submitEdit(){
  const name=document.getElementById('ed-name').value.trim();
  const role=document.getElementById('ed-role').value;
  const dept=[...edDept];
  const btn=document.getElementById('ed-save'); btn.disabled=true; btn.textContent='Saving…';
  try{
    const {error}=await DB.from('users_meta').update({
      display_name:name||null, role, department:dept, dept_group:dept
    }).eq('user_id',edTarget);
    if(error) throw error;
    closeModal('edit-modal'); toast('✓ Saved'); await refresh();
  }catch(e){console.error(e);toast('✕ '+(e.message||'Save failed'));}
  btn.disabled=false; btn.textContent='Save';
}

// ══ TERMINATE / REACTIVATE ══
async function terminate(uid){
  const r=ROSTER.find(x=>x.id===uid); if(!r)return;
  if(!confirm('Terminate '+r.name+'?\nThey will be filtered out of every system immediately.'))return;
  const {error}=await DB.from('users_meta').update({
    is_active:false, lifecycle_status:'TERMINATED', lifecycle_reason:'Terminated via MasterAuth'
  }).eq('user_id',uid);
  if(error){toast('✕ '+error.message);return;}
  toast('✓ '+r.name+' terminated'); await refresh();
}
async function reactivate(uid){
  const r=ROSTER.find(x=>x.id===uid); if(!r)return;
  const {error}=await DB.from('users_meta').update({
    is_active:true, lifecycle_status:'ACTIVE', lifecycle_reason:'Reactivated via MasterAuth'
  }).eq('user_id',uid);
  if(error){toast('✕ '+error.message);return;}
  toast('✓ '+r.name+' reactivated'); await refresh();
}

function closeModal(id){document.getElementById(id).classList.remove('on');}

// ══ MANAGE ══
function renderManage(){
  const active=ROSTER.filter(r=>r.kind==='member'&&r.active).length;
  const invited=ROSTER.filter(r=>r.kind==='invite').length;
  const term=ROSTER.filter(r=>r.kind==='member'&&!r.active).length;
  document.getElementById('manage-content').innerHTML=`
  <div class="card">
    <div class="mg-title">System Info</div>
    <div class="mg-row"><span class="k">System</span><span class="v">CORE-MasterAuth</span></div>
    <div class="mg-row"><span class="k">Version</span><span class="v">v3</span></div>
    <div class="mg-row"><span class="k">Layer</span><span class="v">CORE</span></div>
    <div class="mg-row"><span class="k">Data source</span><span class="v"><span class="mg-code">internal.users_meta</span></span></div>
    <div class="mg-row"><span class="k">Invites</span><span class="v"><span class="mg-code">internal.pending_invites</span></span></div>
  </div>
  <div class="card">
    <div class="mg-title">Roster Summary</div>
    <div class="mg-row"><span class="k">Active members</span><span class="v">${active}</span></div>
    <div class="mg-row"><span class="k">Pending invites</span><span class="v">${invited}</span></div>
    <div class="mg-row"><span class="k">Terminated</span><span class="v">${term}</span></div>
  </div>
  <div class="card">
    <div class="mg-title">How access works</div>
    <div style="font-size:11px;color:var(--mut);line-height:1.7">
      Anyone can create a login, but sees nothing unless they are an active row here. Terminate = flip <span class="mg-code">is_active</span> off → filtered out of every system. Login is Magic Link (no passwords).
    </div>
  </div>`;
}

// ══ AUTH ══
async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const err=document.getElementById('auth-err'); err.textContent='';
  if(!email){err.textContent='Enter email';return;}
  if(!pass){err.textContent='Enter password';return;}
  const btn=document.getElementById('auth-login-btn'); btn.disabled=true; btn.textContent='Logging in…';
  try{const {error}=await _sb.auth.signInWithPassword({email,password:pass});if(error)throw error;await initApp();}
  catch(e){err.textContent=e.message||'Login failed';btn.disabled=false;btn.textContent='Login';}
}
async function doMagicLink(){
  const email=document.getElementById('auth-email').value.trim();
  const err=document.getElementById('auth-err'); err.textContent='';
  if(!email){err.textContent='Enter email';return;}
  const btn=document.getElementById('auth-magic-btn'); btn.disabled=true; btn.textContent='Sending…';
  try{const {error}=await _sb.auth.signInWithOtp({email});if(error)throw error;err.style.color='var(--ok)';err.textContent='✓ Check your email for the login link';}
  catch(e){err.textContent=e.message||'Failed to send';}
  btn.disabled=false; btn.textContent='Send Magic Link';
}
async function doLogout(){await _sb.auth.signOut();location.reload();}

document.addEventListener('DOMContentLoaded',()=>{
  ['auth-email','auth-pass'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});});
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-bg.on').forEach(m=>m.classList.remove('on'));});

async function refresh(){await loadData();renderRoster();}

async function initApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
  const {data:{user}}=await _sb.auth.getUser();
  MY_UID=user?.id||null; MY_EMAIL=user?.email||null;
  document.getElementById('who').textContent=MY_EMAIL||'';
  // dept filter tags
  const df=document.getElementById('dept-filter');
  df.innerHTML=DEPTS.map(d=>`<span class="dept-tag" data-d="${d}">${d}</span>`).join('');
  df.querySelectorAll('.dept-tag').forEach(t=>t.onclick=()=>{const d=t.dataset.d;deptFilter.has(d)?deptFilter.delete(d):deptFilter.add(d);t.classList.toggle('on');renderRoster();});
  await loadData();
  renderRoster();
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='block';
}

(async()=>{const {data:{session}}=await _sb.auth.getSession();if(session)await initApp();})();
</script>
