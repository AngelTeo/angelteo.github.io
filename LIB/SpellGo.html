<html lang="en">
<head>

<title>SpellGo (v15) — Academee</title>
<style>
:root{
  /* ══ LAYER (LIB 层 · 改这一行换色) ══ */
  --layer:#6B6B3A;
  /* CORE=#5C1010 | EDU=#236FAD | BIZ=#C04E28 | EVT=#7870CC | RPT=#5A6470
     SOP=#2A7B6F | OPR=#8B6C2A | HR=#993556 | ACC=#2B4570 | LIB=#6B6B3A */

  --acc:var(--layer);

  /* ══ 语义色 (Universal Standard §5) ══ */
  --ok:#0F6E56; --warn:#854F0B; --danger:#A32D2D; --info:#236FAD;
  --grn:var(--ok); --org:var(--warn); --red:var(--danger);

  /* ══ 中性色 ══ */
  --sur:#ffffff; --sur2:#f7f6f2; --bdr:#e0ddd6;
  --txt:#1a1a1a; --mut:#888888; --hint:#bbbbbb;

  /* ══ SpellGo 专用(科目色·保留) ══ */
  --sp:var(--layer); --ej:#1B5E20; --tx:#8B0000;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:var(--sur2);color:var(--txt);font-size:13px;line-height:1.4}

/* NAV */
.nav{background:var(--layer);border-bottom:.5px solid #0f2540;
  display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:50;
  overflow-x:auto;gap:0}
.nav-logo{font-size:15px;font-weight:700;padding:12px 14px 12px 0;
  border-right:.5px solid rgba(255,255,255,.2);margin-right:4px;white-space:nowrap;
  flex-shrink:0;color:#fff}
.ntab{padding:11px 14px;font-size:11px;color:rgba(255,255,255,.7);cursor:pointer;
  border:none;background:transparent;border-bottom:2.5px solid transparent;
  transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.ntab:hover{color:#fff}
.ntab.on{color:#fff;border-bottom-color:#fff;font-weight:600}
.nav-r{margin-left:auto;display:flex;gap:5px;align-items:center;padding-left:10px;flex-shrink:0}
.saved{font-size:10px;color:#7dd3b0;margin-right:6px;display:none}

/* BUTTONS */
.btn{padding:5px 12px;border-radius:6px;border:.5px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.12);color:#fff;font-size:11px;cursor:pointer;
  font-family:inherit;transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-pri{background:#fff;color:var(--layer);border-color:#fff;font-weight:600}
.btn-plain{background:var(--sur);border:.5px solid var(--bdr);color:var(--txt);font-size:11px;
  padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-plain:hover{background:var(--sur2)}
.btn-grn{background:var(--grn);color:#fff;border:none;font-weight:500;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit}
.btn-red{background:var(--red);color:#fff;border:none;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit}
.btn-sm{padding:3px 9px;font-size:10px}

/* PAGES */
.page{display:none;padding:16px;max-width:1300px;margin:0 auto}
.page.on{display:block}

/* SUB-NAV */
.sub-nav{background:var(--sur);border-bottom:.5px solid var(--bdr);
  padding:0 16px;display:flex;overflow-x:auto;align-items:center;min-height:38px;
  position:sticky;top:44px;z-index:49;gap:2px}
.sub-ntab{padding:9px 14px;font-size:11px;color:var(--mut);cursor:pointer;
  border:none;background:transparent;border-bottom:2px solid transparent;
  transition:all .15s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.sub-ntab:hover{color:var(--txt)}
.sub-ntab.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}

/* CARDS */
.card{background:var(--sur);border:.5px solid var(--bdr);border-radius:10px;
  padding:16px;margin-bottom:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;gap:8px}
.card-title{font-size:11px;font-weight:500;color:var(--mut);
  letter-spacing:.05em;text-transform:uppercase}

/* TABLES */
table.data{width:100%;border-collapse:collapse;font-size:12px}
table.data thead th{background:#2d2d2d;color:#fff;padding:9px 12px;text-align:left;
  font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  white-space:nowrap}
table.data tbody td{padding:8px 12px;border-bottom:.5px solid var(--bdr);vertical-align:middle}
table.data tbody tr:nth-child(even){background:var(--sur2)}
table.data tbody tr:hover{background:#FFF9E6}

/* INPUTS */
input[type=text],input[type=number],input[type=date],select,textarea{
  border:.5px solid var(--bdr);border-radius:6px;padding:6px 10px;
  font-size:12px;font-family:inherit;background:var(--sur);color:var(--txt);
  box-sizing:border-box}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}

/* MISC */
.tip{font-size:11px;color:var(--mut);margin:6px 0}
.empty{text-align:center;padding:36px 20px;color:var(--hint);font-size:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.b-sp{background:#E8F0FA;color:var(--sp)}
.b-ej{background:#E8F4EA;color:var(--ej)}
.b-tx{background:#FBF0F0;color:var(--tx)}
.b-t1{background:#FFF8E1;color:#854F0B}
.b-t2{background:#E8F4FA;color:#0e5c84}

/* DAY CARDS (This Week) */
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.day-card{background:var(--sur);border:.5px solid var(--bdr);border-radius:8px;padding:12px}
.day-card.today{border-color:var(--acc);background:#EEF4FB}
.day-label{font-size:10px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.day-date{font-size:14px;font-weight:700;margin-bottom:8px}
.subj-block{border-radius:7px;padding:7px 10px;margin-bottom:5px}
.subj-block.sp{background:#E8F0FA;border:.5px solid #a8c4e8}
.subj-block.ej{background:#E8F4EA;border:.5px solid #a8d4b0}
.subj-block.tx{background:#FBF0F0;border:.5px solid #e8a8a8}
.subj-label{font-size:9px;font-weight:700;letter-spacing:.04em;margin-bottom:3px}
.subj-label.sp{color:var(--sp)}.subj-label.ej{color:var(--ej)}.subj-label.tx{color:var(--tx)}
.word-pill{display:inline-block;background:rgba(255,255,255,.75);border:.5px solid rgba(0,0,0,.1);
  border-radius:5px;padding:2px 7px;margin:1px;font-size:11px;font-weight:500}
.tag-hol{display:inline-block;background:#fce8ff;color:#6a1e8a;border:.5px solid #d0a8e8;
  border-radius:5px;padding:2px 8px;font-size:10px;margin-top:4px}

@media(max-width:700px){.week-grid{grid-template-columns:1fr 1fr}}
@media print{.nav,.sub-nav,.no-print{display:none!important}.page{display:block!important;padding:0}}
.auth-screen{position:fixed;inset:0;background:var(--sur2);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--sur);border:.5px solid var(--bdr);border-radius:12px;padding:32px 28px;width:340px;max-width:100%;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.auth-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:4px;color:var(--acc)}
.auth-sub{font-size:11px;color:var(--mut);text-align:center;margin-bottom:20px}
.auth-row{margin-bottom:14px}
.auth-row label{font-size:11px;color:var(--mut);display:block;margin-bottom:4px}
.auth-row input{width:100%;padding:8px 10px;border:.5px solid var(--bdr);border-radius:6px;font-size:13px;font-family:inherit}
.auth-row input:focus{outline:none;border-color:var(--acc)}
.auth-btn{width:100%;padding:10px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.auth-btn-pri{background:var(--acc);color:#fff}
.auth-btn-sec{background:transparent;color:var(--acc);border:.5px solid var(--acc);margin-top:8px}
.auth-btn:hover{opacity:.85}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-or{text-align:center;font-size:10px;color:var(--hint);margin:12px 0}
.auth-err{font-size:11px;color:var(--red);text-align:center;margin-top:10px;min-height:16px}
#loading-screen{display:none;position:fixed;inset:0;background:var(--sur2);z-index:8000;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--mut);font-size:12px}
.spin{width:26px;height:26px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

};

  { id:'SR1', level:'SR', num:'1', sp_day:1, ej_day:2, tx_day:3 },
  { id:'SR3', level:'SR', num:'3', sp_day:2, ej_day:3, tx_day:4 },
  { id:'IN1', level:'IN', num:'1', sp_day:4, ej_day:3, tx_day:2 },

const S = {

  classes:    [],     // [{ id, level, num, sp_day, ej_day, tx_day }]
  levelWords: {},     // { SR:{sp:[],ej:[],tx:[]}, IN:{...}, JR:{...} }
  holidays:   [],     // ['YYYY-MM-DD', ...]

// ═══════════════════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════════════════
async function saveAll(){
  S.meta.lastUpdated = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); // local mirror (backup, not SSOT)
  try{ await cloudSave(); }catch(e){ console.error('cloudSave failed', e); }
}
function loadData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  // Always start from defaults for structural data
  S.settings   = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  S.classes    = JSON.parse(JSON.stringify(DEFAULT_CLASSES));
  S.levelWords = JSON.parse(JSON.stringify(DEFAULT_WORDS));

  if(!raw) return;
  try{
    const p = JSON.parse(raw);
    if(p.settings && p.settings.SR) S.settings = p.settings;
    if(p.classes  && p.classes.length) S.classes = p.classes;
    if(p.holidays && Array.isArray(p.holidays)) S.holidays = p.holidays;
    if(p.schedule && typeof p.schedule==='object') S.schedule = p.schedule;
    if(p.meta) S.meta = Object.assign({}, S.meta, p.meta);
    // Restore word edits only if count matches defaults (prevents stale data)
    if(p.levelWords){
      for(const lv of Object.keys(p.levelWords)){
        if(!p.levelWords[lv]) continue;
        if(!S.levelWords[lv]) S.levelWords[lv]={sp:[],ej:[],tx:[]};
        for(const subj of ['sp','ej','tx']){
          const saved = p.levelWords[lv][subj];
          if(Array.isArray(saved)) S.levelWords[lv][subj] = saved; // BUG-A fix: no count-guard (add/delete groups now persist)
        }
      }
    }
  }catch(e){ console.error('loadData failed', e); }
  _syncWords();
}
function flashSaved(){
  const el = document.getElementById('saved');
  el.style.display = 'inline';
  setTimeout(()=>el.style.display='none', 1500);
}
function exportAll(){
  const blob = new Blob([JSON.stringify(S, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `SpellGo_${toISO(new Date())}.json`; a.click();
  URL.revokeObjectURL(url);
}
function importAll(event){
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try{
      const p = JSON.parse(e.target.result);
      if(!confirm('This will OVERWRITE all current SpellGo data. Continue?')) return;
      if(p.settings)   S.settings   = p.settings;
      if(p.classes)    S.classes    = p.classes;
      if(p.levelWords) S.levelWords = p.levelWords;
      if(p.holidays)   S.holidays   = p.holidays;
      if(p.schedule)   S.schedule   = p.schedule;
      if(p.meta) S.meta = Object.assign({},S.meta,p.meta);
      _syncWords(); await saveAll();
      alert('Import successful!'); location.reload();
    }catch(err){ alert('Import failed: '+err.message); }
  };
  reader.readAsText(file);
}

function genId(prefix){ return (prefix||'id')+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
const SPELLGO_BUILD = 15;
function _ddmmS(ds){ return ds.slice(8)+'/'+ds.slice(5,7); }
function _ddmmL(ds){ return ds.slice(8)+'/'+ds.slice(5,7)+'/'+ds.slice(0,4); }
function escapeHTML(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
// sentence vs word: period(./。) = sentence → plain text; else = pills
function _renderWords(words, style){
  const isSentence = words.some(w => w.includes('.') || w.includes('。'));
  if(isSentence) return `<span style="${style};border:none;background:transparent">${escapeHTML(words.join(' '))}</span>`;
  return words.map(w=>`<span style="${style}">${escapeHTML(w)}</span>`).join('');
}
function toISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fromISO(s){ return new Date(s+'T12:00:00'); }
function todayISO(){ return toISO(new Date()); }
function fmtShort(d){ return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); }
function fmtFull(d) { return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }
function getMon(ds){ const d=fromISO(ds); const dow=d.getDay()||7; d.setDate(d.getDate()-(dow-1)); return d; }
function isHoliday(ds){ return S.holidays.includes(ds); }
function classById(id){ return S.classes.find(c=>c.id===id); }

// Sync S.words from S.levelWords (classes share level word list by reference)
function _syncWords(){
  S.words = {};
  for(const cls of S.classes){
    S.words[cls.id] = S.levelWords[cls.level] || {sp:[],ej:[],tx:[]};
  }
}

const SUBJ_META = {
  sp:{ label:'🔤 Spelling', cls:'sp', bg:'#E8F0FA', border:'#a8c4e8', hdr:'#6B6B3A', name:'Spelling (English)' },
  ej:{ label:'🇲🇾 Ejaan',   cls:'ej', bg:'#E8F4EA', border:'#a8d4b0', hdr:'#1B5E20', name:'Ejaan (BM)' },
  tx:{ label:'📝 听写',     cls:'tx', bg:'#FBF0F0', border:'#e8a8a8', hdr:'#8B0000', name:'听写 (中文)' },
};
const LEVEL_COLORS = { SR:'#185FA5', IN:'#0F6E56', JR:'#854F0B' };

// ═══════════════════════════════════════════════════════════════════════════
// SCHEDULE ENGINE
// ═══════════════════════════════════════════════════════════════════════════
function _buildDates(dayNum, level){
  const st = S.settings[level] || DEFAULT_SETTINGS.SR;
  const t1s = fromISO(st.yearStart);
  const t1e = fromISO(st.term1End);
  const t2s = new Date(t1e.getTime() + 86400000*2);
  const t2e = fromISO(st.term2End);
  const result = [];
  for(const [ts, te, term] of [[t1s,t1e,1],[t2s,t2e,2]]){
    let d = new Date(ts);
    const diff = ((dayNum - (d.getDay()||7)) + 7) % 7;
    d.setDate(d.getDate() + diff);
    let safety = 0;
    while(d <= te && safety++ < 500){
      const iso = toISO(d);
      if(!isHoliday(iso)) result.push({date:iso, term});
      d.setDate(d.getDate() + 7);
    }
  }
  return result;
}

function _recomputeSchedule(){
  // pure derive (no save) — schedule is derived data, safe to recompute anytime
  const sched = {};
  for(const cls of S.classes){
    sched[cls.id] = {sp:[],ej:[],tx:[]};
    const w = S.words[cls.id] || {};
    const dayMap = {sp:cls.sp_day, ej:cls.ej_day, tx:cls.tx_day};
    for(const subj of ['sp','ej','tx']){
      const slots = _buildDates(dayMap[subj], cls.level);
      sched[cls.id][subj] = (w[subj]||[]).map((words,i) => ({
        grpIdx:i, words, date:slots[i]?.date||null, term:slots[i]?.term||1
      }));
    }
  }
  S.schedule = sched;
}
function generateSchedule(){
  _recomputeSchedule();
  saveAll(); flashSaved();
}

function _schedFor(classId){ return S.schedule[classId]||null; }

function _schedByTerm(classId, term){
  const s = _schedFor(classId); if(!s) return null;
  const out={sp:[],ej:[],tx:[]};
  for(const subj of ['sp','ej','tx']) out[subj]=(s[subj]||[]).filter(e=>e.term===term);
  return out;
}

function _forDate(dateISO, classId){
  const s = _schedFor(classId); if(!s) return [];
  const result = [];
  for(const subj of ['sp','ej','tx']){
    const m = (s[subj]||[]).find(e=>e.date===dateISO);
    if(m) result.push({...m, subj});
  }
  return result;
}

let _weekClass = '';

function render_week(){
  if(!_weekClass || !classById(_weekClass)) _weekClass = S.classes[0]?.id || '';
  const today = todayISO();
  const mon   = getMon(today);
  const days  = [0,1,2,3,4].map(i=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return toISO(d); });
  const wStr  = fmtShort(fromISO(days[0]))+' – '+fmtFull(fromISO(days[4]));
  const hasSched = !!_schedFor(_weekClass);

  const dayCards = days.map((iso,i) => {
    const isToday = iso===today;
    const isHol   = isHoliday(iso);
    const entries = hasSched ? _forDate(iso, _weekClass) : [];
    let body = '';
    if(isHol){
      body = '<div class="tag-hol">Holiday / Cuti</div>';
    } else if(!entries.length){
      body = '<div style="color:var(--hint);font-size:10px;margin-top:4px">No test</div>';
    } else {
      body = entries.map(e=>{
        const m=SUBJ_META[e.subj];
        return `<div class="subj-block ${e.subj}">
          <div class="subj-label ${e.subj}">${m.label}</div>
          <div style="display:flex;flex-wrap:wrap">${_renderWords(e.words, 'display:inline-block;background:rgba(255,255,255,.75);border:.5px solid rgba(0,0,0,.1);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:500;margin:1px')}</div>
        </div>`;
      }).join('');
    }
    return `<div class="day-card${isToday?' today':''}">
      <div class="day-label">${DAY_FULL[i]}</div>
      <div class="day-date" style="${isToday?'color:var(--acc)':''}">${fmtShort(fromISO(iso))}${isToday?' <span style="font-size:9px;background:var(--acc);color:#fff;border-radius:3px;padding:1px 5px">Today</span>':''}</div>
      ${body}
    </div>`;
  }).join('');

  document.getElementById('week-content').innerHTML = `
    <div class="card" style="margin-bottom:12px">
      <div class="card-hdr">
        <div>
          <div style="font-size:16px;font-weight:600">📅 This Week · ${_weekClass}</div>
          <div class="tip" style="margin:3px 0 0">${wStr}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${!hasSched?'<span style="font-size:10px;color:var(--org)">⚠️ No schedule — go to Settings → Generate</span>':''}

        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${_classChips(_weekClass,'_setWeekClass')}</div>
    </div>
    <div class="week-grid">${dayCards}</div>`;
}

render_week(); }

  const html = _buildPrintWeek(_weekClass);
  _openPrint(html, `SpellGo ${_weekClass} Week ${todayISO()}`);
}

async function syncCalendarHolidays(){
  try{
    const {data:calRows,error}=await DB.from('calendar_events').select('type,start_date,end_date,details,depts');
    if(error) throw error;
    if(!calRows||!calRows.length){ alert('No calendar data found. Add holidays in CORE-Calendar first.'); return; }
    const hols=new Set();
    for(const r of calRows){
      if(!r.start_date) continue;
      if(Array.isArray(r.depts) && r.depts.length>0 && !r.depts.includes('SRK')) continue;
      if(['public_holiday','school_holiday','special_holiday'].includes(r.type)){
        let cur=new Date(r.start_date+'T12:00:00');
        const end=r.end_date?new Date(r.end_date+'T12:00:00'):new Date(r.start_date+'T12:00:00');
        while(cur<=end){ if(cur.getDay()!==0) hols.add(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
      } else if(r.type==='festival' && r.details && r.details.days){
        for(const ds in r.details.days){ if(['PH1','PH2','OFF'].includes(r.details.days[ds])) hols.add(ds); }
      }
    }
    S.holidays=[...hols].sort();
    await saveAll();
    render_holiday();
    alert('✓ Synced '+S.holidays.length+' holiday dates from CORE-Calendar.');
  }catch(e){ console.error('syncCalendarHolidays failed',e); alert('Sync failed: '+(e.message||e)); }
}
async function importHolidayGo(){
  for(const k of ['holidaygo_v1','academee_holidaygo_v1','holidaygo_data','holidaygo']){
    try{
      const raw=localStorage.getItem(k); if(!raw) continue;
      const p=JSON.parse(raw);
      // HolidayGo stores dates in multiple structures — collect all holiday date strings
      const dates=new Set();
      // holidayDates: { year: { templateId: 'YYYY-MM-DD' } }
      if(p.holidayDates) Object.values(p.holidayDates).forEach(yr=>Object.values(yr).forEach(d=>{if(d&&/^\d{4}-\d{2}-\d{2}$/.test(d))dates.add(d);}));
      // specialHolidays: { year: [{ date }] }
      if(p.specialHolidays) Object.values(p.specialHolidays).forEach(yr=>(yr||[]).forEach(h=>{if(h.date)dates.add(h.date);}));
      // festivalDates: { year: { festId: { days: { date: 'PH2'|'OFF' } } } }
      if(p.festivalDates) Object.values(p.festivalDates).forEach(yr=>Object.values(yr).forEach(f=>Object.keys(f.days||{}).forEach(d=>dates.add(d))));
      // schoolHolDates: { year: { shId: { start, end } } } — expand ranges
      if(p.schoolHolDates) Object.values(p.schoolHolDates).forEach(yr=>Object.values(yr).forEach(r=>{
        if(r.start&&r.end){
          let d=fromISO(r.start),e=fromISO(r.end);
          while(d<=e){dates.add(toISO(d));d.setDate(d.getDate()+1);}
        }
      }));
      if(dates.size){
        S.holidays=[...new Set([...S.holidays,...dates])].sort();
        await saveAll(); render_settings(); flashSaved();
        alert(`✓ Imported ${dates.size} holiday dates from HolidayGo.`); return;
      }
    }catch(e){}
  }
  alert('HolidayGo data not found.\n\nMake sure HolidayGo is open in the same browser (same domain), or add holidays manually.');
}

  const d=prompt('Date (YYYY-MM-DD):',todayISO());

  if(!S.holidays.includes(d)){ S.holidays.push(d); S.holidays.sort(); }

async function clearAll(){

function _printBook(){
  const sched = _schedByTerm(_bookClass, _bookTerm);
  if(!sched) return alert('No schedule. Generate schedule first.');
  const entries = (sched[_bookSubj]||[]).filter(e=>e.date);
  if(!entries.length) return alert('No scheduled entries for this selection.');
  const m = SUBJ_META[_bookSubj];
  const cls = classById(_bookClass);
  const dayIdx = {sp:cls.sp_day, ej:cls.ej_day, tx:cls.tx_day}[_bookSubj];
  const dayName = DAY_FULL[dayIdx-1] || '';
  const _isSentence = ws => ws.some(w => w.includes('.') || w.includes('。'));
  const maxW = Math.max(...entries.filter(e=>!_isSentence(e.words)).map(e=>e.words.length),1);
  const year = entries[0].date.slice(0,4);

  // dynamic sizing: fewer rows = bigger font + padding to fill page
  const n = entries.length;
  const wordPx = n<=15 ? 20 : n<=20 ? 17 : 14;
  const cellPad = n<=15 ? '10px 12px' : n<=20 ? '8px 10px' : '5px 8px';
  const _ddmm = ds => ds.slice(8)+'/'+ds.slice(5,7); // DD/MM only

  const rows = entries.map((e,i)=>{
    const isSentenceRow = e.words.some(w => w.includes('.') || w.includes('。'));
    let wc = '';
    if(isSentenceRow){
      // sentence mode: join all entries with space, colspan across all word columns
      const txt = escapeHTML(e.words.join(' '));
      wc = `<td colspan="${maxW}" style="border:1px solid #ccc;padding:${cellPad};font-size:${wordPx}px;font-weight:600;text-align:left">${txt}</td>`;
    } else {
      for(let wi=0;wi<maxW;wi++){

        wc += w
          ? `<td style="border:1px solid #ccc;padding:${cellPad};font-size:${wordPx}px;font-weight:600;text-align:center">${escapeHTML(w)}</td>`
          : `<td></td>`;

      <td style="padding:${cellPad};border:1px solid #ccc;font-size:12px;color:#999;text-align:center">${i+1}</td>
      <td style="padding:${cellPad};border:1px solid #ccc;white-space:nowrap;font-weight:700;font-size:13px">${_ddmm(e.date)}</td>
      ${wc}
    </tr>`;
  }).join('');

  const wordHdrs = Array.from({length:maxW},(_,i)=>`<th style="padding:6px;color:#fff;font-size:9px;text-align:center;letter-spacing:.05em">WORD ${i+1}</th>`).join('');
  const cols = `<col style="width:30px"><col style="width:52px">${Array.from({length:maxW},()=>`<col>`).join('')}`;

  const pw = window.open('','_blank','width=820,height=1000');
  pw.document.write(`<!DOCTYPE html><html><head><title>BookNotice_${_bookClass}_${_bookSubj}_T${_bookTerm}</title>
  <link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;margin:0;padding:0;font-family:'Andika',sans-serif;color:#222}
    @media print{@page{margin:6mm}}
  </style>
  </head><body>
    <div style="padding:6mm">
      <div style="margin-bottom:10px;padding-bottom:8px;border-bottom:2.5px solid ${m.hdr};display:flex;justify-content:space-between;align-items:baseline">
        <div style="font-size:20px;font-weight:800;color:${m.hdr}">${m.name} &middot; ${dayName} &middot; ${year}</div>
        <div style="font-size:20px;font-weight:800;color:${m.hdr}">${cls.level}${'.'.repeat(parseInt(cls.num)||1)}</div>
      </div>
      <table style="width:100%;border-collapse:collapse;table-layout:fixed">
        <colgroup>${cols}</colgroup>
        <thead><tr style="background:#2d2d2d">
          <th style="padding:5px;color:#fff;font-size:9px;text-align:center;letter-spacing:.05em">#</th>
          <th style="padding:5px;color:#fff;font-size:9px;text-align:left;letter-spacing:.05em">DATE</th>
          ${wordHdrs}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  <script>window.print();window.onafterprint=()=>window.close();<\/script>
  </body></html>`);
  pw.document.close();
}

function _getParentEntries(classId, weekStart, weekEnd){
  if(!weekStart||!weekEnd) return [];
  const sched = _schedFor(classId); if(!sched) return [];
  const result=[];
  const we = fromISO(weekEnd);
  for(const subj of ['sp','ej','tx']){
    for(const e of (sched[subj]||[])){
      if(!e.date) continue;
      if(e.date>=weekStart && e.date<=weekEnd) result.push({...e,subj});
    }
  }
  return result.sort((a,b)=>a.date.localeCompare(b.date));
}

function _setParClass(c){
  _parClass=c; _parWeekStart=''; _parWeekEnd=''; render_parent();

function _parSetWeek(mon){
  if(!mon){_parWeekStart='';_parWeekEnd='';render_parent();return;}
  _parWeekStart=mon;
  const fri=new Date(fromISO(mon)); fri.setDate(fri.getDate()+4);
  _parWeekEnd=toISO(fri);
  render_parent();

function _parPrevWeek(){
  if(!_parWeekStart) return;
  const d=fromISO(_parWeekStart); d.setDate(d.getDate()-7);

}
function _parNextWeek(){
  if(!_parWeekStart) return;

}

// INIT
// ═══════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════
// CLOUD DATA LAYER (v3 · Supabase SSOT) — C hybrid: settings/classes/words normalized
// ═══════════════════════════════════════════════════════════════════════════
async function cloudLoad(){
  const [st,cl,wd]=await Promise.all([
    DB.from('spellgo_settings').select('*'),
    DB.from('spellgo_classes').select('*'),
    DB.from('spellgo_words').select('*').order('grp_idx')
  ]);
  // baseline = defaults, overlay cloud (cloud is SSOT — bypass localStorage count-match guard)
  S.settings   = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  S.classes    = JSON.parse(JSON.stringify(DEFAULT_CLASSES));
  S.levelWords = JSON.parse(JSON.stringify(DEFAULT_WORDS));
  if(st.data && st.data.length){
    S.settings={};
    st.data.forEach(r=>{ S.settings[r.level]={yearStart:r.year_start,term1End:r.term1_end,term2End:r.term2_end}; });
  }
  if(cl.data && cl.data.length){
    S.classes=cl.data.map(r=>({id:r.id,level:r.level,num:r.num,sp_day:r.sp_day,ej_day:r.ej_day,tx_day:r.tx_day}));
  }
  if(wd.data && wd.data.length){
    const lw=JSON.parse(JSON.stringify(DEFAULT_WORDS));
    const fresh={};
    wd.data.forEach(r=>{
      if(!lw[r.level]) lw[r.level]={sp:[],ej:[],tx:[]};
      const k=r.level+'|'+r.stream;
      if(!fresh[k]){ lw[r.level][r.stream]=[]; fresh[k]=true; } // replace default array for streams cloud has
      lw[r.level][r.stream][r.grp_idx]=r.words;
    });
    S.levelWords=lw;
  }
  // holidays: read from CORE-Calendar SSOT (D-SG4 implemented v6)
  try{
    const {data:calRows,error:calErr}=await DB.from('calendar_events').select('type,start_date,end_date,details,depts');
    if(!calErr && calRows && calRows.length){
      const hols=new Set();
      for(const r of calRows){
        if(!r.start_date) continue;
        // D-SG4: SpellGo = SRK only (Teo 拍板). Skip dept-specific holidays not for SRK.
        if(Array.isArray(r.depts) && r.depts.length>0 && !r.depts.includes('SRK')) continue;
        const dominated=['public_holiday','school_holiday','special_holiday'];
        if(dominated.includes(r.type)){
          // expand date range (end_date nullable = single day)
          let cur=new Date(r.start_date+'T12:00:00');
          const end=r.end_date?new Date(r.end_date+'T12:00:00'):new Date(r.start_date+'T12:00:00');
          while(cur<=end){ if(cur.getDay()!==0) hols.add(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
        } else if(r.type==='festival' && r.details && r.details.days){
          // festival: PH1/PH2/OFF days are holidays
          for(const ds in r.details.days){ if(['PH1','PH2','OFF'].includes(r.details.days[ds])) hols.add(ds); }
        }
        // extra_class = school day override → not a holiday, skip
      }
      S.holidays=[...hols].sort();
    } else {
      // fallback: local mirror if Calendar read fails
      try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw){ const p=JSON.parse(raw); if(Array.isArray(p.holidays)) S.holidays=p.holidays; } }catch(e2){}
    }
  }catch(e){ console.error('Calendar holiday load failed',e); }
  _syncWords();
}
async function cloudSave(){
  S.meta.lastUpdated=new Date().toISOString();
  // build rows
  const settingsRows=Object.keys(S.settings||{}).map(lv=>({
    level:lv,
    year_start:(S.settings[lv]||{}).yearStart||null,
    term1_end:(S.settings[lv]||{}).term1End||null,
    term2_end:(S.settings[lv]||{}).term2End||null
  }));
  const classRows=(S.classes||[]).map(cc=>({id:cc.id,level:cc.level,num:cc.num||'',sp_day:cc.sp_day,ej_day:cc.ej_day,tx_day:cc.tx_day}));
  const wordRows=[];
  for(const lv in (S.levelWords||{})){
    for(const stm of ['sp','ej','tx']){
      const arr=(S.levelWords[lv]||{})[stm]||[];
      arr.forEach((g,i)=>wordRows.push({id:lv+'_'+stm+'_'+i,level:lv,stream:stm,grp_idx:i,words:g}));
    }
  }
  // upsert (settings/words counts are fixed → upsert-only safe)
  if(settingsRows.length){ const {error}=await DB.from('spellgo_settings').upsert(settingsRows,{onConflict:'level'}); if(error) throw error; }
  if(wordRows.length){ const {error}=await DB.from('spellgo_words').upsert(wordRows,{onConflict:'id'}); if(error) throw error; }
  if(classRows.length){ const {error}=await DB.from('spellgo_classes').upsert(classRows,{onConflict:'id'}); if(error) throw error; }
  // WRITE-CLEAR for classes (can be added/removed): fetch-diff-delete orphans (eq filter, safe)
  try{
    const {data:existing}=await DB.from('spellgo_classes').select('id');
    const cur=new Set(classRows.map(r=>r.id));
    for(const row of (existing||[])){ if(!cur.has(row.id)){ await DB.from('spellgo_classes').delete().eq('id',row.id); } }
  }catch(e){ console.error('class orphan-clean failed', e); }
  // WRITE-CLEAR words orphans (BUG-B fix: _wDelete shrinks groups → stale high-index rows)
  try{
    const {data:existingW}=await DB.from('spellgo_words').select('id');
    const curW=new Set(wordRows.map(r=>r.id));
    for(const row of (existingW||[])){ if(!curW.has(row.id)){ await DB.from('spellgo_words').delete().eq('id',row.id); } }
  }catch(e){ console.error('word orphan-clean failed', e); }
}
async function migrateToCloudIfNeeded(){
  // one-time seed: if cloud words empty, push local (or defaults) to cloud
  const {count,error}=await DB.from('spellgo_words').select('id',{count:'exact',head:true});
  if(error){ console.error('cloud check failed', error); return; }
  if(count && count>0) return; // already seeded
  loadData();                  // fill S from localStorage (or defaults if none)
  await cloudSave();           // push up. localStorage retained as backup (not deleted).
  console.log('SpellGo: cloud seeded from local/defaults');
}

// ═══════════════════════════════════════════════════════════════════════════
// AUTH (v3 · mirror CORE-MasterAuth)
// ═══════════════════════════════════════════════════════════════════════════
async function doLogin(){
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const err=document.getElementById('auth-err'); err.style.color='var(--red)'; err.textContent='';
  if(!email){ err.textContent='Enter email'; return; }
  if(!pass){ err.textContent='Enter password'; return; }
  const btn=document.getElementById('auth-login-btn'); btn.disabled=true; btn.textContent='Logging in…';
  try{ const {error}=await _sb.auth.signInWithPassword({email,password:pass}); if(error) throw error; await initApp(); }
  catch(e){ err.textContent=e.message||'Login failed'; btn.disabled=false; btn.textContent='Login'; }
}
async function doMagicLink(){
  const email=document.getElementById('auth-email').value.trim();
  const err=document.getElementById('auth-err'); err.style.color='var(--red)'; err.textContent='';
  if(!email){ err.textContent='Enter email'; return; }
  const btn=document.getElementById('auth-magic-btn'); btn.disabled=true; btn.textContent='Sending…';
  try{ const {error}=await _sb.auth.signInWithOtp({email}); if(error) throw error; err.style.color='var(--grn)'; err.textContent='✓ Check your email for the login link'; }
  catch(e){ err.textContent=e.message||'Failed to send'; }
  btn.disabled=false; btn.textContent='Send Magic Link';
}
async function doLogout(){ await _sb.auth.signOut(); location.reload(); }

async function initApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
  try{
    const {data:{user}}=await _sb.auth.getUser();
    MY_UID=user?.id||null; MY_EMAIL=user?.email||null;
    const who=document.getElementById('who'); if(who) who.textContent=MY_EMAIL||'';
    await migrateToCloudIfNeeded();
    await cloudLoad();
    _recomputeSchedule(); // BUG-C fix: schedule is derived — recompute on load (was blank after cloud load)
    _weekClass  = S.classes[0]?.id || '';
    _schedClass = S.classes[0]?.id || '';
    document.getElementById('build-badge').textContent = 'v' + SPELLGO_BUILD;
    render_week();
  }catch(e){
    console.error('initApp failed', e);
    alert('Load failed: '+(e.message||e)+'\nCheck connection / login and retry.');
  }
  document.getElementById('loading-screen').style.display='none';
}

document.addEventListener('DOMContentLoaded',()=>{
  ['auth-email','auth-pass'].forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); }); });
});

// session gate: logged-in → straight into app; else auth-screen stays visible
(async()=>{ const {data:{session}}=await _sb.auth.getSession(); if(session) await initApp(); })();
</script>
